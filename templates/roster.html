<!DOCTYPE html>
<html>
<head>
    <title>Deputy Roster</title>
    <style>
        
        .container { display: flex; gap: 24px; align-items: flex-start; }
        .panel { width: 50%; }
        
        
        
        .toolbar { display: flex; gap: 16px; align-items: center; margin-bottom: 10px; }
        .status-counts { font-size: 0.95em; }
        .status-red { color: #b42318; font-weight: 700; }
        .status-orange { color: #b54708; font-weight: 700; }
        .status-group label { margin-right: 8px; display: inline-block; }
        .action-row { display: flex; gap: 6px; margin-top: 6px; }
        .small { font-size: 12px; color: #344054; }
        .add-form { margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .status-green {
            color: #067647;
            font-weight: 700;
        }
        .status-blue {
            color: #175cd3;
            font-weight: 700;
        }
        .add-message { font-size: 0.95em; margin-top: 6px; min-height: 1.2em; }
        .add-message-success { color: #067647; font-weight: 700; }
        .add-message-error { color: #b42318; font-weight: 700; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<h2>Deputy Roster</h2>
<button type="button" onclick="window.location.href='/'">Return to Main</button>
<div class="toolbar">
    <label>
        Date:
        <input type="date" id="rosterDate">
    </label>
</div>

<div class="add-form">
    <input type="text" id="newFullName" placeholder="Last name, First name">
    <select id="newDivision">
        <option value="Court Security">Court Security</option>
        <option value="Domestic Violence">Domestic Violence</option>
        <option value="Field Services">Field Services</option>
        <option value="Other">Other</option>
    </select>
    <select id="newRank"></select>
    <select id="newCapability"></select>
    <button id="addDeputyBtn" type="button">Add Person</button>
</div>
<div id="addDeputyMessage" class="add-message" aria-live="polite"></div>

<div class="container">
    <div class="panel">
        <h3>Court Security <span id="courtSecurityStatusCounts" class="status-counts"></span></h3>
        <table id="courtSecurityTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Rank</th>
                    <th>Capability</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="panel">
        <h3>Other Divisions</h3>
        <table id="otherDivisionsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Division</th>
                    <th>Rank</th>
                    <th>Capability</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
const rankOptions = ["Cadet", "CSO", "SPO", "DEP", "SGT", "LT", "Detective", "CAPT", "MJR"];
const capabilityOptions = [
    "DEPUTY",
    "SPO-A: Court Trained (FT)",
    "SPO-A: Court Trained (contractor)",
    "SPO-A: (FT)",
    "SPO-A: (contractor)",
    "SPO: Court Trained(FT)",
    "SPO Court Trained (contractor)",
    "CSO",
    "Cadet"
];

function normalizeCapabilityTag(value) {
    const text = (value || "").trim();
    if (!text) return "";

    const normalized = text.toUpperCase().replace(/[^A-Z0-9]/g, "");
    const matched = capabilityOptions.find(option =>
        option.toUpperCase().replace(/[^A-Z0-9]/g, "") === normalized
    );

    return matched || text;
}

function buildOptions(selectEl, values, selectedValue = "") {
    selectEl.innerHTML = "";
    values.forEach(value => {
        const opt = document.createElement("option");
        opt.value = value;
        opt.textContent = value;
        if ((selectedValue || "") === value) opt.selected = true;
        selectEl.appendChild(opt);
    });
}

function parseRosterName(fullName) {
    const pieces = (fullName || "").split(",");
    if (pieces.length !== 2) return null;

    const lastName = pieces[0].trim();
    const firstName = pieces[1].trim();
    if (!lastName || !firstName) return null;

    return { lastName, firstName };
}

function formatEmailNamePart(value) {
    return (value || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[^a-z0-9-]/g, "");
}

function buildBaltimoreEmail(fullName) {
    const parsed = parseRosterName(fullName);
    if (!parsed) return "";

    const firstName = formatEmailNamePart(parsed.firstName.split(" ")[0]);
    const lastName = formatEmailNamePart(parsed.lastName.split(" ")[0]);
    if (!firstName || !lastName) return "";

    return `${firstName}.${lastName}@baltimorecity.gov`;
}

buildOptions(document.getElementById("newRank"), rankOptions, "CSO");
buildOptions(document.getElementById("newCapability"), capabilityOptions, "DEPUTY");

function isCourtSecurityDeputy(deputy) {
    const division = (deputy.division || "").trim().toLowerCase();
    return division === "court security";
}


function parseDateOnly(value) {
    if (!value) return null;
    const d = new Date(`${value}T00:00:00`);
    return Number.isNaN(d.getTime()) ? null : d;
}

function parseStatusPayload(dep) {
    try {
        const raw = dep.status_raw;
        const parsed = raw ? JSON.parse(raw) : null;
        return parsed && typeof parsed === "object"
            ? {
                legacy: parsed.legacy || null,
                ranges: Array.isArray(parsed.ranges) ? parsed.ranges : [],
                weekly_unavailable: Array.isArray(parsed.weekly_unavailable) ? parsed.weekly_unavailable : []
            }
            : { legacy: null, ranges: [], weekly_unavailable: [] };
    } catch (_) {
        return { legacy: null, ranges: [], weekly_unavailable: [] };
    }
}

function hasUnavailableForSelectedDate(dep) {
    const selectedDate = parseDateOnly(document.getElementById("rosterDate").value);
    if (!selectedDate) return false;

    const payload = parseStatusPayload(dep);
    const weekday = selectedDate.toLocaleDateString("en-US", { weekday: "long" });

    return payload.weekly_unavailable.some(rule => {
        const ruleDay = (rule.day || "").trim();
        const endDate = parseDateOnly(rule.end_date);
        if (!ruleDay || !endDate) return false;
        if (selectedDate > endDate) return false;
        return ruleDay === "Any Day" || ruleDay === weekday;
    });
}

function effectiveStatusForSelectedDate(dep) {
    const selectedDate = parseDateOnly(document.getElementById("rosterDate").value);

    try {
        const payload = parseStatusPayload(dep);
        const ranges = payload.ranges;

        if (selectedDate) {
            let active = [];

            for (let i = 0; i < ranges.length; i++) {
                const entry = ranges[i];
                const start = parseDateOnly(entry.start_date);
                const end = parseDateOnly(entry.end_date);

                if (start && end && selectedDate >= start && selectedDate <= end) {
                    if (!active.includes(entry.status)) {
                        active.push(entry.status);
                    }
                }
            }

            if (hasUnavailableForSelectedDate(dep) && !active.includes("Unavailable")) {
                active.push("Unavailable");
            }

            if (active.length > 0) {
                return active.join(" / ");
            }
        }

        if (payload.legacy) return payload.legacy;
    } catch (_) {
        // fallback to effective status from API
    }

    return dep.current_status || "";
}

function statusIncludes(dep, value) {
    return effectiveStatusForSelectedDate(dep).toLowerCase().includes(value.toLowerCase());
}

function getPrimaryStatus(dep) {
    const labels = ["Scheduled Leave", "Unscheduled Leave", "Unavailable", "Training"];
    const current = effectiveStatusForSelectedDate(dep).toLowerCase();
    return labels.find(label => current.includes(label.toLowerCase())) || "";
}

function renderStatusControls(dep, hostTr) {
    const wrapper = document.createElement("div");
    wrapper.className = "status-group";

    const currentStatus = getPrimaryStatus(dep);
    wrapper.innerHTML = `
        <select class="status-dropdown">
            <option value="">Available</option>
            <option value="Scheduled Leave" ${currentStatus === "Scheduled Leave" ? "selected" : ""}>Scheduled Leave</option>
            <option value="Unscheduled Leave" ${currentStatus === "Unscheduled Leave" ? "selected" : ""}>Unscheduled Leave</option>
            <option value="Unavailable" ${currentStatus === "Unavailable" ? "selected" : ""}>Unavailable</option>
            <option value="Training" ${currentStatus === "Training" ? "selected" : ""}>Training</option>
        </select>
        <div class="small">Select an unavailable status to set date range.</div>
    `;

    const dropdown = wrapper.querySelector(".status-dropdown");
    dropdown.addEventListener("change", function() {
        const selectedDate = document.getElementById("rosterDate").value;
        if (!selectedDate) {
            alert("Please select a date first.");
            dropdown.value = currentStatus;
            return;
        }

        wrapper.querySelectorAll(".action-row").forEach(row => row.remove());

        if (!dropdown.value) {
            const statuses = ["Scheduled Leave", "Unscheduled Leave", "Unavailable", "Training"];
            Promise.all(statuses.map(status => fetch("/api/update-status-range", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    full_name: dep.full_name,
                    status,
                    start_date: selectedDate,
                    end_date: selectedDate,
                    remove_only: true
                })
            }))).then(() => loadRoster());
            return;
        }

        const rangeRow = document.createElement("div");
        rangeRow.className = "action-row";
        rangeRow.innerHTML = `
            <input type="date" class="start-date">
            <input type="date" class="end-date">
            <button type="button" class="apply-range">Apply</button>
            <button type="button" class="cancel-range">Cancel</button>
        `;

        const start = rangeRow.querySelector(".start-date");
        const end = rangeRow.querySelector(".end-date");
        start.value = selectedDate;
        end.value = selectedDate;

        rangeRow.querySelector(".apply-range").addEventListener("click", () => {
            if (!start.value || !end.value) {
                alert("Please select both start and end dates.");
                return;
            }
            if (start.value > end.value) {
                alert("Start date must be on or before end date.");
                return;
            }

            const statuses = ["Scheduled Leave", "Unscheduled Leave", "Unavailable", "Training"];
            Promise.all(statuses
                .filter(status => status !== dropdown.value)
                .map(status => fetch("/api/update-status-range", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        full_name: dep.full_name,
                        status,
                        start_date: start.value,
                        end_date: end.value,
                        remove_only: true
                    })
                })))
                .then(() => fetch("/api/update-status-range", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        full_name: dep.full_name,
                        status: dropdown.value,
                        start_date: start.value,
                        end_date: end.value
                    })
                }))
                .then(res => {
                    if (!res.ok) throw new Error('Failed to save status range');
                    return res.json();
                })
                .then(result => {
                    if (result.removed_assignments && result.removed_assignments > 0) {
                        alert(`Removed from ${result.removed_assignments} assignment(s).`);
                    }
                    rangeRow.remove();
                    loadRoster();
                    if (window.opener && typeof window.opener.search === "function") {
                        window.opener.search();
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Failed to save status range.');
                });
        });

        rangeRow.querySelector(".cancel-range").addEventListener("click", () => {
            rangeRow.remove();
            dropdown.value = currentStatus;
        });

        wrapper.appendChild(rangeRow);
    });

    return wrapper;
}

function createDeputyRow(dep, includeDivision) {
    const tr = document.createElement("tr");

    const rankDisplay = document.createElement("span");
    rankDisplay.textContent = dep.rank || "";

    const capabilityDisplay = document.createElement("span");
    capabilityDisplay.textContent = normalizeCapabilityTag(dep.capacity_tag || "");

    const rankSelect = document.createElement("select");
    buildOptions(rankSelect, rankOptions, dep.rank || "");
    rankSelect.style.display = "none";

    const capabilitySelect = document.createElement("select");
    buildOptions(capabilitySelect, capabilityOptions, normalizeCapabilityTag(dep.capacity_tag || ""));
    capabilitySelect.style.display = "none";

    const statusTd = document.createElement("td");
    statusTd.appendChild(renderStatusControls(dep, tr));

    const actionsTd = document.createElement("td");

    const editBtn = document.createElement("button");
    editBtn.type = "button";
    editBtn.textContent = "Edit";

    const saveBtn = document.createElement("button");
    saveBtn.type = "button";
    saveBtn.textContent = "Save";
    saveBtn.style.display = "none";

    editBtn.addEventListener("click", () => {
        rankDisplay.style.display = "none";
        capabilityDisplay.style.display = "none";
        rankSelect.style.display = "inline-block";
        capabilitySelect.style.display = "inline-block";
        editBtn.style.display = "none";
        saveBtn.style.display = "inline-block";
    });

    saveBtn.addEventListener("click", () => {
        fetch("/api/upsert-deputy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                original_full_name: dep.full_name,
                full_name: dep.full_name,
                division: dep.division || "",
                rank: rankSelect.value,
                capacity_tag: capabilitySelect.value
            })
        })
            .then(res => {
                if (!res.ok) throw new Error("Failed to save deputy updates");
                return res.json();
            })
            .then(() => loadRoster())
            .catch(err => {
                console.error(err);
                alert("Failed to save deputy updates.");
            });
    });

    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.textContent = "Remove";
    removeBtn.addEventListener("click", () => {
        if (!confirm(`Remove ${dep.full_name}?`)) return;
        fetch("/api/delete-deputy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ full_name: dep.full_name })
        }).then(() => loadRoster());
    });

    actionsTd.appendChild(editBtn);
    actionsTd.appendChild(saveBtn);
    actionsTd.appendChild(removeBtn);

    tr.appendChild(Object.assign(document.createElement("td"), { textContent: dep.full_name || "" }));
    if (includeDivision) tr.appendChild(Object.assign(document.createElement("td"), { textContent: dep.division || "Unassigned Division" }));

    const rankTd = document.createElement("td");
    rankTd.appendChild(rankDisplay);
    rankTd.appendChild(rankSelect);
    tr.appendChild(rankTd);

    const capabilityTd = document.createElement("td");
    capabilityTd.appendChild(capabilityDisplay);
    capabilityTd.appendChild(capabilitySelect);
    tr.appendChild(capabilityTd);

    tr.appendChild(statusTd);
    tr.appendChild(actionsTd);

    return tr;
}


function normalizeAssignmentLabel(value) {
    return (value || '').trim().toUpperCase();
}

function isInactiveCourtLabel(value) {
    const normalized = normalizeAssignmentLabel(value);
    return !normalized || [
        'DNS',
        'F/T',
        'FT',
        'NON-HEARING MOTIONS',
        'NON-HEARING MOTIONS, CIVIL'
    ].includes(normalized);
}


function getTotalNeededFromAssignments(assignments) {
    const rows = assignments || [];

    const MITCHELL_POSTS = [
        { post: "Calvert", detail: "8:00 AM", part: "0800-1" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-2" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-3" },
        { post: "Lexington", detail: "7:00 AM - 3:00 PM", part: "0700-1500" },
        { post: "Lexington", detail: "3:00 PM - 11:00 PM", part: "1500-2300" },
        { post: "Lexington", detail: "11:00 PM - 7:00 AM", part: "2300-0700" },
        { post: "Fayette H/C Console room", detail: "7:00 AM", part: "0700" },
        { post: "Fayette H/C Console room", detail: "7:15 AM", part: "0715" },
        { post: "Lock Up West", detail: "1 of 2", part: "OPEN-1" },
        { post: "Lock Up West", detail: "2 of 2", part: "OPEN-2" },
        { post: "Jury Room", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "8:30 AM", part: "0830" },
        { post: "Rover", detail: "7:00 AM", part: "0700" },
        { post: "Judges", detail: "7:00 AM", part: "0700" }
    ];

    const CUMMINGS_POSTS = [
        { post: "Cummings", detail: "8:00 AM", part: "0800" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-1" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-2" },
        { post: "Fayette St. H/C", detail: "7:15 AM", part: "0715" },
        { post: "Fayette St. H/C", detail: "9:00 AM", part: "0900" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-1" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-2" },
        { post: "Lock Up East", detail: "8:00 AM", part: "0800" },
        { post: "Garage", detail: "6:00 AM", part: "0600" },
        { post: "Garage", detail: "4:00 PM", part: "1600" },
        { post: "Family Court", detail: "8:00 AM", part: "0800" },
        { post: "Transportation", detail: "", part: "" }
    ];

    const totalPosts = MITCHELL_POSTS.length + CUMMINGS_POSTS.length;
    const totalCourts = rows.filter(row => {
        if ((row.assignment_type || '').trim() !== 'Courtroom') return false;
        const assignmentLabel = normalizeAssignmentLabel(row.assignment_notes || '');
        return !isInactiveCourtLabel(assignmentLabel);
    }).length;

    return totalPosts + totalCourts;
}


function updateCourtSecurityStatusCounts(deputies, totalNeeded) {
    const cs = deputies.filter(isCourtSecurityDeputy);
    const scheduledLeave = cs.filter(dep => statusIncludes(dep, "Scheduled Leave")).length;
    const unscheduledLeave = cs.filter(dep => statusIncludes(dep, "Unscheduled Leave")).length;
    const unavailable = cs.filter(dep => statusIncludes(dep, "Unavailable")).length;
    const training = cs.filter(dep => statusIncludes(dep, "Training")).length;

    const out = cs.filter(dep =>
        statusIncludes(dep, "Scheduled Leave") ||
        statusIncludes(dep, "Unscheduled Leave") ||
        statusIncludes(dep, "Unavailable") ||
        statusIncludes(dep, "Training")
    ).length;

    const available = Math.max(cs.length - out, 0);

    document.getElementById("courtSecurityStatusCounts").innerHTML = [
        `<span class="status-blue">Total Needed ${totalNeeded}</span>`,
        `<span class="status-green">Available ${available}</span>`,
        `<span class="status-red">Scheduled Leave ${scheduledLeave}</span>`,
        `<span class="status-orange">Unscheduled Leave ${unscheduledLeave}</span>`,
        `<span class="status-red">Unavailable ${unavailable}</span>`,
        `<span class="status-orange">Training ${training}</span>`
    ].join(' / ');
}

function loadRoster() {
    const date = document.getElementById("rosterDate").value;

    Promise.all([
        fetch(`/api/deputies?date=${date}`).then(res => res.json()),
        fetch(`/api/search?date=${date}`).then(res => res.json())
    ]).then(([deputiesData, assignments]) => {
        const deputies = (deputiesData || []).sort((a, b) => (a.full_name || "").localeCompare(b.full_name || ""));

        const csBody = document.querySelector("#courtSecurityTable tbody");
        const otherBody = document.querySelector("#otherDivisionsTable tbody");
        csBody.innerHTML = "";
        otherBody.innerHTML = "";

        deputies.forEach(dep => {
            if (isCourtSecurityDeputy(dep)) {
                csBody.appendChild(createDeputyRow(dep, false));
            } else {
                otherBody.appendChild(createDeputyRow(dep, true));
            }
        });

        const totalNeeded = getTotalNeededFromAssignments(assignments);
        updateCourtSecurityStatusCounts(deputies, totalNeeded);
    });
}

document.getElementById("addDeputyBtn").addEventListener("click", () => {
    const fullName = document.getElementById("newFullName").value.trim();
    const messageEl = document.getElementById("addDeputyMessage");
    messageEl.textContent = "";
    messageEl.className = "add-message";

    const parsedName = parseRosterName(fullName);
    if (!parsedName) {
        alert("Enter name as 'Last name, First name'");
        return;
    }

    const email = buildBaltimoreEmail(fullName);
    if (!email) {
        alert("Could not generate an email from that name.");
        return;
    }

    fetch("/api/upsert-deputy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            full_name: fullName,
            email,
            division: document.getElementById("newDivision").value,
            rank: document.getElementById("newRank").value,
            capacity_tag: document.getElementById("newCapability").value
        })
    }).then(async (res) => {
        if (!res.ok) {
            const payload = await res.json().catch(() => ({}));
            throw new Error(payload.message || "Could not add person.");
        }

        document.getElementById("newFullName").value = "";
        messageEl.textContent = `${fullName} was added succesfully`;
        messageEl.className = "add-message add-message-success";
        loadRoster();
    }).catch((err) => {
        messageEl.textContent = err.message || "Could not add person.";
        messageEl.className = "add-message add-message-error";
    });
});

document.getElementById("rosterDate").addEventListener("change", loadRoster);
document.getElementById("rosterDate").value = new Date().toISOString().split("T")[0];
loadRoster();
</script>

</body>
</html>
