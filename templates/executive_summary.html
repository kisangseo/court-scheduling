<!DOCTYPE html>
<html>
<head>
    <title>Executive Summary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .summary-wrapper {
            padding: 20px;
        }

        .summary-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .summary-table th,
        .summary-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        .summary-table th {
            background: #f5f7fa;
        }

        .summary-table td.metric-label {
            text-align: left;
            font-weight: 600;
            background: #fafafa;
        }

        .status-note {
            margin-top: 12px;
            color: #555;
            font-size: 0.95rem;
        }

        .error-text {
            color: #b00020;
            font-weight: 600;
        }

        .metric-brown {
            color: #8b4513;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="summary-wrapper">
    <h2>Executive Summary</h2>
    <button type="button" onclick="window.location.href='/'">Return to Main</button>

    <div class="summary-controls">
        <label for="summaryDate"><strong>Select a date:</strong></label>
        <input type="date" id="summaryDate">
        <button id="refreshSummaryBtn">Refresh</button>
    </div>

    <div id="summaryContent"></div>
    <div id="summaryStatus" class="status-note"></div>
</div>

<script>
const summaryDateInput = document.getElementById('summaryDate');
const refreshSummaryBtn = document.getElementById('refreshSummaryBtn');
const summaryContent = document.getElementById('summaryContent');
const summaryStatus = document.getElementById('summaryStatus');

function normalizeAssignmentLabel(value) {
    return (value || '').trim().toUpperCase();
}

function getSlotState(assignmentType, assignmentLabel, hasAssignedMember) {
    const type = (assignmentType || '').trim();

    if (type === 'Fixed Post') {
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    if (type === 'Courtroom') {
        const normalized = normalizeAssignmentLabel(assignmentLabel);
        if (!normalized || normalized === 'DNS') return 'inactive';
        if (normalized === 'OPEN') return 'open';
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    return 'inactive';
}

function pickPreferredRow(rows) {
    return (rows || []).find(r => (r.assigned_member || '').trim()) || (rows || [])[0] || null;
}

function getNeededBreakdownFromAssignments(assignments) {
    const rows = assignments || [];

    const MITCHELL_POSTS = [
        { post: "Calvert", detail: "8:00 AM", part: "0800-1" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-2" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-3" },
        { post: "Lexington", detail: "7:00 AM - 3:00 PM", part: "0700-1500" },
        { post: "Lexington", detail: "3:00 PM - 11:00 PM", part: "1500-2300" },
        { post: "Lexington", detail: "11:00 PM - 7:00 AM", part: "2300-0700" },
        { post: "Fayette H/C Console room", detail: "7:00 AM", part: "0700" },
        { post: "Fayette H/C Console room", detail: "7:15 AM", part: "0715" },
        { post: "Lock Up West", detail: "1 of 2", part: "OPEN-1" },
        { post: "Lock Up West", detail: "2 of 2", part: "OPEN-2" },
        { post: "Jury Room", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "8:30 AM", part: "0830" },
        { post: "Rover", detail: "7:00 AM", part: "0700" },
        { post: "Judges", detail: "7:00 AM", part: "0700" }
    ];

    const CUMMINGS_POSTS = [
        { post: "Cummings", detail: "8:00 AM", part: "0800" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-1" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-2" },
        { post: "Fayette St. H/C", detail: "7:15 AM", part: "0715" },
        { post: "Fayette St. H/C", detail: "9:00 AM", part: "0900" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-1" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-2" },
        { post: "Lock Up East", detail: "8:00 AM", part: "0800" },
        { post: "Garage", detail: "6:00 AM", part: "0600" },
        { post: "Garage", detail: "4:00 PM", part: "1600" },
        { post: "Family Court", detail: "8:00 AM", part: "0800" },
        { post: "Transportation", detail: "", part: "" }
    ];

    const MITCHELL_ROOMS = ["600M","636M","231M","417M","556C","215M","441M","309M","228C","226M","420M","400M","236M","203M","451M","438M"];
    const CUMMINGS_ROOMS = ["225C","201C","430C","329C","230C","227C","540C","404C","523C","528C","113C"];

    const breakdown = { courts: 0, posts: 0 };

    function countPostSlots(courthouseName, slots) {
        const postRows = rows.filter(r => (r.assignment_type || '').trim() === 'Fixed Post' && (r.courthouse || '').trim() === courthouseName);

        slots.forEach(slot => {
            const slotMatches = postRows.filter(r =>
                r.location_group === slot.post && (
                    (slot.part && r.part === slot.part) ||
                    (slot.detail && r.location_detail === slot.detail) ||
                    (!slot.part && !slot.detail)
                )
            );
            const fallbackMatches = postRows.filter(r => r.location_group === slot.post && !r.part && !r.location_detail);
            const row = pickPreferredRow(slotMatches) || pickPreferredRow(fallbackMatches);
            const state = getSlotState('Fixed Post', '', !!(row && (row.assigned_member || '').trim()));
            if (state === 'vacant' || state === 'open') breakdown.posts += 1;
        });
    }

    function countCourtroomSlots(courthouseName, roomList) {
        const courtRows = rows.filter(r => (r.assignment_type || '').trim() === 'Courtroom' && (r.courthouse || '').trim() === courthouseName);
        roomList.forEach(room => {
            const row = pickPreferredRow(courtRows.filter(r => r.location_detail === room));
            const state = getSlotState('Courtroom', row ? (row.assignment_notes || '') : '', !!(row && (row.assigned_member || '').trim()));
            if (state === 'vacant' || state === 'open') breakdown.courts += 1;
        });
    }

    countPostSlots('Mitchell', MITCHELL_POSTS);
    countPostSlots('Cummings', CUMMINGS_POSTS);
    countCourtroomSlots('Mitchell', MITCHELL_ROOMS);
    countCourtroomSlots('Cummings', CUMMINGS_ROOMS);

    const juvenileCourtRows = rows.filter(r =>
        (r.assignment_type || '').trim() === 'Courtroom' &&
        (r.courthouse || '').trim() === 'Juvenile'
    );

    juvenileCourtRows.forEach(row => {
        const state = getSlotState('Courtroom', row.assignment_notes || '', (row.assigned_member || '').trim().length > 0);
        if (state === 'vacant' || state === 'open') breakdown.courts += 1;
    });

    return {
        courts: breakdown.courts,
        posts: breakdown.posts,
        total: breakdown.courts + breakdown.posts
    };
}


function formatDateISO(dateObj) {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

function getMonday(dateObj) {
    const date = new Date(dateObj);
    const day = date.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    date.setDate(date.getDate() + diff);
    return date;
}

function buildWorkWeek(dateObj) {
    const monday = getMonday(dateObj);
    return Array.from({ length: 5 }, (_, idx) => {
        const day = new Date(monday);
        day.setDate(monday.getDate() + idx);
        return day;
    });
}

function isCourtSecurity(deputy) {
    const division = (deputy.division || '').trim().toLowerCase();
    return division === 'court security' || division === 'court security division';
}

function getUnavailableBreakdown(status) {
    const normalized = (status || '').toLowerCase();
    return {
        sick: normalized.includes('sick') ? 1 : 0,
        unavailable: normalized.includes('unavailable') ? 1 : 0,
        leave: normalized.includes('leave') ? 1 : 0,
        callout: normalized.includes('callout') ? 1 : 0
    };
}

function parseAssignedMemberValue(value) {
    const text = (value || '').trim();
    if (!text) return [];

    if (text.includes('||')) {
        return text.split(/\s*\|\|\s*/).map(name => name.trim()).filter(Boolean);
    }

    if (text.includes('\n')) {
        return text.split(/\n+/).map(name => name.trim()).filter(Boolean);
    }

    return [text];
}

function normalizeDeputyName(value) {
    return (value || '').trim().toLowerCase();
}

function countHighProfileCases(courtroomMetaRows) {
    return (courtroomMetaRows || []).filter(row => !!row.is_high_profile).length;
}

function countAssignedCourts(assignments) {
    return (assignments || []).filter(row => {
        if ((row.assignment_type || '').trim() !== 'Courtroom') return false;
        const assignmentLabel = normalizeAssignmentLabel(row.assignment_notes || '');
        if (!assignmentLabel) return false;
        return assignmentLabel !== 'DNS';
    }).length;
}

function countBorrowedDeputies(assignments, deputies) {
    const deputyByName = new Map(
        deputies.map(dep => [normalizeDeputyName(dep.full_name), dep])
    );

    const borrowed = new Set();

    assignments.forEach(assignment => {
        parseAssignedMemberValue(assignment.assigned_member).forEach(name => {
            const normalizedName = normalizeDeputyName(name);
            if (!normalizedName) return;

            const deputy = deputyByName.get(normalizedName);
            if (!deputy) return;
            if (isCourtSecurity(deputy)) return;

            borrowed.add(normalizedName);
        });
    });

    return borrowed.size;
}

async function loadSummary() {
    const selectedValue = summaryDateInput.value;
    if (!selectedValue) return;

    summaryStatus.textContent = 'Loading summary...';
    summaryContent.innerHTML = '';

    try {
        const baseDate = new Date(`${selectedValue}T00:00:00`);
        const weekDates = buildWorkWeek(baseDate);

        const dayResults = await Promise.all(weekDates.map(async (dateObj) => {
            const dayIso = formatDateISO(dateObj);

            const [deputiesRes, assignmentsRes, courtroomMetaRes] = await Promise.all([
                fetch(`/api/deputies?date=${encodeURIComponent(dayIso)}`),
                fetch(`/api/search?date=${encodeURIComponent(dayIso)}`),
                fetch(`/api/get-courtroom-meta?date=${encodeURIComponent(dayIso)}`)
            ]);

            if (!deputiesRes.ok) {
                throw new Error(`Failed to load deputies for ${dayIso}`);
            }

            if (!assignmentsRes.ok) {
                throw new Error(`Failed to load assignments for ${dayIso}`);
            }

            if (!courtroomMetaRes.ok) {
                throw new Error(`Failed to load courtroom metadata for ${dayIso}`);
            }

            const deputies = await deputiesRes.json();
            const assignments = await assignmentsRes.json();
            const courtroomMetaRows = await courtroomMetaRes.json();
            const courtSecurityDeputies = deputies.filter(isCourtSecurity);
            const unavailableBreakdown = courtSecurityDeputies.reduce((totals, dep) => {
                const breakdown = getUnavailableBreakdown(dep.current_status);
                totals.sick += breakdown.sick;
                totals.unavailable += breakdown.unavailable;
                totals.leave += breakdown.leave;
                totals.callout += breakdown.callout;
                return totals;
            }, { sick: 0, unavailable: 0, leave: 0, callout: 0 });
            const unavailableAnyCount = courtSecurityDeputies.filter(dep => {
                const breakdown = getUnavailableBreakdown(dep.current_status);
                return breakdown.sick || breakdown.unavailable || breakdown.leave || breakdown.callout;
            }).length;
            const availableCount = courtSecurityDeputies.length - unavailableAnyCount;
            const borrowedCount = countBorrowedDeputies(assignments, deputies);
            const neededBreakdown = getNeededBreakdownFromAssignments(assignments);
            const highProfileCaseCount = countHighProfileCases(courtroomMetaRows);
            const assignedCourtsCount = countAssignedCourts(assignments);

            return {
                label: dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' }),
                needed: neededBreakdown.total,
                neededCourts: neededBreakdown.courts,
                neededPosts: neededBreakdown.posts,
                available: availableCount,
                highProfileCases: highProfileCaseCount,
                assignedCourts: assignedCourtsCount,
                unavailableBreakdown,
                borrowed: borrowedCount
            };
        }));

        renderSummary(dayResults);
        summaryStatus.textContent = 'Summary refreshed successfully.';
    } catch (error) {
        summaryContent.innerHTML = `<div class="error-text">Unable to load executive summary.</div>`;
        summaryStatus.textContent = error.message;
    }
}

function renderSummary(dayResults) {
    const headers = dayResults.map(day => `<th>${day.label}</th>`).join('');
    const neededCells = dayResults.map(day => `<td><span class="metric-brown">Court: ${day.neededCourts || 0}</span> / <span class="metric-brown">Posts: ${day.neededPosts || 0}</span></td>`).join('');
    const availableCells = dayResults.map(day => `<td>${day.available}</td>`).join('');
    const highProfileCells = dayResults.map(day => `<td>${day.highProfileCases || 0}</td>`).join('');
    const assignedCourtsCells = dayResults.map(day => `<td>${day.assignedCourts || 0}</td>`).join('');
    const sickCells = dayResults.map(day => `<td>Sick: ${day.unavailableBreakdown.sick}</td>`).join('');
    const unavailableCells = dayResults.map(day => `<td>Unavailable: ${day.unavailableBreakdown.unavailable}</td>`).join('');
    const leaveCells = dayResults.map(day => `<td>Leave: ${day.unavailableBreakdown.leave}</td>`).join('');
    const calloutCells = dayResults.map(day => `<td>Callout: ${day.unavailableBreakdown.callout}</td>`).join('');
    const borrowedCells = dayResults.map(day => `<td>${day.borrowed}</td>`).join('');

    summaryContent.innerHTML = `
        <table class="summary-table">
            <thead>
                <tr>
                    <th>Metric</th>
                    ${headers}
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="metric-label">Personnel Needed</td>
                    ${neededCells}
                </tr>
                <tr>
                    <td class="metric-label">Available in Division (Court Security)</td>
                    ${availableCells}
                </tr>
                <tr>
                    <td class="metric-label">High Profile Case</td>
                    ${highProfileCells}
                </tr>
                <tr>
                    <td class="metric-label">Assigned Courts</td>
                    ${assignedCourtsCells}
                </tr>
                <tr>
                    <td class="metric-label">Number Unavailable Breakdown</td>
                    ${sickCells}
                </tr>
                <tr>
                    <td class="metric-label">&nbsp;</td>
                    ${unavailableCells}
                </tr>
                <tr>
                    <td class="metric-label">&nbsp;</td>
                    ${leaveCells}
                </tr>
                <tr>
                    <td class="metric-label">&nbsp;</td>
                    ${calloutCells}
                </tr>
                <tr>
                    <td class="metric-label">Borrowed Deputies</td>
                    ${borrowedCells}
                </tr>
            </tbody>
        </table>
    `;
}

function initializeDate() {
    const now = new Date();
    summaryDateInput.value = formatDateISO(now);
    loadSummary();
}

refreshSummaryBtn.addEventListener('click', loadSummary);
summaryDateInput.addEventListener('change', loadSummary);

initializeDate();
</script>
</body>
</html>
