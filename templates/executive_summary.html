<!DOCTYPE html>
<html>
<head>
    <title>Executive Summary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .summary-wrapper {
            padding: 20px;
        }

        .summary-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .summary-table th,
        .summary-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        .summary-table th {
            background: #f5f7fa;
        }

        .summary-table td.metric-label {
            text-align: left;
            font-weight: 600;
            background: #fafafa;
        }

        .status-note {
            margin-top: 12px;
            color: #555;
            font-size: 0.95rem;
        }

        .error-text {
            color: #b00020;
            font-weight: 600;
        }

        .metric-brown {
            color: #8b4513;
            font-weight: 700;
        }

        .metric-green {
            color: #1b7f3b;
            font-weight: 700;
        }

        .metric-blue {
            color: #1b4fd6;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="summary-wrapper">
    <h2>Executive Summary</h2>
    <button type="button" onclick="window.location.href='/'">Return to Main</button>

    <div class="summary-controls">
        <label for="summaryDate"><strong>Select a date:</strong></label>
        <input type="date" id="summaryDate">
        <button id="refreshSummaryBtn">Refresh</button>
        <label for="summaryDetailToggle"><strong>Detail</strong></label>
        <input type="checkbox" id="summaryDetailToggle">
    </div>

    <div id="summaryContent"></div>
    <div id="summaryStatus" class="status-note"></div>
</div>

<script>
const summaryDateInput = document.getElementById('summaryDate');
const refreshSummaryBtn = document.getElementById('refreshSummaryBtn');
const summaryContent = document.getElementById('summaryContent');
const summaryStatus = document.getElementById('summaryStatus');
const summaryDetailToggle = document.getElementById('summaryDetailToggle');
let showSummaryDetail = false;
let latestDayResults = [];

function normalizeAssignmentLabel(value) {
    return (value || '').trim().toUpperCase();
}

function shouldCountFixedPostSlot(slotMeta = {}) {
    const courthouse = (slotMeta.courthouse || '').trim().toLowerCase();
    const post = (slotMeta.post || '').trim().toLowerCase();
    const part = (slotMeta.part || '').trim().toLowerCase();

    if (courthouse === 'mitchell' && post === 'calvert' && part === '0800-3') return false;
    if (courthouse === 'cummings' && post === 'cummings' && part === '0830-2') return false;
    if (post === 'transportation') return false;
    return true;
}

function getSlotState(assignmentType, assignmentLabel, hasAssignedMember, slotMeta = {}) {
    const type = (assignmentType || '').trim();

    if (type === 'Fixed Post') {
        if (!shouldCountFixedPostSlot(slotMeta)) return 'inactive';
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    if (type === 'Courtroom') {
        const normalized = normalizeAssignmentLabel(assignmentLabel);
        if (!normalized || normalized === 'DNS') return 'inactive';
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    return 'inactive';
}



function getNeededBreakdownFromAssignments(assignments) {
    const rows = assignments || [];

    const MITCHELL_POSTS = [
        { post: "Calvert", detail: "8:00 AM", part: "0800-1" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-2" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-3" },
        { post: "Lexington", detail: "7:00 AM - 3:00 PM", part: "0700-1500" },
        { post: "Lexington", detail: "3:00 PM - 11:00 PM", part: "1500-2300" },
        { post: "Lexington", detail: "11:00 PM - 7:00 AM", part: "2300-0700" },
        { post: "Fayette H/C Console room", detail: "7:00 AM", part: "0700" },
        { post: "Fayette H/C Console room", detail: "7:15 AM", part: "0715" },
        { post: "Lock Up West", detail: "1 of 2", part: "OPEN-1" },
        { post: "Lock Up West", detail: "2 of 2", part: "OPEN-2" },
        { post: "Jury Room", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "8:30 AM", part: "0830" },
        { post: "Rover", detail: "7:00 AM", part: "0700" },
        { post: "Judges", detail: "7:00 AM", part: "0700" }
    ];

    const CUMMINGS_POSTS = [
        { post: "Cummings", detail: "8:00 AM", part: "0800" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-1" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-2" },
        { post: "Fayette St. H/C", detail: "7:15 AM", part: "0715" },
        { post: "Fayette St. H/C", detail: "9:00 AM", part: "0900" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-1" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-2" },
        { post: "Lock Up East", detail: "8:00 AM", part: "0800" },
        { post: "Garage", detail: "6:00 AM", part: "0600" },
        { post: "Garage", detail: "4:00 PM", part: "1600" },
        { post: "Family Court", detail: "8:00 AM", part: "0800" },
        { post: "Transportation", detail: "", part: "" }
    ];

    const breakdown = {
        courts: countAssignedCourts(rows),
        posts: MITCHELL_POSTS.length + CUMMINGS_POSTS.length
    };

    return {
        courts: breakdown.courts,
        posts: breakdown.posts,
        total: breakdown.courts + breakdown.posts
    };
}


function formatDateISO(dateObj) {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

function getMonday(dateObj) {
    const date = new Date(dateObj);
    const day = date.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    date.setDate(date.getDate() + diff);
    return date;
}

function buildWorkWeek(dateObj) {
    const monday = getMonday(dateObj);
    return Array.from({ length: 5 }, (_, idx) => {
        const day = new Date(monday);
        day.setDate(monday.getDate() + idx);
        return day;
    });
}

function isCourtSecurity(deputy) {
    const division = (deputy.division || '').trim().toLowerCase();
    return division === 'court security' || division === 'court security division';
}

function getUnavailableBreakdown(status) {
    const normalized = (status || '').toLowerCase();
    return {
        sick: normalized.includes('sick') ? 1 : 0,
        unavailable: normalized.includes('unavailable') ? 1 : 0,
        leave: normalized.includes('leave') ? 1 : 0,
        callout: normalized.includes('callout') ? 1 : 0
    };
}

function normalizeStatus(status) {
    return (status || '').toString().trim().toLowerCase();
}

function isOutStatus(status) {
    const normalized = normalizeStatus(status);
    if (!normalized) return false;

    return normalized.includes('sick')
        || normalized.includes('leave')
        || normalized.includes('light duty')
        || normalized === 'ld'
        || normalized.includes(' ld')
        || normalized.includes('unavailable')
        || normalized.includes('callout')
        || normalized.includes('out');
}

function normalizeCapacityTag(deputy) {
    return (deputy.capacity_tag || deputy.capability_tag || '').toString().trim().toUpperCase();
}

function isCourtCapable(deputy) {
    const tag = normalizeCapacityTag(deputy);
    return tag === 'F' || tag === 'SPO';
}

function parseAssignedMemberValue(value) {
    const text = (value || '').trim();
    if (!text) return [];

    if (text.includes('||')) {
        return text.split(/\s*\|\|\s*/).map(name => name.trim()).filter(Boolean);
    }

    if (text.includes('\n')) {
        return text.split(/\n+/).map(name => name.trim()).filter(Boolean);
    }

    return [text];
}

function normalizeDeputyName(value) {
    return (value || '').trim().toLowerCase();
}

function countHighProfileCases(courtroomMetaRows) {
    return (courtroomMetaRows || []).filter(row => !!row.is_high_profile).length;
}

function countAssignedCourts(assignments) {
    return (assignments || []).filter(row => {
        if ((row.assignment_type || '').trim() !== 'Courtroom') return false;
        const assignmentLabel = normalizeAssignmentLabel(row.assignment_notes || '');
        if (!assignmentLabel) return false;
        return assignmentLabel !== 'DNS';
    }).length;
}

function getSearchPageCourtroomRowsForCounts(assignments) {
    const courtroomRows = (assignments || []).filter(row => (row.assignment_type || '').trim() === 'Courtroom');
    const MITCHELL_ROOMS = ["600M","636M","231M","417M","556C","215M","441M","309M","228C","226M","420M","400M","236M","203M","451M","438M"];
    const CUMMINGS_ROOMS = ["225C","201C","430C","329C","230C","227C","540C","404C","523C","528C","113C"];

    const rowsToCount = [];

    const appendCourthouseRooms = (courthouse, rooms) => {
        const courtRows = courtroomRows.filter(row => (row.courthouse || '').trim() === courthouse);
        rooms.forEach(room => {
            const match = courtRows.find(row => (row.location_detail || '').trim() === room);
            rowsToCount.push(match || { assignment_type: 'Courtroom', assignment_notes: '', assigned_member: '' });
        });
    };

    appendCourthouseRooms('Mitchell', MITCHELL_ROOMS);
    appendCourthouseRooms('Cummings', CUMMINGS_ROOMS);

    const juvenileRows = courtroomRows.filter(row => (row.courthouse || '').trim() === 'Juvenile');
    juvenileRows.forEach(row => rowsToCount.push(row));

    return rowsToCount;
}

function getSearchPageFixedPostRowsForCounts(assignments) {
    const allFixedPosts = (assignments || []).filter(row => (row.assignment_type || '').trim() === 'Fixed Post');

    const MITCHELL_POSTS = [
        { post: "Calvert", detail: "8:00 AM", part: "0800-1" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-2" },
        { post: "Calvert", detail: "8:00 AM", part: "0800-3" },
        { post: "Lexington", detail: "7:00 AM - 3:00 PM", part: "0700-1500" },
        { post: "Lexington", detail: "3:00 PM - 11:00 PM", part: "1500-2300" },
        { post: "Lexington", detail: "11:00 PM - 7:00 AM", part: "2300-0700" },
        { post: "Fayette H/C Console room", detail: "7:00 AM", part: "0700" },
        { post: "Fayette H/C Console room", detail: "7:15 AM", part: "0715" },
        { post: "Lock Up West", detail: "1 of 2", part: "OPEN-1" },
        { post: "Lock Up West", detail: "2 of 2", part: "OPEN-2" },
        { post: "Jury Room", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "7:30 AM", part: "0730" },
        { post: "St. Paul", detail: "8:30 AM", part: "0830" },
        { post: "Rover", detail: "7:00 AM", part: "0700" },
        { post: "Judges", detail: "7:00 AM", part: "0700" }
    ];

    const CUMMINGS_POSTS = [
        { post: "Cummings", detail: "8:00 AM", part: "0800" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-1" },
        { post: "Cummings", detail: "8:30 AM", part: "0830-2" },
        { post: "Fayette St. H/C", detail: "7:15 AM", part: "0715" },
        { post: "Fayette St. H/C", detail: "9:00 AM", part: "0900" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-1" },
        { post: "Console Room", detail: "8:30 AM", part: "0830-2" },
        { post: "Lock Up East", detail: "8:00 AM", part: "0800" },
        { post: "Garage", detail: "6:00 AM", part: "0600" },
        { post: "Garage", detail: "4:00 PM", part: "1600" },
        { post: "Family Court", detail: "8:00 AM", part: "0800" },
        { post: "Transportation", detail: "", part: "" }
    ];

    const pickPreferredRow = (rows) => (rows || []).find(r => (r.assigned_member || '').trim()) || (rows || [])[0] || null;

    const buildSlots = (courthouse, posts) => {
        const postsType = allFixedPosts.filter(row => (row.courthouse || '').trim() === courthouse);
        return posts.map(slot => {
            const slotMatches = postsType.filter(row => {
                if ((row.location_group || '').trim() !== slot.post) return false;
                if (slot.part && (row.part || '').trim() === slot.part) return true;
                if (slot.detail && (row.location_detail || '').trim() === slot.detail) return true;
                if (!slot.part && !slot.detail) return true;
                return false;
            });
            const fallbackMatches = postsType.filter(row => (row.location_group || '').trim() === slot.post && !(row.part || '').trim() && !(row.location_detail || '').trim());
            const selected = pickPreferredRow(slotMatches) || pickPreferredRow(fallbackMatches);
            return selected || {
                assignment_type: 'Fixed Post',
                assignment_notes: '',
                assigned_member: '',
                courthouse,
                location_group: slot.post,
                part: slot.part || ''
            };
        });
    };

    return [
        ...buildSlots('Mitchell', MITCHELL_POSTS),
        ...buildSlots('Cummings', CUMMINGS_POSTS)
    ];
}

function getAssignmentTotals(assignments) {
    const relevantRows = [
        ...getSearchPageFixedPostRowsForCounts(assignments),
        ...getSearchPageCourtroomRowsForCounts(assignments)
    ];

    const totals = { vacant: 0, filled: 0 };

    relevantRows.forEach(row => {
        const hasAssignedMember = (row.assigned_member || '').trim().length > 0;
        const slotState = getSlotState(row.assignment_type, row.assignment_notes || '', hasAssignedMember, {
            courthouse: row.courthouse,
            post: row.location_group,
            part: row.part
        });

        if (slotState === 'vacant') totals.vacant += 1;
        else if (slotState === 'filled') totals.filled += 1;
    });

    return totals;
}

function countBorrowedDeputies(assignments, deputies) {
    const deputyByName = new Map(
        deputies.map(dep => [normalizeDeputyName(dep.full_name), dep])
    );

    const borrowed = new Set();

    assignments.forEach(assignment => {
        parseAssignedMemberValue(assignment.assigned_member).forEach(name => {
            const normalizedName = normalizeDeputyName(name);
            if (!normalizedName) return;

            const deputy = deputyByName.get(normalizedName);
            if (!deputy) return;
            if (isCourtSecurity(deputy)) return;

            borrowed.add(normalizedName);
        });
    });

    return borrowed.size;
}

async function loadSummary() {
    const selectedValue = summaryDateInput.value;
    if (!selectedValue) return;

    summaryStatus.textContent = 'Loading summary...';
    summaryContent.innerHTML = '';

    try {
        const baseDate = new Date(`${selectedValue}T00:00:00`);
        const weekDates = buildWorkWeek(baseDate);

        const dayResults = await Promise.all(weekDates.map(async (dateObj) => {
            const dayIso = formatDateISO(dateObj);

            const [deputiesRes, assignmentsRes, courtroomMetaRes] = await Promise.all([
                fetch(`/api/deputies?date=${encodeURIComponent(dayIso)}`),
                fetch(`/api/search?date=${encodeURIComponent(dayIso)}`),
                fetch(`/api/get-courtroom-meta?date=${encodeURIComponent(dayIso)}`)
            ]);

            if (!deputiesRes.ok) {
                throw new Error(`Failed to load deputies for ${dayIso}`);
            }

            if (!assignmentsRes.ok) {
                throw new Error(`Failed to load assignments for ${dayIso}`);
            }

            if (!courtroomMetaRes.ok) {
                throw new Error(`Failed to load courtroom metadata for ${dayIso}`);
            }

            const deputies = await deputiesRes.json();
            const assignments = await assignmentsRes.json();
            const courtroomMetaRows = await courtroomMetaRes.json();
            const courtSecurityDeputies = deputies.filter(isCourtSecurity);
            const unavailableBreakdown = courtSecurityDeputies.reduce((totals, dep) => {
                const breakdown = getUnavailableBreakdown(dep.current_status);
                totals.sick += breakdown.sick;
                totals.unavailable += breakdown.unavailable;
                totals.leave += breakdown.leave;
                totals.callout += breakdown.callout;
                return totals;
            }, { sick: 0, unavailable: 0, leave: 0, callout: 0 });
            const availableCourtSecurity = courtSecurityDeputies.filter(dep => !isOutStatus(dep.current_status));
            const availableCount = availableCourtSecurity.length;
            const availableCourtCapableCount = availableCourtSecurity.filter(isCourtCapable).length;
            const availableArmedCount = availableCourtCapableCount;
            const availableUnarmedCount = Math.max(availableCount - availableArmedCount, 0);
            const borrowedCount = countBorrowedDeputies(assignments, deputies);
            const neededBreakdown = getNeededBreakdownFromAssignments(assignments);
            const assignmentTotals = getAssignmentTotals(assignments);
            const highProfileCaseCount = countHighProfileCases(courtroomMetaRows);
            return {
                label: dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' }),
                needed: neededBreakdown.total,
                neededCourts: neededBreakdown.courts,
                neededPosts: neededBreakdown.posts,
                available: availableCount,
                availableCourts: availableCourtCapableCount,
                availablePostsArmed: availableArmedCount,
                availablePostsUnarmed: availableUnarmedCount,
                assignmentTotals,
                highProfileCases: highProfileCaseCount,
                unavailableBreakdown,
                borrowed: borrowedCount
            };
        }));

        latestDayResults = dayResults;
        renderSummary(dayResults);
        summaryStatus.textContent = 'Summary refreshed successfully.';
    } catch (error) {
        summaryContent.innerHTML = `<div class="error-text">Unable to load executive summary.</div>`;
        summaryStatus.textContent = error.message;
    }
}

function renderSummary(dayResults) {
    const headers = dayResults.map(day => `<th>${day.label}</th>`).join('');
    const neededCells = showSummaryDetail
        ? dayResults.map(day => `<td><span class="metric-brown">Court: ${day.neededCourts || 0}</span> / <span class="metric-green">Posts: ${day.neededPosts || 0}</span> <span class="metric-blue">Total: ${day.needed || 0}</span></td>`).join('')
        : dayResults.map(day => `<td><span class="metric-blue">Total: ${day.needed || 0}</span></td>`).join('');
    const availableCells = showSummaryDetail
        ? dayResults.map(day => `<td><span class="metric-brown">Court: ${day.availableCourts || 0}</span> / <span class="metric-green">Posts: ${day.availablePostsArmed || 0}(a), ${day.availablePostsUnarmed || 0}(ua)</span> <span class="metric-blue">Total: ${day.available || 0}</span></td>`).join('')
        : dayResults.map(day => `<td><span class="metric-blue">Total: ${day.available || 0}</span></td>`).join('');
    const assignmentCounterCells = dayResults.map(day =>
  `<td><span class="metric-red">Vacant ${day.assignmentTotals?.vacant || 0}</span> / ` +
  `<span class="metric-green">Filled ${day.assignmentTotals?.filled || 0}</span></td>`
).join('');
    const highProfileCells = dayResults.map(day => `<td>${day.highProfileCases || 0}</td>`).join('');
    const unavailableTotalCells = dayResults.map(day => {
        const breakdown = day.unavailableBreakdown || { sick: 0, unavailable: 0, leave: 0, callout: 0 };
        const total = (breakdown.sick || 0) + (breakdown.unavailable || 0) + (breakdown.leave || 0) + (breakdown.callout || 0);
        return `<td>${total}</td>`;
    }).join('');
    const leaveCells = dayResults.map(day => `<td>Scheduled Leave: ${day.unavailableBreakdown?.leave || 0}</td>`).join('');
    const unavailableCells = dayResults.map(day => `<td>Unavailable: ${day.unavailableBreakdown?.unavailable || 0}</td>`).join('');
    const sickCells = dayResults.map(day => `<td>Sick: ${day.unavailableBreakdown?.sick || 0}</td>`).join('');
    const calloutCells = dayResults.map(day => `<td>Callout: ${day.unavailableBreakdown?.callout || 0}</td>`).join('');
    const borrowedCells = dayResults.map(day => `<td>${day.borrowed}</td>`).join('');

    const unavailableRows = showSummaryDetail
        ? `
                <tr>
                    <td class="metric-label">Unavailable</td>
                    ${leaveCells}
                </tr>
                <tr>
                    <td class="metric-label">&nbsp;</td>
                    ${unavailableCells}
                </tr>
                <tr>
                    <td class="metric-label">&nbsp;</td>
                    ${sickCells}
                </tr>
                <tr>
                    <td class="metric-label">&nbsp;</td>
                    ${calloutCells}
                </tr>`
        : `
                <tr>
                    <td class="metric-label">Unavailable</td>
                    ${unavailableTotalCells}
                </tr>`;

    summaryContent.innerHTML = `
        <table class="summary-table">
            <thead>
                <tr>
                    <th>Metric</th>
                    ${headers}
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="metric-label">Personnel Needed</td>
                    ${neededCells}
                </tr>
                <tr>
                    <td class="metric-label">Available in Division (Court Security)</td>
                    ${availableCells}
                </tr>
                <tr>
                    <td class="metric-label">Daily Status</td>
                    ${assignmentCounterCells}
                </tr>
                <tr>
                    <td class="metric-label">High Profile Case</td>
                    ${highProfileCells}
                </tr>
                ${unavailableRows}
                <tr>
                    <td class="metric-label">Borrowed Deputies</td>
                    ${borrowedCells}
                </tr>
            </tbody>
        </table>
    `;

}

function initializeDate() {
    const now = new Date();
    const urlParams = new URLSearchParams(window.location.search);
    const urlDate = urlParams.get('date');
    const savedDate = localStorage.getItem('searchPageDate');

    summaryDateInput.value = urlDate || savedDate || formatDateISO(now);
    loadSummary();
}

summaryDetailToggle.addEventListener('change', () => {
    showSummaryDetail = summaryDetailToggle.checked;
    renderSummary(latestDayResults);
});
refreshSummaryBtn.addEventListener('click', loadSummary);
summaryDateInput.addEventListener('change', loadSummary);
summaryDateInput.addEventListener('change', () => {
    localStorage.setItem('searchPageDate', summaryDateInput.value || '');
});
initializeDate();
</script>
</body>
</html>
