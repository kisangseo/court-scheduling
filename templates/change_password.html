<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .auth-wrap { max-width: 460px; margin: 80px auto; padding: 24px; border: 1px solid #d0d5dd; border-radius: 12px; }
        .auth-wrap h2 { margin-top: 0; }
        .auth-field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .error { color: #b42318; font-weight: 700; margin-bottom: 10px; }
        .note { margin-bottom: 12px; color: #344054; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <h2>Change Temporary Password</h2>
    <div class="note">You must set a new password before using the app.</div>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
        <div class="auth-field">
            <label for="new_password">New Password</label>
            <input id="new_password" name="new_password" type="password" minlength="8" required autofocus>
        </div>
        <div class="auth-field">
            <label for="confirm_password">Confirm New Password</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="8" required>
        </div>
        <button type="submit">Update Password</button>
    </form>
</div>
</body>
</html>
