<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .auth-wrap { max-width: 420px; margin: 80px auto; padding: 24px; border: 1px solid #d0d5dd; border-radius: 12px; }
        .auth-wrap h2 { margin-top: 0; }
        .auth-field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .error { color: #b42318; font-weight: 700; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="auth-wrap">
    <h2>Court Scheduling Login</h2>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
        <div class="auth-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autofocus>
        </div>
        <div class="auth-field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
        </div>
        <button type="submit">Sign In</button>
    </form>
</div>
</body>
</html>
