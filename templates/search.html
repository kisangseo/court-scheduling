<!DOCTYPE html>
<html>
<head>
    <title>Court Assignment Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>
<body>

<div class="top-controls">
    <h2>Search Court Assignments <span id="overallAssignmentCounts" class="counts-inline"></span></h2>

    <input type="text" id="name" placeholder="Search by Name">
    <input type="date" id="date">

    <select id="courthouse">
        <option value="">All Courthouses</option>
        <option value="Mitchell">Mitchell</option>
        <option value="Cummings">Cummings</option>
        <option value="Juvenile">Juvenile</option>
    </select>

    <button onclick="search()">Search</button>
    <button onclick="openRoster()">Roster</button>
    <button onclick="window.open('/staffing', '_blank')">Staffing Resources Daily</button>
    <button onclick="window.open('/executive-summary', '_blank')">Executive Summary</button>
    <button id="saveAssignments">Save Assignments</button>
    <span id="saveStatus" class="counts-inline"></span>
</div>

<br><br>

<div id="assignmentRosterLayout">
    <div id="assignmentsPanel">
        <div id="resultsGrid">
            <div id="postsRow" class="section-row"></div>
            <div id="courtroomsRow" class="section-row-single"></div>
            <div id="overtimeRow" class="section-row"></div>
            <div id="juvRow" class="section-row"></div>
            <div id="juvBottomRow" class="section-row"></div>
        </div>
    </div>
    <div id="rosterPanel">
        <h3>Court Security Roster</h3>
        <label>
            <input type="checkbox" id="showFullRoster">
            Show Full Roster
        </label>
        <div id="rosterList"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
let pendingAssignments = {};
let pendingNotes = {};
let pendingJudges = {};
let pendingCourtroomMeta = {};
let allDeputies = [];
let rawDeputies = [];
let selectedDeputy = null;
let globalAssignmentTotals = { total: 0, filled: 0 };
let globalPostedNames = new Set();
let hidePosted = false;

function buildHidePostedToggle() {
    const label = document.createElement("label");
    label.className = "hide-posted-toggle";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "hide-posted-checkbox";
    checkbox.checked = hidePosted;

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(" Hide Posted"));
    return label;
}

function getPostedCacheKey(date) {
    return `postedNames:${date || ''}`;
}

function getTotalsCacheKey(date) {
    return `assignmentTotals:${date || ''}`;
}

function loadCachedDateState(date) {
    try {
        const postedRaw = localStorage.getItem(getPostedCacheKey(date));
        const totalsRaw = localStorage.getItem(getTotalsCacheKey(date));

        if (postedRaw) {
            globalPostedNames = new Set(JSON.parse(postedRaw));
        }

        if (totalsRaw) {
            const parsedTotals = JSON.parse(totalsRaw);
            globalAssignmentTotals = {
                total: parsedTotals.total || 0,
                filled: parsedTotals.filled || 0
            };
        }
    } catch (_) {
        globalPostedNames = new Set();
    }
}

function cacheDateState(date, postedSet, totals) {
    try {
        localStorage.setItem(getPostedCacheKey(date), JSON.stringify(Array.from(postedSet)));
        localStorage.setItem(getTotalsCacheKey(date), JSON.stringify(totals));
    } catch (_) {
        // ignore storage failures
    }
}

function isCourtSecurityDeputy(deputy) {
    const division = (deputy.division || "").trim().toLowerCase();
    const capacityTag = (deputy.capacity_tag || "").trim().toLowerCase();

    return division === "court security"
        || division === "court security division"
        || capacityTag.includes("court security")
        || capacityTag.includes("cso");
}

function getDeputyRole(deputy) {
    return (deputy.role || deputy.capacity_tag || "").trim().toUpperCase();
}

function createRosterItem(deputy, options = {}) {
    const deputyRow = document.createElement("div");
    deputyRow.className = "roster-item";
    deputyRow.dataset.name = deputy.full_name || "";
    deputyRow.dataset.role = getDeputyRole(deputy);

    const showDivision = options.showDivision === true;
    const division = (deputy.division || "Unassigned Division").trim() || "Unassigned Division";

    deputyRow.textContent = showDivision
        ? `${deputy.full_name} - ${division} (${deputy.capacity_tag || ""})`
        : `${deputy.full_name} (${deputy.capacity_tag || ""})`;

    return deputyRow;
}

function getAssignedNamesFromCell(cell) {
    return Array.from(cell.querySelectorAll('.assignment-chip'))
        .map(chip => (chip.dataset.name || chip.textContent || '').trim())
        .filter(Boolean);
}

function parseAssignedMemberValue(value) {
    const text = (value || '').trim();
    if (!text) return [];

    if (text.includes('||')) {
        return text.split(/\s*\|\|\s*/).map(name => name.trim()).filter(Boolean);
    }

    if (text.includes('\n')) {
        return text.split(/\n+/).map(name => name.trim()).filter(Boolean);
    }

    return [text];
}

function normalizeDeputyName(value) {
    return (value || '').trim().toLowerCase();
}

function getDeputyRecordByName(name) {
    const target = normalizeDeputyName(name);
    if (!target) return null;

    return rawDeputies.find(dep => normalizeDeputyName(dep.full_name) === target) || null;
}

function formatBorrowedCourthouse(courthouse) {
    const normalized = (courthouse || '').trim().toLowerCase();
    if (normalized === 'juvenile') return 'Juv';
    if (normalized === 'mitchell') return 'Mitchell';
    if (normalized === 'cummings') return 'Cummings';
    return courthouse || '';
}

function formatRoomPartTime(cell) {
    const room = (cell.dataset.room || '').trim();
    const part = (cell.dataset.part || '').trim();
    const shift = (cell.dataset.shift || '').trim();

    if (cell.dataset.type === 'Overtime') {
        return `${room || '-'} / ${shift || 'Time TBD'}`;
    }

    const roomPart = [room, part].filter(Boolean).join('/');
    return `${roomPart || '-'} / Time TBD`;
}

function renderBorrowedDeputiesTable() {
    const tbody = document.getElementById('csoDetailBody');
    if (!tbody) return;

    const borrowedRows = [];

    document.querySelectorAll('.editable').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));
        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                const deputy = getDeputyRecordByName(name);
                if (!deputy || isCourtSecurityDeputy(deputy)) return;

                borrowedRows.push({
                    deputyName: name,
                    division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                    courthouse: formatBorrowedCourthouse(cell.dataset.courthouse),
                    roomPartTime: formatRoomPartTime(cell)
                });
            });
            return;
        }

        const assignedNames = getAssignedNamesFromCell(cell);
        if (assignedNames.length === 0) return;

        assignedNames.forEach(name => {
            if (isCurrentlyTransferredOut(name)) return;
            const deputy = getDeputyRecordByName(name);
            if (!deputy || isCourtSecurityDeputy(deputy)) return;

            borrowedRows.push({
                deputyName: name,
                division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                courthouse: formatBorrowedCourthouse(cell.dataset.courthouse),
                roomPartTime: formatRoomPartTime(cell)
            });
        });
    });

    tbody.innerHTML = '';

    if (borrowedRows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="4">No borrowed deputies assigned.</td>';
        tbody.appendChild(tr);
        return;
    }

    borrowedRows
        .sort((a, b) => a.deputyName.localeCompare(b.deputyName) || a.courthouse.localeCompare(b.courthouse))
        .forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.deputyName}</td>
                <td>${item.division}</td>
                <td>${item.courthouse}</td>
                <td>${item.roomPartTime}</td>
            `;
            tbody.appendChild(tr);
        });
}

function getAssignedNames() {
    const names = new Set();
    document.querySelectorAll('.editable').forEach(cell => {
        getAssignedNamesFromCell(cell).forEach(name => names.add(name));
    });
    return names;
}

function getAssignedNamesAcrossGrid() {
    const names = new Set();

    document.querySelectorAll('.editable').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));

        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                names.add(name);
            });
            return;
        }

        parseAssignedMemberValue(cell.textContent).forEach(name => {
            if (!isCurrentlyTransferredOut(name)) names.add(name);
        });
    });

    return names;
}

function formatCountMetrics(vacant, filled, colorFilled = 'metric-green') {
    return `<span class="metric-red">Vacant ${vacant}</span> / <span class="${colorFilled}">Filled ${filled}</span>`;
}

function getPostedNameSetForPostsAndCourtrooms() {
    const names = new Set();

    document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"], .editable[data-type="Transport"], .editable[data-type="Overtime"]').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));

        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                names.add(name);
            });
            return;
        }

        parseAssignedMemberValue(cell.textContent).forEach(name => {
            if (!isCurrentlyTransferredOut(name)) names.add(name);
        });
    });

    if (names.size > 0 || document.querySelectorAll('.editable').length > 0) {
        return names;
    }

    return new Set(globalPostedNames);
}

function updateSaveStatusBadge() {
    const saveStatus = document.getElementById("saveStatus");
    if (!saveStatus) return;

    const totalChanges =
        Object.keys(pendingAssignments).length +
        Object.keys(pendingNotes).length +
        Object.keys(pendingJudges).length +
        Object.keys(pendingCourtroomMeta).length;

    if (totalChanges <= 0) {
        saveStatus.className = "counts-inline";
        saveStatus.textContent = "";
        return;
    }

    saveStatus.className = "counts-inline metric-red";
    saveStatus.textContent = `${totalChanges} change${totalChanges !== 1 ? "s" : ""} not saved`;
}

function formatToAmPmFromTimeValue(value) {
    return normalizeUserTimeValue(value);
}

function normalizeUserTimeValue(value) {
    if (!value) return "";
    const raw = value.trim().toUpperCase();

    const full = raw.match(/^(\d{1,2})[:\-](\d{1,2})\s*(AM|PM)?$/i);
    if (!full) return "";

    let h = parseInt(full[1], 10);
    const m = String(parseInt(full[2], 10)).padStart(2, '0');
    const explicitMeridiem = full[3] ? full[3].toUpperCase() : null;

    if (Number.isNaN(h) || Number.isNaN(parseInt(m, 10)) || h < 1 || h > 12 || parseInt(m, 10) > 59) {
        return "";
    }

    let meridiem = explicitMeridiem;
    if (!meridiem) {
        if (h >= 7 && h <= 11) meridiem = "AM";
        else meridiem = "PM";
    }

    return `${h}:${m} ${meridiem}`;
}

function parseStoredTimeToInputValue(value) {
    return normalizeUserTimeValue(value) || value || "";
}

function setPendingCourtroomMetaFromRow(rowEl) {
    const payload = {
        assignment_date: rowEl.dataset.date,
        courthouse: rowEl.dataset.courthouse,
        location_detail: rowEl.dataset.room,
        part: rowEl.dataset.part || "",
        start_time: formatToAmPmFromTimeValue(rowEl.querySelector('.courtroom-time-input[data-field="start_time"]')?.value || ""),
        restart_time: formatToAmPmFromTimeValue(rowEl.querySelector('.courtroom-time-input[data-field="restart_time"]')?.value || ""),
        adjourned_time: formatToAmPmFromTimeValue(rowEl.querySelector('.courtroom-time-input[data-field="adjourned_time"]')?.value || ""),
        is_down: !!rowEl.querySelector('.courtroom-down-checkbox')?.checked
    };

    const key = [payload.assignment_date, payload.courthouse, payload.location_detail, payload.part].join('|');
    pendingCourtroomMeta[key] = payload;
    updateSaveStatusBadge();
}

function fetchGlobalAssignmentTotals(dateValue) {
    const date = dateValue || document.getElementById('date').value;
    if (!date) {
        globalAssignmentTotals = { total: 0, filled: 0 };
        updateAssignmentCountBadges();
        return Promise.resolve();
    }

    return fetch(`/api/search?date=${date}`)
        .then(response => response.json())
        .then(rows => {
            const relevantRows = (rows || []).filter(row => row.assignment_type === 'Courtroom' || row.assignment_type === 'Fixed Post');
            const total = relevantRows.length;
            const filledRows = relevantRows.filter(row => (row.assigned_member || '').trim().length > 0);
            const filled = filledRows.length;

            const posted = new Set();
            (rows || [])
                .filter(row => ['Courtroom', 'Fixed Post', 'Overtime', 'Transport'].includes(row.assignment_type))
                .filter(row => (row.assigned_member || '').trim().length > 0)
                .forEach(row => {
                parseAssignedMemberValue(row.assigned_member).forEach(name => posted.add(name));
                });
            globalPostedNames = posted;

            globalAssignmentTotals = { total, filled };
            cacheDateState(date, posted, globalAssignmentTotals);
            updateAssignmentCountBadges();
            refreshRosterHeaderCounts();
            refreshRosterAssignedState();
        })
        .catch(() => {
            globalAssignmentTotals = { total: 0, filled: 0 };
            globalPostedNames = new Set();
            cacheDateState(date, globalPostedNames, globalAssignmentTotals);
            updateAssignmentCountBadges();
            refreshRosterHeaderCounts();
            refreshRosterAssignedState();
        });
}

function updateAssignmentCountBadges() {
    const statsBySection = {};
    let overallTotal = 0;
    let overallFilled = 0;

    document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"], .editable[data-type="Overtime"]').forEach(cell => {
        const courthouse = cell.dataset.courthouse || '';
        const sectionType = cell.dataset.type || '';
        const key = `${courthouse}|${sectionType}`;
        if (!statsBySection[key]) {
            statsBySection[key] = { total: 0, filled: 0, type: sectionType };
        }

        if (sectionType !== 'Overtime') {
            statsBySection[key].total += 1;
            overallTotal += 1;
        }

        const assignedNames = getAssignedNamesFromCell(cell);
        const parsedTextNames = parseAssignedMemberValue(cell.textContent);
        if (assignedNames.length > 0 || parsedTextNames.length > 0) {
            statsBySection[key].filled += 1;
            if (sectionType !== 'Overtime') {
                overallFilled += 1;
            }
        }
    });

    const hasLiveAssignmentGrid = document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"]').length > 0;
    const sourceTotal = hasLiveAssignmentGrid ? overallTotal : (globalAssignmentTotals.total || 0);
    const sourceFilled = hasLiveAssignmentGrid ? overallFilled : (globalAssignmentTotals.filled || 0);
    const overallVacant = Math.max(sourceTotal - sourceFilled, 0);
    const overallBadge = document.getElementById('overallAssignmentCounts');
    if (overallBadge) {
        overallBadge.innerHTML = formatCountMetrics(overallVacant, sourceFilled);
    }

    document.querySelectorAll('[data-badge-key]').forEach(el => {
        const key = el.dataset.badgeKey;
        const stats = statsBySection[key] || { total: 0, filled: 0, type: '' };

        if (stats.type === 'Overtime') {
            el.innerHTML = `<span class="metric-blue">Filled ${stats.filled}</span>`;
            return;
        }

        const vacant = Math.max(stats.total - stats.filled, 0);
        el.innerHTML = formatCountMetrics(vacant, stats.filled);
    });

    document.querySelectorAll('[data-main-badge]').forEach(el => {
        const courthouse = el.dataset.mainBadge || '';
        const postStats = statsBySection[`${courthouse}|Fixed Post`] || { total: 0, filled: 0 };
        const courtroomStats = statsBySection[`${courthouse}|Courtroom`] || { total: 0, filled: 0 };
        const total = postStats.total + courtroomStats.total;
        const filled = postStats.filled + courtroomStats.filled;
        const vacant = Math.max(total - filled, 0);
        el.innerHTML = formatCountMetrics(vacant, filled);
    });
}

function getCourtSecurityRosterStats() {
    const courtSecurity = rawDeputies.filter(isCourtSecurityDeputy);
    const outCount = courtSecurity.filter(dep => !isDeputyAvailable(dep)).length;
    const postedNames = getPostedNameSetForPostsAndCourtrooms();
    const postedCount = courtSecurity.filter(dep => postedNames.has((dep.full_name || '').trim())).length;

    const totalAvailablePool = courtSecurity.filter(dep => isDeputyAvailable(dep)).length;
    const availableCount = Math.max(totalAvailablePool - postedCount, 0);

    return { outCount, availableCount, postedCount };
}

function refreshRosterHeaderCounts() {
    const courtCountsEl = document.getElementById('courtSecurityCounts');
    if (courtCountsEl) {
        const stats = getCourtSecurityRosterStats();
        courtCountsEl.innerHTML = `<span class="metric-red">Out ${stats.outCount}</span> / <span class="metric-green">Available ${stats.availableCount}</span> / <span class="metric-blue">Posted ${stats.postedCount}</span>`;
    }

    document.querySelectorAll('[data-division-posted]').forEach(el => {
        const division = (el.dataset.divisionPosted || '').toLowerCase();
        const postedNames = getPostedNameSetForPostsAndCourtrooms();
        const postedCount = rawDeputies.filter(dep => ((dep.division || 'Unassigned Division').trim().toLowerCase() === division)
            && postedNames.has((dep.full_name || '').trim())).length;
        el.textContent = `Posted ${postedCount}`;
    });
}

function refreshRosterAssignedState() {
    const assignedNames = getAssignedNamesAcrossGrid();
    document.querySelectorAll('#rosterList .roster-item').forEach(item => {
        const name = (item.dataset.name || '').trim();
        const isTransferredOut = isCurrentlyTransferredOut(name);
        const isAssigned = !!name && assignedNames.has(name) && !isTransferredOut;
        item.classList.toggle('assigned', isAssigned);
        item.classList.toggle('hide-posted', hidePosted && isAssigned);
    });

    updateAssignmentCountBadges();
    refreshRosterHeaderCounts();
    renderBorrowedDeputiesTable();
    updateFixedPostArmedWarnings();
}

function clearRosterSelectionUI() {
    document.querySelectorAll('#rosterList .roster-item.selected').forEach(item => {
        item.classList.remove('selected');
    });
}

function setSelectedDeputyFromRosterItem(item) {
    if (!item) {
        selectedDeputy = null;
        clearRosterSelectionUI();
        return;
    }

    const deputyName = (item.dataset.name || item.textContent || '').trim();
    const deputyRole = (item.dataset.role || '').trim().toUpperCase();

    if (selectedDeputy && selectedDeputy.name === deputyName) {
        selectedDeputy = null;
        clearRosterSelectionUI();
        return;
    }

    selectedDeputy = { name: deputyName, role: deputyRole };
    clearRosterSelectionUI();
    item.classList.add('selected');
}

function applyDeputyToCell(dropCell, assignedName, role) {
    if (!isEligibleForCell(dropCell, role)) {
        showCellWarning(dropCell, 'Select an Armed Personnel First');
        return false;
    }

    const assignmentList = ensureCellStructure(dropCell);
    // Remove placeholder if present
    
    clearExistingAssignmentForName(assignedName, dropCell);

   

    const item = buildAssignmentChip(assignedName, role);
    assignmentList.appendChild(item);

    

    setPendingAssignmentFromCell(dropCell);
    fetch('/api/transfer-in', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ assignment_date: dropCell.dataset.date, full_name: assignedName })
        })
        .then(() => fetchTransfersForDate())
        .then(() => applyTransferCaptionToRosterAndGrid())
        .catch(() => {});
    refreshRosterAssignedState();
    return true;
}

function renderRoster() {
    const rosterList = document.getElementById("rosterList");
    const showFullRoster = document.getElementById("showFullRoster").checked;
    rosterList.innerHTML = "";
    rosterList.classList.toggle("roster-two-column", showFullRoster);

    const courtColumn = document.createElement("div");
    courtColumn.className = "roster-column";

    const courtHeading = document.createElement("h4");
    courtHeading.className = "roster-section-title";
    courtHeading.innerHTML = `Court Security <span id="courtSecurityCounts" class="counts-inline"></span>`;
    courtColumn.appendChild(courtHeading);
    courtColumn.appendChild(buildHidePostedToggle());

    const courtList = document.createElement("div");
    courtList.id = "courtSecurityRosterList";
    courtList.className = "draggable-roster-list";
    const courtSecurityDeputies = allDeputies.filter(isCourtSecurityDeputy);
    courtSecurityDeputies.forEach(deputy => {
        courtList.appendChild(createRosterItem(deputy, { showDivision: false }));
    });
    courtColumn.appendChild(courtList);
    rosterList.appendChild(courtColumn);

    if (showFullRoster) {
        const fullColumn = document.createElement("div");
        fullColumn.className = "roster-column";

        const fullHeading = document.createElement("h4");
        fullHeading.className = "roster-section-title";
        fullHeading.textContent = "Full Roster";
        fullColumn.appendChild(fullHeading);
        fullColumn.appendChild(buildHidePostedToggle());

        const fullList = document.createElement("div");
        fullList.id = "fullRosterList";
        fullList.className = "draggable-roster-list";

        const fullRosterSorted = allDeputies
            .filter(deputy => !isCourtSecurityDeputy(deputy))
            .sort((a, b) => {
                const divisionA = (a.division || "Unassigned Division").trim().toLowerCase();
                const divisionB = (b.division || "Unassigned Division").trim().toLowerCase();
                if (divisionA !== divisionB) {
                    return divisionA.localeCompare(divisionB);
                }
                return (a.full_name || "").localeCompare(b.full_name || "");
            });

        let currentDivision = null;
        fullRosterSorted.forEach(deputy => {
            const division = (deputy.division || "Unassigned Division").trim() || "Unassigned Division";
            if (division !== currentDivision) {
                const divisionHeading = document.createElement("h5");
                divisionHeading.className = "roster-section-title";
                const safeDivision = division.replace(/"/g, '&quot;');
                divisionHeading.innerHTML = `${division} <span class="counts-inline metric-blue" data-division-posted="${safeDivision.toLowerCase()}"></span>`;
                fullList.appendChild(divisionHeading);
                currentDivision = division;
            }

            fullList.appendChild(createRosterItem(deputy, { showDivision: false }));
        });

        fullColumn.appendChild(fullList);
        rosterList.appendChild(fullColumn);
    }

    initRosterDrag();
    refreshRosterAssignedState();
}

function parseDateOnly(value) {
    if (!value) return null;
    const d = new Date(`${value}T00:00:00`);
    return Number.isNaN(d.getTime()) ? null : d;
}

function effectiveStatusForSearchDate(deputy) {
    const selectedDate = parseDateOnly(document.getElementById("date").value);

    try {
        const raw = deputy.status_raw;
        const parsed = raw ? JSON.parse(raw) : null;
        const ranges = parsed && Array.isArray(parsed.ranges) ? parsed.ranges : [];
        const weeklyUnavailable = parsed && Array.isArray(parsed.weekly_unavailable) ? parsed.weekly_unavailable : [];
        const active = [];

        if (selectedDate) {
            for (let i = 0; i < ranges.length; i += 1) {
                const entry = ranges[i];
                const start = parseDateOnly(entry.start_date);
                const end = parseDateOnly(entry.end_date);
                if (start && end && selectedDate >= start && selectedDate <= end) {
                    const status = (entry.status || '').toLowerCase();
                    if (status && !active.includes(status)) active.push(status);
                }
            }

            const weekday = selectedDate.toLocaleDateString("en-US", { weekday: "long" });
            for (let i = 0; i < weeklyUnavailable.length; i += 1) {
                const rule = weeklyUnavailable[i] || {};
                const day = (rule.day || '').trim();
                const ruleEnd = parseDateOnly(rule.end_date);
                if (!day || !ruleEnd) continue;
                if (selectedDate <= ruleEnd && (day === 'Any Day' || day === weekday)) {
                    if (!active.includes('unavailable')) active.push('unavailable');
                }
            }

            if (active.length > 0) return active.join(' / ');
        }

        if (parsed && parsed.legacy) {
            return parsed.legacy.toLowerCase();
        }
    } catch (_) {
        // fallback to effective status from API
    }

    return (deputy.current_status || '').trim().toLowerCase();
}

function isDeputyAvailable(deputy) {
    const status = effectiveStatusForSearchDate(deputy);
    if (!status) return true;

    return !status.includes('leave')
        && !status.includes('sick')
        && !status.includes('light duty')
        && !status.includes('unscheduled')
        && !status.includes('unavailable');
}

function getCellAssignmentCategory(cell) {
    if (cell.dataset.type === 'Courtroom') return 'courtroom';
    if (cell.dataset.type === 'Fixed Post') return 'security';
    return 'overtime';
}

function isArmedRole(role) {
    return role === 'DEP' || role === 'SPO' || role === 'F';
}

function isPrimarySecurityRole(role) {
    return role === 'SPO' || role === 'F';
}

function isArmedByName(name) {
    const deputy = getDeputyRecordByName(name);
    const role = getDeputyRole(deputy || {});
    return isArmedRole(role);
}

function updateFixedPostArmedWarnings() {
    const slotsByPost = new Map();
    document.querySelectorAll('.editable[data-type="Fixed Post"][data-courthouse="Mitchell"]').forEach(cell => {
        const post = (cell.dataset.room || '').trim();
        if (!post) return;
        if (!slotsByPost.has(post)) slotsByPost.set(post, []);
        slotsByPost.get(post).push(cell);
    });

    slotsByPost.forEach(cells => {
        cells.sort((a, b) => {
            const ai = Number(a.dataset.slotIndex || 0);
            const bi = Number(b.dataset.slotIndex || 0);
            return ai - bi;
        });

        cells.forEach(cell => {
            cell.querySelectorAll('.armed-warning').forEach(el => el.remove());
        });

        let hasArmed = false;
        let lastAssignedIndex = -1;

        cells.forEach((cell, index) => {
            const names = getAssignedNamesFromCell(cell);
            if (names.length > 0) {
                lastAssignedIndex = index;
                if (names.some(isArmedByName)) {
                    hasArmed = true;
                }
            }
        });

        if (!hasArmed && lastAssignedIndex >= 0 && lastAssignedIndex + 1 < cells.length) {
            const warning = document.createElement('div');
            warning.className = 'armed-warning';
            warning.style.color = '#b42318';
            warning.style.fontWeight = '700';
            warning.textContent = 'require 1 armed';
            cells[lastAssignedIndex + 1].appendChild(warning);
        }
    });
}

function isEligibleForCell(cell, role) {
    const category = getCellAssignmentCategory(cell);
    if (category === 'courtroom') {
        return isArmedRole(role);
    }

    if (category === 'security') {
        const post = (cell.dataset.room || '').trim();
        const shift = (cell.dataset.shift || '').trim();
        const matchingSecurityCells = Array.from(
            document.querySelectorAll('.editable[data-type="Fixed Post"]')
        ).filter(candidate => {
            if ((candidate.dataset.room || '').trim() !== post) return false;
            return (candidate.dataset.shift || '').trim() === shift;
        });

        const hasPrimaryAssigned = matchingSecurityCells.some(candidate =>
            getAssignedNamesFromCell(candidate).some(name => {
                const deputy = getDeputyRecordByName(name);
                const assignedRole = getDeputyRole(deputy || {});
                return isPrimarySecurityRole(assignedRole);
            })
        );

        if (!hasPrimaryAssigned && !isPrimarySecurityRole(role)) {
            return false;
        }
    }

    return true;
}

function showCellWarning(cell, message) {
    const existing = cell.querySelector('.cell-warning');
    if (existing) existing.remove();
    const warning = document.createElement('div');
    warning.className = 'cell-warning';
    warning.textContent = message;
    cell.appendChild(warning);
    setTimeout(() => warning.remove(), 2000);
}

function buildAssignmentChip(name, role) {
  const chip = document.createElement('span');
  chip.className = 'assignment-chip';
  chip.dataset.name = (name || '').trim();
  chip.dataset.role = (role || '').trim();
  chip.dataset.transferredOut = 'false';
  chip.textContent = (name || '').trim();

  chip.addEventListener('click', function (e) {
    e.stopPropagation();

    // remove any existing popover
    document.querySelectorAll('.assignment-action-popover').forEach(p => p.remove());

    const cell = chip.closest('.editable');
    if (!cell) return;

    const deputyName = (chip.dataset.name || chip.textContent || '').trim();
    const date = cell.dataset.date;

    const pop = document.createElement('div');
    pop.className = 'assignment-action-popover';
    pop.style.position = 'absolute';
    pop.style.zIndex = 9999;
    pop.style.background = 'white';
    pop.style.border = '1px solid #D0D5DD';
    pop.style.borderRadius = '8px';
    pop.style.boxShadow = '0 8px 24px rgba(16,24,40,.12)';
    pop.style.padding = '8px';
    pop.style.display = 'flex';
    pop.style.gap = '8px';

    const btnTransfer = document.createElement('button');
    btnTransfer.type = 'button';
    btnTransfer.textContent = 'Transfer';

    const btnRemove = document.createElement('button');
    btnRemove.type = 'button';
    btnRemove.textContent = 'Remove';

    const btnCancel = document.createElement('button');
    btnCancel.type = 'button';
    btnCancel.textContent = 'Cancel';

    pop.appendChild(btnTransfer);
    pop.appendChild(btnRemove);
    pop.appendChild(btnCancel);

    const rect = chip.getBoundingClientRect();
    pop.style.left = (window.scrollX + rect.left) + 'px';
    pop.style.top  = (window.scrollY + rect.bottom + 6) + 'px';
    document.body.appendChild(pop);

    const closePop = () => pop.remove();

    const removeChip = () => {
      chip.remove();
      setPendingAssignmentFromCell(cell);
      refreshRosterAssignedState();
      closePop();
    };

    btnCancel.addEventListener('click', (ev) => { ev.stopPropagation(); closePop(); });
    btnRemove.addEventListener('click', (ev) => { ev.stopPropagation(); removeChip(); });

    btnTransfer.addEventListener('click', (ev) => {
      ev.stopPropagation();
      fetch('/api/transfer-out', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ assignment_date: date, full_name: deputyName })
      })
      .then(() => fetchTransfersForDate())
      .then(() => {
        chip.dataset.transferredOut = 'true';
        chip.classList.add('transferred-out');
        applyTransferCaptionToRosterAndGrid();
        closePop();
      })
      .catch(() => { closePop(); });
    });

    setTimeout(() => {
      const onDocClick = (evt) => {
        if (!evt.target.closest('.assignment-action-popover') && !evt.target.closest('.assignment-chip')) {
          document.removeEventListener('click', onDocClick);
          closePop();
        }
      };
      document.addEventListener('click', onDocClick);
    }, 0);
  });

  return chip;
}



function clearExistingAssignmentForName(name, excludeCell) {

        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));

let transferMap = {}; // { "Name": { out: "9:05 AM", in: "11:02 AM" } }

function isCurrentlyTransferredOut(name) {
  const t = transferMap[(name || '').trim()];
  return !!(t && t.out && !t.in);
}

function isChipMarkedTransferredOut(chip) {
  return (chip?.dataset?.transferredOut || '').trim() === 'true';
}

function fetchTransfersForDate() {
  const date = document.getElementById("date")?.value;
  if (!date) { transferMap = {}; return Promise.resolve(); }

  return fetch(`/api/transfers?date=${date}`)
    .then(r => r.json())
    .then(rows => {
      transferMap = {};
      (rows || []).forEach(row => {
        const name = (row.full_name || '').trim();
        if (!name) return;
        transferMap[name] = { out: row.out_time || null, in: row.in_time || null };
      });
    })
    .catch(() => { transferMap = {}; });
}

function applyTransferCaptionToRosterAndGrid() {
  const format = (name) => {
    const t = transferMap[(name || '').trim()];
    if (!t || !t.out) return "";
    return t.in ? `Transferred out: ${t.out}, In: ${t.in}` : `Transferred out: ${t.out}`;
  };

  // add caption under roster names
  document.querySelectorAll('#rosterList .roster-item').forEach(item => {
    const name = (item.dataset.name || '').trim();
    const text = format(name);

    let cap = item.querySelector('.transfer-caption');
    if (!text) { if (cap) cap.remove(); return; }

    if (!cap) {
      cap = document.createElement('div');
      cap.className = 'transfer-caption';
      cap.style.color = '#667085';
      cap.style.fontSize = '11px';
      cap.style.marginTop = '2px';
      item.appendChild(cap);
    }
    cap.textContent = text;
  });

  // add caption next to chips in grid
  document.querySelectorAll('.assignment-chip').forEach(chip => {
    const name = (chip.dataset.name || chip.textContent || '').trim();
    const text = format(name);
    const isTransferredOut = isChipMarkedTransferredOut(chip) || isCurrentlyTransferredOut(name);

    chip.classList.toggle('transferred-out', isTransferredOut);

    let cap = chip.querySelector('.transfer-caption');
    if (!text) { if (cap) cap.remove(); return; }

    if (!cap) {
      cap = document.createElement('span');
      cap.className = 'transfer-caption';
      cap.style.color = '#667085';
      cap.style.fontSize = '11px';
      cap.style.marginLeft = '6px';
      chip.appendChild(cap);
    }
    cap.textContent = `(${text})`;
  });

  refreshRosterAssignedState();
}
function search() {
    const name = document.getElementById("name").value;
    const date = document.getElementById("date").value;
    const courthouse = document.getElementById("courthouse").value;

    loadCachedDateState(date);
    localStorage.setItem('searchPageDate', date || '');
    fetchGlobalAssignmentTotals(date);

    fetch(`/api/search?name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}&courthouse=${encodeURIComponent(courthouse)}`)
        .then(response => response.json())
        .then(data => {
            const postsRow = document.getElementById("postsRow");
            const courtroomsRow = document.getElementById("courtroomsRow");
            const overtimeRow = document.getElementById("overtimeRow");
            const juvRow = document.getElementById("juvRow");
            const juvBottomRow = document.getElementById("juvBottomRow");

            // Panels that already exist in the DOM (move them into the right column later)
            const transportPanel = document.getElementById("transportPanel");
            const borrowedPanel = document.getElementById("borrowedDeputiesPanel");

            [postsRow, courtroomsRow, overtimeRow, juvRow, juvBottomRow]
                .filter(Boolean)
                .forEach(row => row.innerHTML = "");

            if (!postsRow || !courtroomsRow || !overtimeRow || !juvRow || !juvBottomRow) {
                console.warn("Search layout row missing; skipping render to avoid runtime crash.");
                return;
            }

            if (!data || data.length === 0) {
                updateAssignmentCountBadges();
                refreshRosterHeaderCounts();
                return;
            }

            const grouped = {};
            data.forEach(row => {
                if (!grouped[row.courthouse]) grouped[row.courthouse] = [];
                grouped[row.courthouse].push(row);
            });

            const mitchell = buildCourthouseSections("Mitchell", grouped["Mitchell"] || [], date);
            const cummings = buildCourthouseSections("Cummings", grouped["Cummings"] || [], date);
            const juvenile = buildCourthouseSections("Juvenile", grouped["Juvenile"] || [], date);

            const includeMitchell = !courthouse || courthouse === "Mitchell";
            const includeCummings = !courthouse || courthouse === "Cummings";
            const includeJuvenile = !courthouse || courthouse === "Juvenile";

            // =========================
            // POSTS (top headers KEEP counters)
            // =========================
            postsRow.appendChild(
                includeMitchell
                    ? createSectionCell("Mitchell", mitchell.posts, "Mitchell", "main", "Security Post")
                    : createEmptySectionCell()
            );

            postsRow.appendChild(
                includeCummings
                    ? createSectionCell("Cummings", cummings.posts, "Cummings", "main", "Security Post")
                    : createEmptySectionCell()
            );

            // COURTROOMS (each courthouse gets its OWN full-width row)

            // Mitchell Courtroom (NO counter)
            if (includeMitchell) {
                const mCell = createSectionCell("Mitchell Courtroom", mitchell.courtrooms);
                mCell.style.gridColumn = "1 / span 2";
                courtroomsRow.appendChild(mCell);
            }

            // Cummings Courtroom (NO counter)
            if (includeCummings) {
                const cCell = createSectionCell("Cummings Courtroom", cummings.courtrooms);
                cCell.style.gridColumn = "1 / span 2";
                courtroomsRow.appendChild(cCell);
            }

            // Juvenile Courtroom (WITH counter)
            if (includeJuvenile) {
                const jCell = createSectionCell("Juvenile", juvenile.courtrooms, "Juvenile", "main", "Courtroom");
                jCell.style.gridColumn = "1 / span 2";
                courtroomsRow.appendChild(jCell);
            }

            // Not used anymore for juvenile courtrooms
            juvRow.innerHTML = "";
            juvBottomRow.innerHTML = "";

            // =========================
            // OVERTIME LEFT + DETAILS RIGHT
            // =========================
            const overtimeLeft = document.createElement("div");

            if (includeMitchell) {
                const h = document.createElement("h4");
                h.textContent = "Mitchell Overtime";
                overtimeLeft.appendChild(h);
                overtimeLeft.appendChild(mitchell.overtime);
            }

            if (includeCummings) {
                const h = document.createElement("h4");
                h.textContent = "Cummings Overtime";
                overtimeLeft.appendChild(h);
                overtimeLeft.appendChild(cummings.overtime);
            }

            if (includeJuvenile) {
                const h = document.createElement("h4");
                h.textContent = "Juvenile Overtime";
                overtimeLeft.appendChild(h);
                overtimeLeft.appendChild(juvenile.overtime);
            }

            overtimeRow.appendChild(createSectionCell("Overtime", overtimeLeft));

            // Right side: Transport + Borrowed stacked
            const rightStack = document.createElement("div");
            rightStack.style.display = "flex";
            rightStack.style.flexDirection = "column";
            rightStack.style.gap = "16px";

            if (transportPanel) rightStack.appendChild(transportPanel);
            if (borrowedPanel) rightStack.appendChild(borrowedPanel);

            // Put it into a real section cell so it aligns in the grid
            overtimeRow.appendChild(createSectionCell("Details", rightStack));

            // =========================
            // Init + repaint
            // =========================
            initAssignmentDropzones();
            fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
            refreshRosterAssignedState();
            renderTransportTable(date);
            loadCourtroomMeta(date);
        });
}
function loadCourtroomMeta(date) {
    if (!date) return;
    fetch(`/api/get-courtroom-meta?date=${date}`)
        .then(res => res.json())
        .then(rows => {
            rows.forEach(meta => {
                const selector = `.courtroom-meta-row[data-date="${meta.assignment_date}"][data-courthouse="${meta.courthouse}"][data-room="${meta.location_detail}"][data-part="${meta.part || ''}"]`;
                const row = document.querySelector(selector);
                if (!row) return;

                const startInput = row.querySelector('.courtroom-time-input[data-field="start_time"]');
                const restartInput = row.querySelector('.courtroom-time-input[data-field="restart_time"]');
                const adjournedInput = row.querySelector('.courtroom-time-input[data-field="adjourned_time"]');
                const downInput = row.querySelector('.courtroom-down-checkbox');

                if (startInput) startInput.value = parseStoredTimeToInputValue(meta.start_time || '');
                if (restartInput) restartInput.value = parseStoredTimeToInputValue(meta.restart_time || '');
                if (adjournedInput) adjournedInput.value = parseStoredTimeToInputValue(meta.adjourned_time || '');
                if (downInput) downInput.checked = !!meta.is_down;
            });
        });
}

function renderTransportTable(date) {
    const tbody = document.getElementById('transportBody');
    if (!tbody || !date) return;

    const fallbackCounties = ['Baltimore County', 'Anne Arundel County', 'Howard County', 'Carroll County'];

    fetch(`/api/search?date=${date}&courthouse=Transport`)
        .then(res => res.json())
        .then(rows => {
            const transportRows = (rows || []).filter(r => r.assignment_type === 'Transport');
            const dataRows = transportRows.length > 0
                ? transportRows.map(r => ({ county: r.location_detail || '', deputy: r.assigned_member || '' }))
                : fallbackCounties.map(c => ({ county: c, deputy: '' }));

            tbody.innerHTML = '';
            dataRows.forEach(entry => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="editable"
                        data-date="${date}"
                        data-courthouse="Transport"
                        data-type="Transport"
                        data-room="${entry.county}"
                        data-part="">${entry.deputy || ''}</td>
                    <td>${entry.county}</td>
                `;
                tbody.appendChild(tr);
            });

            initAssignmentDropzones();
            fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
            refreshRosterAssignedState();
        })
        .catch(() => {
            tbody.innerHTML = '';
        });
}

window.onload = function() {
    const today = new Date().toISOString().split('T')[0];
    const savedDate = localStorage.getItem('searchPageDate');
    document.getElementById("date").value = savedDate || today;

    document.getElementById("showFullRoster").addEventListener("change", renderRoster);
    document.addEventListener('change', function(e) {
        if (!e.target.classList.contains('hide-posted-checkbox')) return;
        hidePosted = e.target.checked;
        document.querySelectorAll('.hide-posted-checkbox').forEach(toggle => {
            if (toggle !== e.target) {
                toggle.checked = hidePosted;
            }
        });
        refreshRosterAssignedState();
    });
    document.getElementById("courthouse").addEventListener("change", search);
    document.getElementById("date").addEventListener("change", function() {
        localStorage.setItem('searchPageDate', document.getElementById("date").value || '');
        search();
    });

    loadRoster();
    search();
};
document.addEventListener("click", function(e) {

    const cell = e.target.closest(".editable-judge");
    if (!cell) return;

    if (cell.querySelector("input")) return;

    const input = document.createElement("input");
    input.type = "text";
    input.value = cell.textContent.trim();

    cell.innerHTML = "";
    cell.appendChild(input);
    input.focus();

    input.addEventListener("blur", function() {

        const payload = {
            assignment_date: cell.dataset.date,
            courthouse: cell.dataset.courthouse,
            assignment_type: cell.dataset.type,
            location_detail: cell.dataset.room,
            part: cell.dataset.part,
            judge_name: input.value
        };

        const key = [
            payload.assignment_date,
            payload.courthouse,
            payload.assignment_type,
            payload.location_detail,
            payload.part
        ].join("|");

        pendingJudges[key] = payload;
        cell.textContent = input.value;

        updateSaveStatusBadge();

    });

});

document.getElementById("saveAssignments").addEventListener("click", function() {

    const saveStatus = document.getElementById("saveStatus");
    if (saveStatus) {
        saveStatus.className = "counts-inline";
        saveStatus.textContent = "Saving...";
    }

    const assignmentRequests = Object.values(pendingAssignments).map(payload =>
        fetch("/api/update-deputy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save deputy assignment");
            return res.json();
        })
    );

    const notesRequests = Object.values(pendingNotes).map(payload =>
        fetch("/api/update-assignment-notes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save assignment note");
            return res.json();
        })
    );

    const judgeRequests = Object.values(pendingJudges).map(payload =>
        fetch("/api/update-judge-name", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save judge name");
            return res.json();
        })
    );

    const courtroomMetaRequests = Object.values(pendingCourtroomMeta).map(payload =>
        fetch("/api/update-courtroom-meta", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save courtroom meta");
            return res.json();
        })
    );

    Promise.all([...assignmentRequests, ...notesRequests, ...judgeRequests, ...courtroomMetaRequests])
        .then(() => {
            pendingAssignments = {};
            pendingNotes = {};
            pendingJudges = {};
            pendingCourtroomMeta = {};
            if (saveStatus) {
                saveStatus.className = "counts-inline metric-green";
                saveStatus.textContent = "Saved";
            }
            search();
            loadRoster();
        })
        .catch(err => {
            console.error("Save failed:", err);
            if (saveStatus) {
                saveStatus.className = "counts-inline metric-red";
                saveStatus.textContent = "Save failed";
            }
            alert("Save failed. Please try again.");
        });
});

document.addEventListener('click', function(e) {
    const rosterItem = e.target.closest('#rosterList .roster-item');
    if (rosterItem) {
        setSelectedDeputyFromRosterItem(rosterItem);
        return;
    }

    const editableCell = e.target.closest('.editable');
    if (!editableCell || !selectedDeputy) return;

    const applied = applyDeputyToCell(editableCell, selectedDeputy.name, selectedDeputy.role);
    if (applied) {
        clearRosterSelectionUI();
        selectedDeputy = null;
    }
});

function openRoster() {
    window.open("/roster", "_blank");
}
window.addEventListener("beforeunload", function (e) {
    const totalChanges =
        Object.keys(pendingAssignments).length +
        Object.keys(pendingNotes).length +
            Object.keys(pendingJudges).length +
            Object.keys(pendingCourtroomMeta).length;

    if (totalChanges > 0) {
        e.preventDefault();
        e.returnValue = ""; // Required for Chrome
    }
});
