const COURTROOM_ASSIGNMENT_OPTIONS = [
    "Closed",
    "No deputy",
    "Need 1 Deputy",
    "Need 2 Deputies",
    "Civil - 1 Deputy",
    "Civil - No Deputies",

function escapeHtml(value) {
    return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function normalizeOtPostName(value) {
    return (value || '').toString().trim().toLowerCase().replace(/\s+/g, ' ');
}

function normalizeOtPostToken(value) {
    return (value || '').toString().trim().toLowerCase().replace(/[^a-z0-9]+/g, '');
}

function isMitchellFixedPostOtRow(row) {
    const type = (row?.assignment_type || '').trim();
    const courthouse = (row?.courthouse || '').trim();
    if (type !== 'Fixed Post' || courthouse !== 'Mitchell') return false;

    const normalizedPost = normalizeOtPostName(row?.location_group || '');
    const normalizedPart = (row?.part || '').toString().trim().toLowerCase();
    if ((normalizedPost === 'rover' || normalizedPost === 'rover ot') && normalizedPart === '1630-1900') return true;
    if ((normalizedPost === 'judges' || normalizedPost === 'judges ot') && normalizedPart === '0700') return true;

    const textBlob = [
        row?.location_group || '',
        row?.location_detail || '',
        row?.part || '',
        row?.assignment_notes || ''
    ].join(' ');
    const token = normalizeOtPostToken(textBlob);
    return token.includes('roverot')
        || token.includes('judgesot')
        || (token.includes('rover') && token.includes('ot'))
        || (token.includes('judges') && token.includes('ot'));
}

function parseShiftDurationHours(shiftText) {
    const raw = (shiftText || '').toString().trim();
    if (!raw) return 0;

    const normalizedRangeText = raw
        .replace(/[\u2013\u2014]/g, '-')
        .replace(/\bTO\b/gi, '-')
        .replace(/\s*\n+\s*/g, ' ')
        .replace(/\s+-\s+/g, '-')
        .replace(/\s+/g, ' ')
        .trim();

    let startRaw = '';
    let endRaw = '';
    if (normalizedRangeText.includes('-')) {
        const parts = normalizedRangeText.split('-').map(part => part.trim()).filter(Boolean);
        if (parts.length >= 2) {
            startRaw = parts[0];
            endRaw = parts[1];
        }
    } else {
        const tokenMatches = normalizedRangeText.match(/\b\d{1,2}(?::?\d{2})?\s*(?:AM|PM)?\b/gi) || [];
        if (tokenMatches.length >= 2) {
            startRaw = tokenMatches[0];
            endRaw = tokenMatches[1];
        }
    }

    if (!startRaw || !endRaw) return 0;

    const parseMinutes = (value, fallbackSuffix) => {
        const normalized = value.toUpperCase().replace(/\./g, '').trim();
        const ampmMatch = normalized.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)$/);
        if (ampmMatch) {
            let hour = Number(ampmMatch[1]) % 12;
            const minute = Number(ampmMatch[2] || '0');
            if (ampmMatch[3] === 'PM') hour += 12;
            return (hour * 60) + minute;
        }

        const hhmmMatch = normalized.match(/^(\d{1,2})(\d{2})$/);
        if (hhmmMatch) return (Number(hhmmMatch[1]) * 60) + Number(hhmmMatch[2]);

        const twentyFourHourMatch = normalized.match(/^([01]?\d|2[0-3]):([0-5]\d)(?::[0-5]\d)?$/);
        if (twentyFourHourMatch) {
            return (Number(twentyFourHourMatch[1]) * 60) + Number(twentyFourHourMatch[2]);
        }

        const compactMatch = normalized.match(/^(\d{1,2})(?::(\d{2}))?$/);
        if (compactMatch && fallbackSuffix) {
            let hour = Number(compactMatch[1]) % 12;
            const minute = Number(compactMatch[2] || '0');
            if (fallbackSuffix === 'PM') hour += 12;
            return (hour * 60) + minute;
        }

        return null;
    };

    const endSuffix = endRaw.toUpperCase().match(/\b(AM|PM)\b/)?.[1] || null;
    const startSuffix = startRaw.toUpperCase().match(/\b(AM|PM)\b/)?.[1] || null;
    const startMins = parseMinutes(startRaw, startSuffix || endSuffix);
    const endMins = parseMinutes(endRaw, endSuffix || startSuffix);
    if (startMins === null || endMins === null) return 0;

    let diff = endMins - startMins;
    if (diff < 0) diff += 24 * 60;
    return diff / 60;
}

function getDefaultFixedPostShiftRange(row) {
    if (!row || (row.assignment_type || '').trim() !== 'Fixed Post') return '';

    const courthouse = (row.courthouse || '').trim();
    const post = normalizeOtPostName(row.location_group || row.location_detail || '');
    const part = (row.part || '').toString().trim().toLowerCase();
    const token = normalizeOtPostToken([
        row.location_group || '',
        row.location_detail || '',
        row.assignment_notes || ''
    ].join(' '));

    const byCourthouse = {
        Mitchell: {
            'rover ot|1630-1900': '4:30 PM - 7:00 PM',
            'rover|1630-1900': '4:30 PM - 7:00 PM',
            'judges ot|0700': '7:00 AM - 3:00 PM',
            'judges|0700': '7:00 AM - 3:00 PM'
        }
    };

    const matchKey = `${post}|${part}`;
    const exactMatch = byCourthouse[courthouse]?.[matchKey] || '';
    if (exactMatch) return exactMatch;

    if (courthouse === 'Mitchell') {
        if (token.includes('roverot') || (token.includes('rover') && token.includes('ot'))) return '4:30 PM - 7:00 PM';
        if (token.includes('judgesot') || (token.includes('judges') && token.includes('ot'))) return '7:00 AM - 3:00 PM';
    }

    return '';
}

function getOvertimeHoursForRow(row) {
    const candidates = [
        row?.shift_time || '',
        row?.location_detail || '',
        getDefaultFixedPostShiftRange(row),
        row?.part || ''
    ];

    for (const candidate of candidates) {
        const parsed = parseShiftDurationHours(candidate);
        if (parsed > 0) return parsed;
    }

    return 0;
}

function getTotalOvertimeHours() {
    let total = 0;

    // Mitchell fixed-post OT rows like Rover O/T and Judges O/T
    document.querySelectorAll('.editable-fixed-shift').forEach(shiftCell => {
        const row = shiftCell.closest('tr');
        if (!row) return;

        const postName = (row.children[0]?.textContent || '').trim().toLowerCase();
        const part = (shiftCell.dataset.part || '').toLowerCase();
        const courthouse = (shiftCell.dataset.courthouse || '').toLowerCase();
        const deputyCell = row.querySelector('.editable[data-type="Fixed Post"]');
        const hasDeputy = parseAssignedMemberValue(deputyCell?.textContent || '').length > 0;
        if (!hasDeputy) return;

        const isOtPost =
            postName.includes('rover o/t') ||
            postName.includes('judges o/t') ||
            postName.includes('rover ot') ||
            postName.includes('judges ot') ||
            (courthouse === 'cummings' && part === '1600' && postName.includes('garage'));

        if (!isOtPost) return;

        total += parseShiftDurationHours((shiftCell.dataset.shift || shiftCell.textContent || '').trim());
    });

    // Regular OT table rows
    document.querySelectorAll('.editable-overtime-shift').forEach(shiftCell => {
        const row = shiftCell.closest('tr');
        if (!row) return;

        const deputyCell = row.querySelector('.editable[data-type="Overtime"]');
        const hasDeputy = parseAssignedMemberValue(deputyCell?.textContent || '').length > 0;
        if (!hasDeputy) return;

        total += parseShiftDurationHours((shiftCell.dataset.shift || shiftCell.textContent || '').trim());
    });

    return total;
}

function updateTotalOtHoursBadge() {
    const badge = document.getElementById('totalOtHoursBadge');
    if (!badge) return;

    const hasRenderedShiftCells = document.querySelectorAll('.editable-overtime-shift, .editable-fixed-shift').length > 0;
    let totalHours = 0;

    if (hasRenderedShiftCells) {
        document.querySelectorAll('.editable-overtime-shift').forEach(shiftCell => {
            const deputyCell = shiftCell.parentElement?.querySelector('.editable[data-type="Overtime"]');
            if (!deputyCell) return;
            if (parseAssignedMemberValue(deputyCell.textContent || '').length === 0) return;
            const shiftText = (shiftCell.dataset.shift || shiftCell.textContent || '').trim();
            totalHours += parseShiftDurationHours(shiftText);
        });

        document.querySelectorAll('.editable-fixed-shift').forEach(shiftCell => {
            const postName = (shiftCell.dataset.room || '').toLowerCase();
            const part = (shiftCell.dataset.part || '').toLowerCase();
            const courthouse = (shiftCell.dataset.courthouse || '').toLowerCase();
            const isGarageOt = courthouse === 'cummings' && postName === 'garage' && part === '1600';
            if (!postName.includes('ot') && !isGarageOt) return;

            const deputyCell = shiftCell.parentElement?.querySelector('.editable[data-type="Fixed Post"]');
            if (!deputyCell) return;
            if (parseAssignedMemberValue(deputyCell.textContent || '').length === 0) return;

            const shiftText = (shiftCell.dataset.shift || shiftCell.textContent || '').trim();
            totalHours += parseShiftDurationHours(shiftText);
        });
    } else {
        totalHours = getTotalOvertimeHours(rows);
    }

    badge.textContent = `OT Hours ${totalHours.toFixed(2)}`;
}



function refreshOvertimeShiftPrompts() {
    document.querySelectorAll('.editable-overtime-shift').forEach(shiftCell => {
        if (shiftCell.querySelector('select')) return;

        const shiftValue = (shiftCell.dataset.shift || '').trim();
        const parsed = parseOvertimeShiftRange(shiftValue);
        const hasValidRange = !!(parsed.start && parsed.end);
        const deputyCell = shiftCell.parentElement?.querySelector('.editable[data-type="Overtime"]');
        const hasAssignedDeputy = parseAssignedMemberValue(deputyCell?.textContent || '').length > 0;

        if (hasAssignedDeputy && !hasValidRange) {
            shiftCell.innerHTML = '<span class="metric-red">Enter Time</span>';
        } else {
            shiftCell.textContent = shiftValue;
        }
    });
}

function getCourtroomAssignmentOptionsHtml(selectedValue) {
    const currentValue = (selectedValue || '').trim();
    const values = COURTROOM_ASSIGNMENT_OPTIONS.slice();
    if (currentValue && !values.includes(currentValue)) {
        values.unshift(currentValue);
    }

    return values.map(value => {
        const selectedAttr = value === currentValue ? ' selected' : '';
        return `<option value="${escapeHtml(value)}"${selectedAttr}>${escapeHtml(value)}</option>`;
    }).join('');
}

function queueAssignmentNoteUpdate(payload) {
    const key = [
        payload.assignment_date,
        payload.courthouse,
        payload.assignment_type,
        payload.location_detail,
        payload.part
    ].join("|");

    pendingNotes[key] = payload;
    updateSaveStatusBadge();
}

function getDetailsNoteCells() {
    return Array.from(document.querySelectorAll('#detailsNotesTable .details-note-cell'));
}

function renderDetailsNotesRows(selectedDate, rows) {
    const byLocation = new Map((rows || []).map(row => [row.location_detail || '', row.assignment_notes || '']));
    getDetailsNoteCells().forEach(cell => {
        const noteIndex = cell.dataset.noteIndex || '';
        const locationDetail = `Row ${noteIndex}`;
        cell.dataset.date = selectedDate || '';
        cell.dataset.locationDetail = locationDetail;
        cell.textContent = byLocation.get(locationDetail) || '';
    });
}

function loadDetailsNotesForDate(selectedDate) {
    renderDetailsNotesRows(selectedDate, []);
    if (!selectedDate) return Promise.resolve();

    return fetch(`/api/get-details-notes?date=${encodeURIComponent(selectedDate)}`)
        .then(res => res.json())
        .then(rows => renderDetailsNotesRows(selectedDate, rows))
        .catch(() => renderDetailsNotesRows(selectedDate, []));
}


function queueCourtroomLocationMove(payload) {
    const key = [
        payload.assignment_date,
        payload.courthouse,
        payload.old_location_detail,
        payload.old_part || ''
    ].join('|');

    const hasChange =
        (payload.old_location_detail || '') !== (payload.new_location_detail || '')
        || (payload.old_part || '') !== (payload.new_part || '');

    if (!hasChange) {
        delete pendingCourtroomLocationMoves[key];
    } else {
        pendingCourtroomLocationMoves[key] = payload;
    }
    updateSaveStatusBadge();
}

function rekeyPendingCourtroomPayloads(date, courthouse, fromRoom, fromPart, toRoom, toPart) {
    const rekeyMap = (source, keyBuilder) => {
        const updated = {};
        Object.values(source).forEach(payload => {
            const isSameCourtroomRow =
                (payload.assignment_date || '') === (date || '')
                && (payload.courthouse || '') === (courthouse || '')
                && (payload.assignment_type || '') === 'Courtroom'
                && (payload.location_detail || '') === (fromRoom || '')
                && (payload.part || '') === (fromPart || '');

            const nextPayload = isSameCourtroomRow
                ? { ...payload, location_detail: toRoom, part: toPart }
                : payload;

            updated[keyBuilder(nextPayload)] = nextPayload;
        });
        return updated;
    };

    pendingAssignments = rekeyMap(
        pendingAssignments,
        (payload) => [
            payload.assignment_date,
            payload.courthouse,
            payload.assignment_type,
            payload.location_detail,
            payload.part
        ].join('|')
    );

    pendingNotes = rekeyMap(
        pendingNotes,
        (payload) => [
            payload.assignment_date,
            payload.courthouse,
            payload.assignment_type,
            payload.location_detail,
            payload.part
        ].join('|')
    );

    pendingJudges = rekeyMap(
        pendingJudges,
        (payload) => [
            payload.assignment_date,
            payload.courthouse,
            payload.assignment_type,
            payload.location_detail,
            payload.part
        ].join('|')
    );

    const rekeyedMeta = {};
    Object.values(pendingCourtroomMeta).forEach(payload => {
        const isSameCourtroomRow =
            (payload.assignment_date || '') === (date || '')
            && (payload.courthouse || '') === (courthouse || '')
            && (payload.location_detail || '') === (fromRoom || '')
            && (payload.part || '') === (fromPart || '');

        const nextPayload = isSameCourtroomRow
            ? { ...payload, location_detail: toRoom, part: toPart }
            : payload;

        const key = [
            nextPayload.assignment_date,
            nextPayload.courthouse,
            nextPayload.location_detail,
            nextPayload.part || ''
        ].join('|');

        rekeyedMeta[key] = nextPayload;
    });
    pendingCourtroomMeta = rekeyedMeta;
}

function buildHidePostedToggle() {
    const label = document.createElement("label");
    label.className = "hide-posted-toggle";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "hide-posted-checkbox";
    checkbox.checked = hidePosted;

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(" Hide Posted"));
    return label;
}

function getPostedCacheKey(date) {
    return `postedNames:${date || ''}`;
}

function getTotalsCacheKey(date) {
    return `assignmentTotals:${date || ''}`;
}

function loadCachedDateState(date) {
    try {
        const postedRaw = localStorage.getItem(getPostedCacheKey(date));
        const totalsRaw = localStorage.getItem(getTotalsCacheKey(date));

        if (postedRaw) {
            globalPostedNames = new Set(JSON.parse(postedRaw));
        }

        if (totalsRaw) {
            const parsedTotals = JSON.parse(totalsRaw);
            globalAssignmentTotals = {
                vacant: parsedTotals.vacant || 0,
                filled: parsedTotals.filled || 0,
                open: parsedTotals.open || 0
            };
        }
    } catch (_) {
        globalPostedNames = new Set();
    }
}

function cacheDateState(date, postedSet, totals) {
    try {
        localStorage.setItem(getPostedCacheKey(date), JSON.stringify(Array.from(postedSet)));
        localStorage.setItem(getTotalsCacheKey(date), JSON.stringify(totals));
    } catch (_) {
        // ignore storage failures
    }
}

function isCourtSecurityDeputy(deputy) {
    const division = (deputy.division || "").trim().toLowerCase();
   

    return division === "court security"

}

function normalizeRankValue(rank) {
    return (rank || "").toUpperCase().replace(/[^A-Z]/g, "");
}

function isExcludedCourtSecurityRank(deputy) {
    const excludedRanks = new Set(["LT", "CAPT", "MJR"]);
    return excludedRanks.has(normalizeRankValue(deputy.rank));
}

function getDeputyRole(deputy) {
    return (deputy.role || deputy.capacity_tag || "").trim();
}

function getDeputyCapacityTag(deputy) {
    return (deputy.capacity_tag || "").trim();
}

function isConsoleCapability(role) {
    return normalizeRoleValue(role) === 'CONSOLE';
}

function isConsoleDeputy(deputy) {
    return isConsoleCapability(getDeputyCapacityTag(deputy) || getDeputyRole(deputy));
}

function isConsoleRoomFixedPost(courthouse, post) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    if (normalizedCourthouse !== 'mitchell' && normalizedCourthouse !== 'cummings') {
        return false;
    }

    const normalizedPost = (post || '').trim().toLowerCase();
    return normalizedPost.includes('console room');
}

function normalizeRoleValue(role) {
    return (role || "").toUpperCase().replace(/\s+/g, "").replace(/_/g, "-");
}

const courtSecurityRoleOrder = [
    "DEPUTY",
    "SPO-A: Court Trained (FT)",
    "SPO-A: Court Trained (contractor)",
    "SPO-A: (FT)",
    "SPO-A: (contractor)",
    "SPO: Court Trained(FT)",
    "SPO Court Trained (contractor)",
    "K9",
    "CSO",
    "Cadet"
];

const courtSecurityRoleOrderNormalized = courtSecurityRoleOrder.map(normalizeRoleValue);

function getCourtSecuritySortRank(deputy) {
    const role = getDeputyCapacityTag(deputy) || getDeputyRole(deputy);
    const roleIndex = courtSecurityRoleOrderNormalized.indexOf(normalizeRoleValue(role));
    if (roleIndex !== -1) return roleIndex;
    return courtSecurityRoleOrder.length;
}

function createRosterItem(deputy, options = {}) {
    const deputyRow = document.createElement("div");
    deputyRow.className = "roster-item";
    deputyRow.dataset.name = deputy.full_name || "";
    deputyRow.dataset.role = getDeputyRole(deputy);

    const showDivision = options.showDivision === true;
    const division = (deputy.division || "Unassigned Division").trim() || "Unassigned Division";
    const capacityTag = getDeputyCapacityTag(deputy);

    const displayCapacityTag = capacityTag;

    deputyRow.textContent = showDivision
        ? `${deputy.full_name}${displayCapacityTag ? ` (${displayCapacityTag})` : ""} - ${division}`
        : `${deputy.full_name}${displayCapacityTag ? ` (${displayCapacityTag})` : ""}`;

    return deputyRow;
}

function getAssignedNamesFromCell(cell) {
    return Array.from(cell.querySelectorAll('.assignment-chip'))
        .map(chip => (chip.dataset.name || chip.textContent || '').trim())
        .filter(Boolean);
}

function getAssignedChipsFromCell(cell) {
    return Array.from(cell.querySelectorAll('.assignment-chip'));
}

function parseAssignedMemberValue(value) {
    const text = (value || '').trim();
    if (!text) return [];

    if (text.includes('||')) {
        return text.split(/\s*\|\|\s*/).map(name => name.trim()).filter(Boolean);
    }

    if (text.includes('\n')) {
        return text.split(/\n+/).map(name => name.trim()).filter(Boolean);
    }

    return [text];
}

function normalizeDeputyName(value) {
    return (value || '').trim().toLowerCase();
}

function getDeputyRecordByName(name) {
    const target = normalizeDeputyName(name);
    if (!target) return null;

    return rawDeputies.find(dep => normalizeDeputyName(dep.full_name) === target) || null;
}

function formatBorrowedCourthouse(courthouse) {
    const normalized = (courthouse || '').trim().toLowerCase();
    if (normalized === 'juvenile') return 'Juv';
    if (normalized === 'mitchell') return 'Mitchell';
    if (normalized === 'cummings') return 'Cummings';
    return courthouse || '';
}

function formatRoomPartTime(cell) {
    const room = (cell.dataset.room || '').trim();
    const part = (cell.dataset.part || '').trim();
    const shift = (cell.dataset.shift || '').trim();

    if (cell.dataset.type === 'Overtime') {
        return `${room || '-'} / ${shift || 'Time TBD'}`;
    }

    const roomPart = [room, part].filter(Boolean).join('/');
    return `${roomPart || '-'} / Time TBD`;
}

function renderBorrowedDeputiesTable() {
    const tbody = document.getElementById('csoDetailBody');
    if (!tbody) return;

    const borrowedRows = [];

    document.querySelectorAll('.editable').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));
        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                const deputy = getDeputyRecordByName(name);
                if (!deputy || isCourtSecurityDeputy(deputy)) return;

                borrowedRows.push({
                    deputyName: name,
                    division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                    courthouse: formatBorrowedCourthouse(cell.dataset.courthouse),
                    roomPartTime: formatRoomPartTime(cell)
                });
            });
            return;
        }

        const assignedNames = getAssignedNamesFromCell(cell);
        if (assignedNames.length === 0) return;

        assignedNames.forEach(name => {
            if (isCurrentlyTransferredOut(name)) return;
            const deputy = getDeputyRecordByName(name);
            if (!deputy || isCourtSecurityDeputy(deputy)) return;

            borrowedRows.push({
                deputyName: name,
                division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                courthouse: formatBorrowedCourthouse(cell.dataset.courthouse),
                roomPartTime: formatRoomPartTime(cell)
            });
        });
    });

    tbody.innerHTML = '';

    if (borrowedRows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="4">No borrowed deputies assigned.</td>';
        tbody.appendChild(tr);
        return;
    }

    borrowedRows
        .sort((a, b) => a.deputyName.localeCompare(b.deputyName) || a.courthouse.localeCompare(b.courthouse))
        .forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.deputyName}</td>
                <td>${item.division}</td>
                <td>${item.courthouse}</td>
                <td>${item.roomPartTime}</td>
            `;
            tbody.appendChild(tr);
        });
}

function normalizeCourtroomAssignmentLabel(value) {
    return (value || '').trim().toUpperCase();
}

function isOpenCourtLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    return normalized === 'OPEN' || normalized.startsWith('OPEN-') || normalized === 'WAITING TO RECEIVE CASE';
}

function isInactiveCourtLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    return getRequiredDeputiesForCourtroomLabel(normalized) === 0;
}

function getRequiredDeputiesForCourtroomLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    if (!normalized) return 0;

    if ([
        'CLOSED',
        'NO DEPUTY',
        'NO DEPUTIES',
        'CIVIL - NO DEPUTIES',
        'ON LEAVE'
    ].includes(normalized)) {
        return 0;
    }

    if ([
        'NEED 2 DEPUTIES'
    ].includes(normalized)) {
        return 2;
    }

    if ([
        'NEED 1 DEPUTY',
        'CIVIL - 1 DEPUTY',
        'JUVENILE',
        'FAMILY',
        'OPEN'
    ].includes(normalized) || normalized.startsWith('OPEN-')) {
        return 1;
    }

    // Keep older labels usable by treating non-empty, non-open labels as 1 required deputy.
    return 1;
}

function shouldCountFixedPostSlot(slotMeta = {}) {
    const courthouse = (slotMeta.courthouse || '').trim().toLowerCase();
    const post = (slotMeta.post || '').trim().toLowerCase();
    const part = (slotMeta.part || '').trim().toLowerCase();

    if (/__lunch$/i.test(part) || part === '__lunch') {
        return false;
    }

    if (courthouse === 'mitchell' && post === 'calvert' && part === '0800-3') {
        return false;
    }

    if (courthouse === 'mitchell' && (post === 'lock up west' || post === 'lockup west') && part === 'open-2') {
        return false;
    }

    if (courthouse === 'juvenile' && post === 'lobby' && part === '0830-1630-3') {
        return false;
    }

    if (courthouse === 'juvenile' && post === 'lockup') {
        return false;
    }

    if (courthouse === 'cummings' && post === 'cummings' && part === '0830-2') {
        return false;
    }

    if (courthouse === 'cummings' && post === 'transportation') {
        return false;
    }

    if (isConsoleRoomFixedPost(courthouse, post)) {
        return false;
    }

    return true;
}

function getSlotState(assignmentType, assignmentLabel, assignedCount, slotMeta = {}) {
    const type = (assignmentType || '').trim();

    if (type === 'Fixed Post') {
        if (!shouldCountFixedPostSlot(slotMeta)) return 'inactive';
        return assignedCount > 0 ? 'filled' : 'vacant';
    }

    if (type === 'Courtroom') {
        const normalized = normalizeCourtroomAssignmentLabel(assignmentLabel);
        if (isInactiveCourtLabel(normalized)) return 'inactive';
        if (isOpenCourtLabel(normalized)) return 'open';
        const requiredDeputies = getRequiredDeputiesForCourtroomLabel(normalized);
        return assignedCount >= requiredDeputies ? 'filled' : 'vacant';
    }

    return 'inactive';
}

function setVacantRowHighlight(cell, slotState) {

function getPostedNameSetForPostsAndCourtrooms() {
    const names = new Set();

    document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"], .editable[data-type="Transport"], .editable[data-type="Overtime"]').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));

        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                const deputy = getDeputyRecordByName(name);
                if (deputy && isConsoleDeputy(deputy)) return;
                names.add(name);
            });
            return;
        }

        parseAssignedMemberValue(cell.textContent).forEach(name => {
            if (isCurrentlyTransferredOut(name)) return;
            const deputy = getDeputyRecordByName(name);
            if (deputy && isConsoleDeputy(deputy)) return;
            names.add(name);
        });
    });

    if (names.size > 0 || document.querySelectorAll('.editable').length > 0) {
        return names;
    }

    return new Set(globalPostedNames);
}

function formatToAmPmFromTimeValue(value) {
    return normalizeUserTimeValue(value);
}

function normalizeUserTimeValue(value) {
    if (!value) return "";
    const raw = value.trim().toUpperCase();

    const full = raw.match(/^(\d{1,2})[:\-](\d{1,2})\s*(AM|PM)?$/i);
    if (!full) return "";

    let h = parseInt(full[1], 10);
    const m = String(parseInt(full[2], 10)).padStart(2, '0');
    const explicitMeridiem = full[3] ? full[3].toUpperCase() : null;

    if (Number.isNaN(h) || Number.isNaN(parseInt(m, 10)) || h < 1 || h > 12 || parseInt(m, 10) > 59) {
        return "";
    }

    let meridiem = explicitMeridiem;
    if (!meridiem) {
        if (h >= 7 && h <= 11) meridiem = "AM";
        else meridiem = "PM";
    }

    return `${h}:${m} ${meridiem}`;
}

function parseStoredTimeToInputValue(value) {
    return normalizeUserTimeValue(value) || value || "";
}

function formatTimeValueToAmPm(value) {
    const trimmed = (value || '').trim();
    const match = trimmed.match(/^(\d{2}):(\d{2})$/);
    if (!match) return '';

    let hour24 = parseInt(match[1], 10);
    const minute = match[2];
    if (Number.isNaN(hour24) || hour24 > 23) return '';

    const meridiem = hour24 >= 12 ? 'PM' : 'AM';
    let hour12 = hour24 % 12;
    if (hour12 === 0) hour12 = 12;
    return `${hour12}:${minute} ${meridiem}`;
}

function getTimeOptionValues() {

        }
    }
    return values;
}

function getHalfHourTimeOptionValues() {

    for (let hour = 0; hour < 24; hour++) {

}

function buildTimeOptionsHtml(selectedValue) {

function buildHalfHourTimeOptionsHtml(selectedValue) {

function getCourtroomTimeOptionValues() {
    const values = [];
    for (let hour = 7; hour <= 22; hour++) {
        for (let minute = 0; minute < 60; minute += 15) {

            const meridiem = hour >= 12 ? 'PM' : 'AM';
            let hour12 = hour % 12;
            if (hour12 === 0) hour12 = 12;
            values.push(`${hour12}:${String(minute).padStart(2, '0')} ${meridiem}`);
        }
    }
    return values;
}

}

function parseDisplayTimeTo24Hour(value) {
    const text = (value || '').trim().toUpperCase();
    const match = text.match(/^(\d{1,2}):(\d{2})\s*([AP]M)$/);
    if (!match) return '';

    let hour = parseInt(match[1], 10);
    const minute = match[2];
    const meridiem = match[3];
    if (meridiem === 'AM') {
        if (hour === 12) hour = 0;
    } else if (hour !== 12) {
        hour += 12;
    }

    return `${String(hour).padStart(2, '0')}:${minute}`;
}

function parseShiftTimeDisplayValue(value) {
    const text = (value || '').trim().replace(/[\u2013\u2014]/g, '-');
    const rangeMatch = text.match(/^(\d{1,2}:\d{2}\s*[AP]M)\s*-\s*(\d{1,2}:\d{2}\s*[AP]M)$/i);
    if (rangeMatch) {
        return {
            start: parseDisplayTimeTo24Hour(rangeMatch[1]),
            end: parseDisplayTimeTo24Hour(rangeMatch[2])
        };
    }

    const range24Match = text.match(/^([01]?\d|2[0-3]):([0-5]\d)(?::[0-5]\d)?\s*-\s*([01]?\d|2[0-3]):([0-5]\d)(?::[0-5]\d)?$/);
    if (range24Match) {
        return {
            start: `${String(Number(range24Match[1])).padStart(2, '0')}:${range24Match[2]}`,
            end: `${String(Number(range24Match[3])).padStart(2, '0')}:${range24Match[4]}`
        };
    }

    const singleMatch = text.match(/^(\d{1,2}:\d{2}\s*[AP]M)$/i);
    if (singleMatch) {
        return {
            start: parseDisplayTimeTo24Hour(singleMatch[1]),
            end: ''
        };
    }

    const single24Match = text.match(/^([01]?\d|2[0-3]):([0-5]\d)(?::[0-5]\d)?$/);
    if (single24Match) {
        return {
            start: `${String(Number(single24Match[1])).padStart(2, '0')}:${single24Match[2]}`,
            end: ''
        };
    }

    return { start: '', end: '' };
}

function buildShiftDisplayValue(startValue, endValue) {
    const start = formatTimeValueToAmPm(startValue);
    const end = formatTimeValueToAmPm(endValue);
    if (start && end) return `${start} - ${end}`;
    if (start) return start;
    return '';
}

function parseOvertimeShiftRange(value) {
    return parseShiftTimeDisplayValue(value);
}

function buildOvertimeShiftDisplayValue(startValue, endValue) {
    const start = formatTimeValueToAmPm(startValue);
    const end = formatTimeValueToAmPm(endValue);
    if (start && end) return `${start} - ${end}`;
    if (start) return start;
    return '';
}

function fetchGlobalAssignmentTotals(dateValue) {
    const date = dateValue || document.getElementById('date').value;
    if (!date) {
        globalAssignmentTotals = { vacant: 0, filled: 0, open: 0 };
        updateAssignmentCountBadges();
        return Promise.resolve();
    }

    return fetch(`/api/search?date=${date}`)
        .then(response => response.json())
        .then(rows => {
            const normalizedSlots = buildNormalizedSlotsForCountHelper(rows || []);
            const { vacant, filled, open } = SlotCountHelper.countNormalizedSlots(normalizedSlots);

            const posted = new Set();
            (rows || [])
                .filter(row => ['Courtroom', 'Fixed Post', 'Overtime', 'Transport'].includes(row.assignment_type))
                .filter(row => (row.assigned_member || '').trim().length > 0)
                .forEach(row => {
                parseAssignedMemberValue(row.assigned_member).forEach(name => posted.add(name));
                });
            globalPostedNames = posted;

            globalAssignmentTotals = { vacant, filled, open };
            cacheDateState(date, posted, globalAssignmentTotals);
            updateAssignmentCountBadges();
            refreshRosterHeaderCounts();
            refreshRosterAssignedState();
        })
        .catch(() => {
            globalAssignmentTotals = { vacant: 0, filled: 0, open: 0 };
            globalPostedNames = new Set();
            cacheDateState(date, globalPostedNames, globalAssignmentTotals);
            updateAssignmentCountBadges();
            refreshRosterHeaderCounts();
            refreshRosterAssignedState();
        });
}

function buildNormalizedSlotsForCountHelper(rows) {
    return (rows || [])
        .filter(row => row.assignment_type === 'Courtroom' || row.assignment_type === 'Fixed Post')
        .map(row => {
            const assignmentType = (row.assignment_type || '').trim();
            const assignmentLabel = row.assignment_notes || '';
            const assignedCount = parseAssignedMemberValue(row.assigned_member || '').length;
            const slotState = getSlotState(assignmentType, assignmentLabel, assignedCount, {
                courthouse: row.courthouse || '',
                post: row.location_group || '',
                part: row.part || ''
            });

            return {
                countable: slotState !== 'inactive',
                requiredDeputies: assignmentType === 'Fixed Post'
                    ? 1
                    : getRequiredDeputiesForCourtroomLabel(assignmentLabel),
                state: slotState
            };
        });
}

function updateAssignmentCountBadges() {
    const getCountCourthouse = (cell) => {
        const courthouse = cell.dataset.courthouse || '';
        const building = (cell.closest('.courtroom-meta-row')?.querySelector('td')?.textContent || '').trim();

        // Retired judges are rendered under Juvenile but physically sit in Cummings/Mitchell rooms.
        // Count those rows toward the matching building's V/F/O badge.
        if (courthouse === 'Juvenile' && (building === 'Cummings' || building === 'Mitchell')) {
            return building;
        }

        return courthouse;
    };

    const statsBySection = {};
    let overallVacant = 0;
    let overallFilled = 0;
    let overallOpen = 0;

    document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"], .editable[data-type="Overtime"]').forEach(cell => {
        if (!cell || cell.getClientRects().length === 0) return;

        const courthouse = getCountCourthouse(cell);
        const sectionType = cell.dataset.type || '';
        const key = `${courthouse}|${sectionType}`;
        if (!statsBySection[key]) {
            statsBySection[key] = { vacant: 0, filled: 0, open: 0, type: sectionType };
        }

        if (sectionType === 'Overtime') {
            const assignedNames = getAssignedNamesFromCell(cell);
            const parsedTextNames = parseAssignedMemberValue(cell.textContent);
            if (assignedNames.length > 0 || parsedTextNames.length > 0) {
                statsBySection[key].filled += 1;
            }
            return;
        }

        const assignedCount = getAssignedNamesFromCell(cell).length;

        let assignmentLabel = '';
        if (sectionType === 'Courtroom') {
            const rowEl = cell.closest('.courtroom-meta-row');
            assignmentLabel = rowEl?.querySelector('.courtroom-assignment-select')?.value || '';
        }

        const slotState = getSlotState(sectionType, assignmentLabel, assignedCount, {
            courthouse: cell.dataset.courthouse || '',
            post: cell.dataset.room || '',
            part: cell.dataset.part || ''
        });
        setVacantRowHighlight(cell, slotState);

        const required = sectionType === 'Courtroom'
            ? getRequiredDeputiesForCourtroomLabel(assignmentLabel)
            : 1;

        if (slotState === 'vacant') {
            const missing = Math.max(required - assignedCount, 1);
            statsBySection[key].vacant += missing;
            overallVacant += missing;
        }
        else if (slotState === 'filled') {
            statsBySection[key].filled += required;
            overallFilled += required;
        } else if (slotState === 'open') {
            statsBySection[key].open += 1;
            overallOpen += 1;
        }
    });

    const hasLiveAssignmentGrid = document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"]').length > 0;
    const sourceVacant = hasLiveAssignmentGrid ? overallVacant : (globalAssignmentTotals.vacant || 0);
    const sourceFilled = hasLiveAssignmentGrid ? overallFilled : (globalAssignmentTotals.filled || 0);
    const sourceOpen = hasLiveAssignmentGrid ? overallOpen : (globalAssignmentTotals.open || 0);
    const overallBadge = document.getElementById('overallAssignmentCounts');
    if (overallBadge) {
        overallBadge.innerHTML = formatCountMetrics(sourceVacant, sourceFilled, sourceOpen);
    }
    updateTotalOtHoursBadge();

    document.querySelectorAll('[data-badge-key]').forEach(el => {
        const key = el.dataset.badgeKey;
        const stats = statsBySection[key] || { vacant: 0, filled: 0, open: 0, type: '' };

        if (stats.type === 'Overtime') {
            el.innerHTML = `<span class="metric-blue">Filled ${stats.filled}</span>`;
            return;
        }

        el.innerHTML = formatCountMetrics(stats.vacant, stats.filled, stats.open);
    });

    document.querySelectorAll('[data-main-badge]').forEach(el => {
        const courthouse = el.dataset.mainBadge || '';
        const postStats = statsBySection[`${courthouse}|Fixed Post`] || { vacant: 0, filled: 0, open: 0 };
        const courtroomStats = statsBySection[`${courthouse}|Courtroom`] || { vacant: 0, filled: 0, open: 0 };
        const vacant = postStats.vacant + courtroomStats.vacant;
        const filled = postStats.filled + courtroomStats.filled;
        const open = postStats.open + courtroomStats.open;
        el.innerHTML = formatCountMetrics(vacant, filled, open);
    });

    refreshOvertimeShiftPrompts();
}

function getCourtSecurityRosterStats() {
    const courtSecurity = rawDeputies.filter(dep =>
        isCourtSecurityDeputy(dep)
        && !isExcludedCourtSecurityRank(dep)
    );
    const outCount = courtSecurity.filter(dep => !isDeputyAvailable(dep)).length;
    const postedNames = getPostedNameSetForPostsAndCourtrooms();
    const postedCount = courtSecurity.filter(dep => postedNames.has((dep.full_name || '').trim())).length;

    const totalAvailablePool = courtSecurity.filter(dep => isDeputyAvailable(dep)).length;
    const availableCount = Math.max(totalAvailablePool - postedCount, 0);

    return { outCount, availableCount, postedCount };
}

function refreshRosterAssignedState() {
    const assignedNames = getAssignedNamesAcrossGrid();
    document.querySelectorAll('#rosterList .roster-item').forEach(item => {

function getIneligibleAssignmentMessage(cell) {
    const category = getCellAssignmentCategory(cell);
    if (category === 'courtroom') {
        return 'Primary court slot: DEPUTY, SPO-A Court Trained, or K9. Secondary also allows SPO Court Trained (FT/contractor).';
    }

    if (category === 'security' && requiresK9SecurityRole(cell.dataset.courthouse, cell.dataset.room)) {
        return 'This post only allows K9 capability.';
    }

    return 'Primary armed slot: DEPUTY, SPO-A (court-trained or armed), or K9.';
}


function getDefaultTransferTimeValue() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const meridiem = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    if (h === 0) h = 12;
    return `${h}:${m} ${meridiem}`;
}

    overlay.style.background = 'rgba(15, 23, 42, 0.35)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = '10001';

    const panel = document.createElement('div');
    panel.style.background = 'white';
    panel.style.borderRadius = '10px';
    panel.style.padding = '14px';
    panel.style.minWidth = '280px';
    panel.style.boxShadow = '0 10px 30px rgba(16,24,40,.2)';

    const heading = document.createElement('div');
    heading.style.fontWeight = '700';
    heading.style.marginBottom = '8px';
    heading.textContent = title || 'Transfer time';

    const input = document.createElement('input');

    actions.style.marginTop = '10px';

    cancelBtn.type = 'button';
    cancelBtn.textContent = 'Cancel';

    const saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.textContent = 'Save';

    const close = () => overlay.remove();
    const cancel = () => {
        if (typeof onCancel === 'function') onCancel();
        close();
    };

    cancelBtn.addEventListener('click', cancel);
    saveBtn.addEventListener('click', () => {
        const normalized = normalizeUserTimeValue(input.value) || input.value.trim();
        if (!normalized) return;

    });

function hasActiveAssignmentElsewhere(name, excludeCell) {
    const targetName = (name || '').trim();
    if (!targetName) return false;

    return Array.from(document.querySelectorAll('.editable')).some(cell => {
        if (cell === excludeCell) return false;
        return Array.from(cell.querySelectorAll('.assignment-chip')).some(chip => {
            const chipName = (chip.dataset.name || '').trim();
            if (chipName !== targetName) return false;
            return !isChipUnavailableForDualAssignment(chip, chipName);
        });
    });
}
function updateChipWithTransferTimes(chip, name) {
    const history = transferMap[name]?.history || [];

    const thisPost = chip.closest('.editable')?.dataset.room;

    let outTime = null;
    let inTime = null;

    history.forEach(t => {
        if (t.from === thisPost) outTime = t.out;
        if (t.to === thisPost) inTime = t.in;
    });

    let label = name;

    if (outTime) label += ` (out: ${outTime})`;
    if (inTime) label += `${outTime ? ',' : ''} in: ${inTime}`;

    chip.textContent = label;
}
function getChipDeputyName(chip) {
    const rawName = (chip?.dataset?.name || chip?.textContent || '').trim();
    return rawName.replace(/\s*\((out|in):.*$/i, '').trim();
}

function applyDeputyToCell(dropCell, assignedName, role, options = {}) {
    const canAssignByAvailability = canAssignDeputyName(assignedName);
    const allowUnavailable = !!options.allowUnavailable;
    if (!canAssignByAvailability) {
        if (!allowUnavailable) {
            showCellWarning(dropCell, 'Deputy is not currently available to be assigned from typing.');
        }
        if (!allowUnavailable) return false;
    }

    const resolvedRole = resolveAssignmentRole(assignedName, role);

    if (!isEligibleForCell(dropCell, resolvedRole)) {
        showCellWarning(dropCell, getIneligibleAssignmentMessage(dropCell));
        return false;
    }

    const normalizedName = (assignedName || '').trim();
    const matchingChipsInCell = Array.from(dropCell.querySelectorAll('.assignment-chip')).filter(chip =>
        getChipDeputyName(chip) === normalizedName
    );
    const existingChipInCell = matchingChipsInCell.find(isChipMarkedTransferredOut) || matchingChipsInCell[0] || null;
    matchingChipsInCell.forEach(chip => {
        if (chip !== existingChipInCell) chip.remove();
    });
    if (existingChipInCell && !isChipMarkedTransferredOut(existingChipInCell)) {
        updateChipWithTransferTimes(existingChipInCell, normalizedName);
        return true;
    }

    const deputyAssignedElsewhere = hasActiveAssignmentElsewhere(normalizedName, dropCell);
    const preserveExistingAssignments = !!options.preserveExistingAssignments;

    if (deputyAssignedElsewhere && canReassignPosted && !preserveExistingAssignments) {
        const confirmed = window.confirm(`${normalizedName} is already assigned to another slot. Keep them on BOTH assignments?`);
        if (!confirmed) return false;
    }

    const assignmentList = ensureCellStructure(dropCell);

    if ((!deputyAssignedElsewhere || !canReassignPosted) && !preserveExistingAssignments) {
        clearExistingAssignmentForName(normalizedName, dropCell);
    }

    const item = existingChipInCell || buildAssignmentChip(normalizedName, resolvedRole, dropCell);
    if (!existingChipInCell) {
        assignmentList.appendChild(item);
    }

    

    setPendingAssignmentFromCell(dropCell);

    const transferState = transferMap[normalizedName];
    const openTransferIndex = transferState?.openTransferIndex || null;
    const transferInTime = (options.transferInTime || '').trim();
    const transferIndexOverride = options.transferIndex || null;
    if (openTransferIndex || (transferInTime && transferIndexOverride)) {
        const resolvedTransferIndex = transferIndexOverride || openTransferIndex;
        const saveTransferIn = (timeValue) => fetch('/api/transfer-in', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                assignment_date: dropCell.dataset.date,
                full_name: normalizedName,
                transfer_index: resolvedTransferIndex,
                transfer_time: timeValue,
                to_post: (dropCell.dataset.room || '').trim()
            })
        })
        .then(r => r.json())
        .then(payload => {
            if (payload?.status !== 'success') return;
            const wasTransferredOut = isChipMarkedTransferredOut(item);
            item.dataset.transferInTime = payload.in_time || timeValue;
            if (!wasTransferredOut) {
                item.dataset.transferOutTime = '';
            }
            rememberTransferredInChip(dropCell, normalizedName, payload.in_time || timeValue);
            forgetTransferredChip(dropCell, normalizedName);
            item.dataset.transferredOut = 'false';
            item.classList.remove('transferred-out');
            return fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
        })
        .catch(() => {});

        if (transferInTime) {
            saveTransferIn(transferInTime);
        } else {
        openTransferTimePicker({
            title: `Transfer In: ${normalizedName}`,
            defaultTime: getDefaultTransferTimeValue(),
            onCancel: () => {
                forgetTransferredInChip(dropCell, normalizedName);
                item.remove();
                setPendingAssignmentFromCell(dropCell);
                refreshRosterAssignedState();
            },
            onSave: (transferTime) => {
                saveTransferIn(transferTime);
            }
        });
        }
    }

    refreshRosterAssignedState();
    return true;
}

function parseDateOnly(value) {
    if (!value) return null;
    const d = new Date(`${value}T00:00:00`);
    return Number.isNaN(d.getTime()) ? null : d;
}

function effectiveStatusForSearchDate(deputy) {
    const selectedDate = parseDateOnly(document.getElementById("date").value);

    try {
        const raw = deputy.status_raw;
        const parsed = raw ? JSON.parse(raw) : null;
        const ranges = parsed && Array.isArray(parsed.ranges) ? parsed.ranges : [];
        const weeklyUnavailable = parsed && Array.isArray(parsed.weekly_unavailable) ? parsed.weekly_unavailable : [];
        const active = [];

        if (selectedDate) {
            for (let i = 0; i < ranges.length; i += 1) {
                const entry = ranges[i];
                const start = parseDateOnly(entry.start_date);
                const end = parseDateOnly(entry.end_date);
                if (start && end && selectedDate >= start && selectedDate <= end) {
                    const status = (entry.status || '').toLowerCase();
                    if (status && !active.includes(status)) active.push(status);
                }
            }

            const weekday = selectedDate.toLocaleDateString("en-US", { weekday: "long" });
            for (let i = 0; i < weeklyUnavailable.length; i += 1) {
                const rule = weeklyUnavailable[i] || {};
                const day = (rule.day || '').trim();
                const ruleEnd = parseDateOnly(rule.end_date);
                if (!day || !ruleEnd) continue;
                if (selectedDate <= ruleEnd && (day === 'Any Day' || day === weekday)) {
                    if (!active.includes('unavailable')) active.push('unavailable');
                }
            }

            if (active.length > 0) return active.join(' / ');
        }

        if (parsed && parsed.legacy) {
            return parsed.legacy.toLowerCase();
        }
    } catch (_) {
        // fallback to effective status from API
    }

    return (deputy.current_status || '').trim().toLowerCase();
}

function isDeputyAvailable(deputy) {
    const status = effectiveStatusForSearchDate(deputy);
    if (!status) return true;

    return !status.includes('scheduled leave')
        && !status.includes('unscheduled leave')
        && !status.includes('unscheduled')
        && !status.includes('unavailable')
        && !status.includes('training');
}

function loadRoster() {
    fetch(`/api/deputies?date=${document.getElementById("date").value || ""}`)
        .then(response => response.json())
        .then(data => {
            rawDeputies = data || [];
            allDeputies = rawDeputies
                .filter(isDeputyAvailable)
                .sort((a, b) => (a.full_name || "").localeCompare(b.full_name || ""));
            renderRoster();
        });
}

function getCellAssignmentCategory(cell) {
    if (cell.dataset.type === 'Courtroom') return 'courtroom';
    if (cell.dataset.type === 'Fixed Post') return 'security';
    return 'overtime';
}

const CAPABILITY_MATRIX = {
    'DEPUTY': { courtPrimary: true, courtSecondary: true, armed: true },
    'SPO-A: Court Trained (FT)': { courtPrimary: true, courtSecondary: true, armed: true },
    'SPO-A: Court Trained (contractor)': { courtPrimary: true, courtSecondary: true, armed: true },
    'SPO-A: (FT)': { courtPrimary: false, courtSecondary: false, armed: true },
    'SPO-A: (contractor)': { courtPrimary: false, courtSecondary: false, armed: true },
    'SPO: Court Trained(FT)': { courtPrimary: false, courtSecondary: true, armed: false },
    'SPO Court Trained (contractor)': { courtPrimary: false, courtSecondary: true, armed: false },
    'K9': { courtPrimary: true, courtSecondary: true, armed: true },
    'CSO': { courtPrimary: false, courtSecondary: false, armed: false },
    'Cadet': { courtPrimary: false, courtSecondary: false, armed: false }
};

const CAPABILITY_ROLE_ALIASES = {
    'DEP': 'DEPUTY',
    'DEPUTIES': 'DEPUTY',
    'DEPK9': 'K9',
    'DEP-K9': 'K9',
    'SPOUA': 'SPO-A:(FT)',
    'SPO-UA': 'SPO-A:(FT)',
    'SPO-UA(FT)': 'SPO-A:(FT)'
};

function getCapabilityRule(role) {
    const normalizedRole = normalizeRoleValue(role);
    const aliasedRole = CAPABILITY_ROLE_ALIASES[normalizedRole] || normalizedRole;
    const matchedTag = Object.keys(CAPABILITY_MATRIX).find(tag => normalizeRoleValue(tag) === aliasedRole);
    return matchedTag ? CAPABILITY_MATRIX[matchedTag] : null;
}

function resolveAssignmentRole(name, role) {
    if (getCapabilityRule(role)) return role;

    const normalizedName = (name || '').trim();
    if (!normalizedName) return role;

    const chipWithRole = document.querySelector(`.assignment-chip[data-name="${CSS.escape(normalizedName)}"][data-role]`);
    const chipRole = (chipWithRole?.dataset?.role || '').trim();
    if (getCapabilityRule(chipRole)) return chipRole;

    const rosterRole = (document.querySelector(`.roster-item[data-name="${CSS.escape(normalizedName)}"]`)?.dataset?.role || '').trim();
    if (getCapabilityRule(rosterRole)) return rosterRole;

    const deputy = getDeputyRecordByName(normalizedName);
    const deputyRole = getDeputyRole(deputy || {});
    if (getCapabilityRule(deputyRole)) return deputyRole;

    return role;
}

function isCourtPrimaryCapability(role) {
    return Boolean(getCapabilityRule(role)?.courtPrimary);
}

function isCourtSecondaryCapability(role) {
    return Boolean(getCapabilityRule(role)?.courtSecondary);
}

function isDoorPrimaryCapability(role) {
    return Boolean(getCapabilityRule(role)?.armed);
}

function isNoGunFixedPost(courthouse, post) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();

    return (normalizedCourthouse === 'mitchell' && (
            normalizedPost === 'fayette h/c console room'
            || normalizedPost === 'lock up west'
        ))
        || (normalizedCourthouse === 'cummings' && (
            normalizedPost === 'fayette st. h/c'
            || normalizedPost === 'console room'
            || normalizedPost === 'lock up east'
        ));
}

const REQUIRED_ARMED_FIXED_POST_SLOTS = new Set([
    'mitchell|calvert|0800-1',
    'mitchell|lexington|0700-1500',
    'mitchell|st. paul|0730',
    'mitchell|judges o/t|0700',
    'cummings|cummings|0800',
    'cummings|garage|0600',
    'cummings|garage|1600',
    'cummings|family desk|0800',
    'juvenile|office|0830-1700',
    'juvenile|lobby|0830-1630-1',
    'juvenile|lockup|'
]);

const REQUIRED_COURT_TRAINED_FIXED_POST_SLOTS = new Set([
    'mitchell|jury room|0730'
]);

function getFixedPostSlotKey(courthouse, post, part) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();
    const normalizedPart = (part || '').trim().toLowerCase();
    return `${normalizedCourthouse}|${normalizedPost}|${normalizedPart}`;
}

function requiresArmedFixedPostSlot(courthouse, post, part) {
    return REQUIRED_ARMED_FIXED_POST_SLOTS.has(getFixedPostSlotKey(courthouse, post, part));
}

function requiresCourtTrainedFixedPostSlot(courthouse, post, part) {
    return REQUIRED_COURT_TRAINED_FIXED_POST_SLOTS.has(getFixedPostSlotKey(courthouse, post, part));
}

function getBaseFixedPostPart(part) {
    return (part || '').replace(/__LUNCH$/i, '').trim();
}

function isLunchFixedPostCell(cell) {
    const part = (cell?.dataset?.part || '').trim();
    return /__LUNCH$/i.test(part) || part === '__LUNCH';
}

function requiresPrimarySecurityRole(courthouse, post, shift, part) {
    if (requiresArmedFixedPostSlot(courthouse, post, part)) {
        return true;
    }

    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();
    const normalizedShift = (shift || '').trim().toLowerCase();

    if (normalizedCourthouse === 'cummings' && (normalizedPost === 'family desk' || normalizedPost === 'family court')) {
        return true;
    }

    if (normalizedCourthouse === 'cummings' && normalizedPost === 'cummings' && normalizedShift === '8:00 am') {
        return false;
    }

    if (normalizedCourthouse === 'cummings' && normalizedPost === 'cummings' && normalizedShift === '8:30 am') {
        return false;
    }

    return true;
}

function isK9Capability(role) {
    const normalizedRole = normalizeRoleValue(role);
    return normalizedRole === 'K9' || normalizedRole === 'DEP-K9' || normalizedRole === 'DEPK9';
}

function requiresK9SecurityRole(courthouse, post) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();

    return normalizedCourthouse === 'mitchell' && (normalizedPost === 'k9 services' || normalizedPost === 'rover');
}

function isArmedByName(name) {
    const chipWithRole = document.querySelector(`.assignment-chip[data-name="${CSS.escape((name || '').trim())}"][data-role]`);
    const chipRole = (chipWithRole?.dataset?.role || '').trim().toUpperCase();
    if (chipRole) return isDoorPrimaryCapability(chipRole);

    const deputy = getDeputyRecordByName(name);
    const role = getDeputyRole(deputy || {});
    if (!role) return true;
    return isDoorPrimaryCapability(role);
}

function isArmedAssignmentChip(chip) {
    const role = (chip?.dataset?.role || '').trim().toUpperCase();
    if (role) return isDoorPrimaryCapability(role);

    const name = (chip?.dataset?.name || chip?.textContent || '').trim();
    return isArmedByName(name);
}

function isCourtPrimaryAssignmentChip(chip) {
    const role = (chip?.dataset?.role || '').trim().toUpperCase();
    if (role) return isCourtPrimaryCapability(role);

    const name = (chip?.dataset?.name || chip?.textContent || '').trim();
    const deputy = getDeputyRecordByName(name);
    const deputyRole = getDeputyRole(deputy || {});
    if (!deputyRole) return false;
    return isCourtPrimaryCapability(deputyRole);
}

function cellRequiresArmedFixedPost(cell) {
    return requiresArmedFixedPostSlot(
        cell?.dataset?.courthouse,
        cell?.dataset?.room,
        getBaseFixedPostPart(cell?.dataset?.part)
    );
}

function cellRequiresCourtTrainedFixedPost(cell) {
    return requiresCourtTrainedFixedPostSlot(
        cell?.dataset?.courthouse,
        cell?.dataset?.room,
        getBaseFixedPostPart(cell?.dataset?.part)
    );
}

function isArmedRequirementSatisfied(cell) {
    return getAssignedChipsFromCell(cell).some(isArmedAssignmentChip);
}

function getUnmetArmedFixedPostSlots() {
    return Array.from(document.querySelectorAll('.editable[data-type="Fixed Post"]')).filter(cell =>
        !isLunchFixedPostCell(cell)
        &&
        cellRequiresArmedFixedPost(cell) && !isArmedRequirementSatisfied(cell)
    );
}

function updateFixedPostArmedWarnings() {
    document.querySelectorAll('.editable[data-type="Fixed Post"]').forEach(cell => {
        const row = cell.closest('tr');
        cell.querySelectorAll('.armed-warning').forEach(el => el.remove());
        cell.classList.remove('armed-required-unmet');
        row?.classList.remove('assignment-armed-unmet-row');

        if (isLunchFixedPostCell(cell)) {
            return;
        }

        const requiresCourtTrained = cellRequiresCourtTrainedFixedPost(cell);
        const requiresArmed = cellRequiresArmedFixedPost(cell);

        if (!requiresCourtTrained && (!requiresArmed || isArmedRequirementSatisfied(cell))) {
            return;
        }

        if (requiresCourtTrained && getAssignedChipsFromCell(cell).some(isCourtPrimaryAssignmentChip)) {
            return;
        }

        cell.classList.add('armed-required-unmet');
        row?.classList.add('assignment-armed-unmet-row');
        const warning = document.createElement('div');
        warning.className = 'armed-warning';
        warning.style.color = '#b42318';
        warning.style.fontWeight = '700';
        warning.textContent = requiresCourtTrained ? 'COURT TRAINED' : 'ARMED';
        cell.appendChild(warning);
    });
}

function getSingleArmedAcrossPostViolations() {
    return getUnmetArmedFixedPostSlots().map(cell => ({
        courthouse: (cell.dataset.courthouse || '').trim(),
        post: `${(cell.dataset.room || '').trim()} ${(cell.dataset.shift || '').trim()}`.trim()
    }));
}

function isEligibleForCell(cell, role) {
    const category = getCellAssignmentCategory(cell);
    const existingAssignments = getAssignedNamesFromCell(cell).length;
    if (category === 'courtroom') {
        if (existingAssignments === 0) return isCourtPrimaryCapability(role);
        return isCourtSecondaryCapability(role);
    }

    if (category === 'security') {
        const post = (cell.dataset.room || '').trim();
        const courthouse = (cell.dataset.courthouse || '').trim();
        const shift = (cell.dataset.shift || '').trim();
        const slotPart = getBaseFixedPostPart((cell.dataset.part || '').trim());

        if (isConsoleCapability(role)) {
            return isConsoleRoomFixedPost(courthouse, post);
        }

        if (requiresK9SecurityRole(courthouse, post)) {
            return isK9Capability(role);
        }

        if (!requiresArmedFixedPostSlot(courthouse, post, slotPart) && !requiresCourtTrainedFixedPostSlot(courthouse, post, slotPart)) {
            return true;
        }

        if (requiresCourtTrainedFixedPostSlot(courthouse, post, slotPart)) {
            const matchingSecurityCells = Array.from(
                document.querySelectorAll('.editable[data-type="Fixed Post"]')
            ).filter(candidate => {
                if ((candidate.dataset.room || '').trim() !== post) return false;
                return (candidate.dataset.shift || '').trim() === shift;
            });

            const hasCourtPrimaryAssigned = matchingSecurityCells.some(candidate =>
                getAssignedNamesFromCell(candidate).some(name => {
                    const deputy = getDeputyRecordByName(name);
                    const assignedRole = getDeputyRole(deputy || {});
                    return isCourtPrimaryCapability(assignedRole);
                })
            );

            if (!hasCourtPrimaryAssigned && !isCourtPrimaryCapability(role)) {
                return false;
            }

            return true;
        }

        if (existingAssignments === 0) {
            return isDoorPrimaryCapability(role);
        }

        if ((courthouse || '').trim().toLowerCase() === 'cummings' && ['family desk', 'family court'].includes(post.trim().toLowerCase())) {
            return true;
        }

        if ((courthouse || '').trim().toLowerCase() === 'cummings' && post.trim().toLowerCase() === 'cummings' && shift.trim().toLowerCase() === '8:00 am') {
            return true;
        }

        if (isNoGunFixedPost(courthouse, post)) {
            return true;
        }

        const matchingSecurityCells = Array.from(
            document.querySelectorAll('.editable[data-type="Fixed Post"]')
        ).filter(candidate => {
            if ((candidate.dataset.room || '').trim() !== post) return false;
            return (candidate.dataset.shift || '').trim() === shift;
        });

        if (requiresArmedFixedPostSlot(courthouse, post, slotPart) && !isDoorPrimaryCapability(role)) {
            const armedAlreadyAssignedInCell = isArmedRequirementSatisfied(cell);
            if (!armedAlreadyAssignedInCell) {
                return false;
            }
        }

        const requirePrimary = requiresPrimarySecurityRole(courthouse, post, shift, slotPart);

        const hasPrimaryAssigned = matchingSecurityCells.some(candidate =>
            getAssignedNamesFromCell(candidate).some(name => {
                const deputy = getDeputyRecordByName(name);
                const assignedRole = getDeputyRole(deputy || {});
                return isDoorPrimaryCapability(assignedRole);
            })
        );

        if (requirePrimary && !hasPrimaryAssigned && !isDoorPrimaryCapability(role)) {
            return false;
        }

        return true;
    }

    return true;
}

function buildAssignmentChip(name, role, owningCell = null) {
  const chip = document.createElement('span');
  chip.className = 'assignment-chip';
  chip.dataset.name = (name || '').trim();
  chip.dataset.role = (role || '').trim();
  chip.dataset.transferredOut = 'false';
  chip.textContent = (name || '').trim();
  chip.dataset.transferOutTime = '';
  chip.dataset.transferInTime = getTransferredInTimeForChip(owningCell, name) || '';

  if (owningCell && transferredOutChipKeys.has(getTransferredChipKey(owningCell, name))) {
    chip.dataset.transferredOut = 'true';
    chip.classList.add('transferred-out');
    chip.dataset.transferOutTime = transferMap[(name || '').trim()]?.latestOut || '';
  }

  chip.addEventListener('click', function (e) {
    e.stopPropagation();

    // remove any existing popover
    document.querySelectorAll('.assignment-action-popover').forEach(p => p.remove());

    const cell = chip.closest('.editable');
    if (!cell) return;

    const deputyName = (chip.dataset.name || chip.textContent || '').trim();
    const date = cell.dataset.date;

    const pop = document.createElement('div');
    pop.className = 'assignment-action-popover';
    pop.style.position = 'absolute';
    pop.style.zIndex = 9999;
    pop.style.background = 'white';
    pop.style.border = '1px solid #D0D5DD';
    pop.style.borderRadius = '8px';
    pop.style.boxShadow = '0 8px 24px rgba(16,24,40,.12)';
    pop.style.padding = '8px';
    pop.style.display = 'flex';
    pop.style.gap = '8px';

    const btnTransfer = document.createElement('button');
    btnTransfer.type = 'button';
    btnTransfer.textContent = 'Transfer Out';

    const transferState = transferMap[(deputyName || '').trim()] || {};
    const hasTransferData = (transferState?.history?.length || 0) > 0;

    const btnRemoveTransferData = document.createElement('button');
    btnRemoveTransferData.type = 'button';
    btnRemoveTransferData.textContent = 'Remove transfer data';

    const btnRemove = document.createElement('button');
    btnRemove.type = 'button';
    btnRemove.textContent = 'Remove';

    const btnCancel = document.createElement('button');
    btnCancel.type = 'button';
    btnCancel.textContent = 'Cancel';

    pop.appendChild(btnTransfer);
    if (hasTransferData) {
      pop.appendChild(btnRemoveTransferData);
    }
    pop.appendChild(btnRemove);
    pop.appendChild(btnCancel);

    const rect = chip.getBoundingClientRect();
    pop.style.left = (window.scrollX + rect.left) + 'px';
    pop.style.top  = (window.scrollY + rect.bottom + 6) + 'px';
    document.body.appendChild(pop);

    const closePop = () => pop.remove();

    const removeChip = () => {
      forgetTransferredChip(cell, deputyName);
      forgetTransferredInChip(cell, deputyName);
      chip.remove();
      setPendingAssignmentFromCell(cell);
      refreshRosterAssignedState();
      closePop();
    };

    btnCancel.addEventListener('click', (ev) => { ev.stopPropagation(); closePop(); });
    btnRemove.addEventListener('click', (ev) => { ev.stopPropagation(); removeChip(); });

    btnRemoveTransferData.addEventListener('click', (ev) => {
      ev.stopPropagation();
      fetch('/api/remove-transfer-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          assignment_date: date,
          full_name: deputyName
        })
      })
      .then(r => r.json())
      .then(payload => {
        if (payload?.status !== 'success') return;
        clearTransferVisualStateForDeputy(deputyName);
        delete transferMap[(deputyName || '').trim()];
        return fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
      })
      .finally(() => closePop());
    });

    btnTransfer.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const transferCount = transferState?.history?.length || 0;
      if (transferCount >= 3 && !transferState?.openTransferIndex) {
        closePop();
        return;
      }

      openTransferTimePicker({
        title: `Transfer Out: ${deputyName}`,
        defaultTime: transferState?.latestOut || getDefaultTransferTimeValue(),
        onSave: (transferTime) => {
          fetch('/api/transfer-out', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              assignment_date: date,
              full_name: deputyName,
              transfer_time: transferTime,
              transfer_index: transferState?.openTransferIndex || null,
              from_post: (cell.dataset.room || '').trim()
            })
          })
          .then(r => r.json())
          .then(payload => {
            if (payload?.status !== 'success') return;
            rememberTransferredChip(cell, deputyName);
            forgetTransferredInChip(cell, deputyName);
            chip.dataset.transferredOut = 'true';
            chip.dataset.transferOutTime = payload.out_time || transferTime;
            chip.dataset.transferInTime = '';
            chip.classList.add('transferred-out');
            return fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
          })
          .finally(() => closePop());
        }
      });
    });

    setTimeout(() => {
      const onDocClick = (evt) => {
        if (!evt.target.closest('.assignment-action-popover') && !evt.target.closest('.assignment-chip')) {
          document.removeEventListener('click', onDocClick);
          closePop();
        }
      };
      document.addEventListener('click', onDocClick);
    }, 0);
  });

  return chip;
}



function clearExistingAssignmentForName(name, excludeCell) {
    document.querySelectorAll('.editable').forEach(cell => {
        if (cell === excludeCell) return;

        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));
        let removed = false;
        chips.forEach(chip => {

            if (chipName === name) {

                forgetTransferredChip(cell, chipName);
                chip.remove();
                removed = true;

        }
    });

function getDeputyAutocompleteMatches(query) {
    const normalizedQuery = (query || '').trim().toLowerCase();
    if (normalizedQuery.length < 4) return [];

    const assignedNames = getAssignedNamesAcrossGrid();

    return allDeputies
        .filter(dep => {
            const fullName = (dep.full_name || '').toLowerCase();
            const isAssignedElsewhere = assignedNames.has((dep.full_name || '').trim());
            if (!fullName.includes(normalizedQuery)) return false;
            if (!isDeputyAvailable(dep)) return false;
            if (isAssignedElsewhere && !canReassignPosted) return false;
            return true;
        })
        .sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''))
        .slice(0, 8);
}

function canAssignDeputyName(name) {
    const normalizedName = normalizeDeputyName(name);
    if (!normalizedName) return false;

    const deputy = rawDeputies.find(dep => normalizeDeputyName(dep.full_name) === normalizedName);
    if (!deputy || !isDeputyAvailable(deputy)) return false;

    const assignedNames = getAssignedNamesAcrossGrid();
    if (assignedNames.has((deputy.full_name || '').trim()) && !canReassignPosted) return false;
    return true;
}

function createAssignmentTypeahead(cell) {
    const wrapper = document.createElement('div');
    wrapper.className = 'assignment-typeahead';
    wrapper.style.position = 'relative';
    wrapper.style.marginTop = '6px';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'assignment-typeahead-input';
    input.placeholder = '';
    input.autocomplete = 'off';
    input.style.width = '100%';

    const dropdown = document.createElement('div');
    dropdown.className = 'assignment-typeahead-dropdown';
    dropdown.style.position = 'absolute';
    dropdown.style.top = '100%';
    dropdown.style.left = '0';
    dropdown.style.right = '0';
    dropdown.style.background = 'white';
    dropdown.style.border = '1px solid #D0D5DD';
    dropdown.style.borderRadius = '6px';
    dropdown.style.boxShadow = '0 8px 16px rgba(16,24,40,.12)';
    dropdown.style.maxHeight = '200px';
    dropdown.style.overflowY = 'auto';
    dropdown.style.zIndex = '30';
    dropdown.style.display = 'none';

    const hideDropdown = () => {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
    };

    const applySelection = (dep) => {
        if (!dep) return;
        const name = (dep.full_name || '').trim();
        const role = getDeputyRole(dep || {});
        if (!name) return;
        applyDeputyToCell(cell, name, role);
        input.value = '';
        hideDropdown();
    };

    const renderMatches = () => {
        const query = input.value || '';
        const matches = getDeputyAutocompleteMatches(query);

        dropdown.innerHTML = '';
        if (matches.length === 0) {
            hideDropdown();
            return;
        }

        matches.forEach(dep => {
            const option = document.createElement('button');
            option.type = 'button';
            option.className = 'assignment-typeahead-option';
            option.style.display = 'block';
            option.style.width = '100%';
            option.style.textAlign = 'left';
            option.style.border = '0';
            option.style.background = 'transparent';
            option.style.padding = '8px 10px';
            option.style.cursor = 'pointer';
            option.textContent = `${dep.full_name || ''} (${getDeputyCapacityTag(dep || {}) || getDeputyRole(dep || {}) || ''})`;
            option.addEventListener('mousedown', (evt) => {
                evt.preventDefault();
                applySelection(dep);
            });
            dropdown.appendChild(option);
        });

        dropdown.style.display = 'block';
    };

    input.addEventListener('input', renderMatches);
    input.addEventListener('focus', renderMatches);
    input.addEventListener('keydown', (evt) => {
        if (evt.key !== 'Enter') return;
        const query = input.value || '';
        const matches = getDeputyAutocompleteMatches(query);
        if (matches.length === 0) return;
        evt.preventDefault();
        applySelection(matches[0]);
    });
    input.addEventListener('blur', () => {
        setTimeout(hideDropdown, 120);
    });

    wrapper.appendChild(input);
    wrapper.appendChild(dropdown);
    return wrapper;
}

function ensureCellStructure(cell) {
    let list = cell.querySelector('.assignment-list');

function initAssignmentDropzones() {
    document.querySelectorAll('.editable').forEach(cell => {

        // Use raw DB value stored in data-assigned
        const rawAssigned = cell.dataset.assigned || '';

        // Clear existing HTML
        cell.innerHTML = '';

        // Rebuild structured container
        const list = ensureCellStructure(cell);

        // Recreate chips from raw DB string
        if (rawAssigned) {
            parseAssignedMemberValue(rawAssigned).forEach(name => {
                const deputy = getDeputyRecordByName(name);
                const role = getDeputyRole(deputy || {});
                list.appendChild(buildAssignmentChip(name, role, cell));
            });
        }

        // Initialize drag/drop
        Sortable.create(cell, {
            group: {
                name: 'assignmentRoster',
                pull: () => 'clone',
                put: (to, from) =>
                    from.el.classList.contains('draggable-roster-list')
                    || from.el.classList.contains('editable')
            },
            animation: 100,
            sort: false,
            onAdd: (evt) => {
                const dropCell = evt.to;
                const item = evt.item;
                const fromCell = evt.from?.classList?.contains('editable') ? evt.from : null;

                const role = (item.dataset.role || '').trim().toUpperCase();
                const assignedName =
                    (item.dataset.name || item.textContent || '').trim();

                item.remove();

                if (!fromCell) {
                    applyDeputyToCell(dropCell, assignedName, role);
                    return;
                }

                const sourceChip = Array.from(fromCell.querySelectorAll('.assignment-chip')).find(chip =>
                    getChipDeputyName(chip) === assignedName
                );
                if (!sourceChip) {
                    applyDeputyToCell(dropCell, assignedName, role, { allowUnavailable: true });
                    return;
                }

                const transferState = transferMap[(assignedName || '').trim()] || {};
                const transferCount = transferState?.history?.length || 0;
                if (transferCount >= 3 && !transferState?.openTransferIndex) {
                    return;
                }

                openTransferTimePicker({
                    title: `Transfer: ${assignedName}`,
                    defaultTime: transferState?.latestOut || getDefaultTransferTimeValue(),
                    onSave: (transferTime) => {
                        fetch('/api/transfer-out', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                assignment_date: fromCell.dataset.date,
                                full_name: assignedName,
                                transfer_time: transferTime,
                                transfer_index: transferState?.openTransferIndex || null,
                                from_post: (fromCell.dataset.room || '').trim()
                            })
                        })
                        .then(r => r.json())
                        .then(payload => {
                            if (payload?.status !== 'success') return;

                            rememberTransferredChip(fromCell, assignedName);
                            forgetTransferredInChip(fromCell, assignedName);
                            sourceChip.dataset.transferredOut = 'true';
                            sourceChip.dataset.transferOutTime = payload.out_time || transferTime;
                            sourceChip.dataset.transferInTime = '';
                            sourceChip.classList.add('transferred-out');

                            applyDeputyToCell(dropCell, assignedName, role, {
                                transferInTime: payload.out_time || transferTime,
                                transferIndex: payload.transfer_index,
                                preserveExistingAssignments: true,
                                allowUnavailable: true
                            });

                            return fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
                        })
                        .catch(() => {});
                    }
                });
            }
        });
    });
}
