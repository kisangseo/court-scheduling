function formatJudgeDisplayName(judgeName) {
    const raw = (judgeName || "").trim();
    if (!raw) return "";

    const commaMatch = raw.match(/^([^,]+),\s*(.+)$/);
    if (commaMatch) {
        const last = commaMatch[1].trim();
        const firstToken = commaMatch[2].trim().split(/\s+/)[0] || "";
        const initial = firstToken.replace(/[^A-Za-z]/g, "").charAt(0);
        return initial ? `${last}, ${initial}.` : last;
    }

    const parts = raw.split(/\s+/);
    if (parts.length >= 2) {
        const firstToken = parts[0];
        const last = parts.slice(1).join(" ");
        const initial = firstToken.replace(/[^A-Za-z]/g, "").charAt(0);
        if (initial && last) {
            return `${last}, ${initial}.`;
        }
    }

    return raw;
}

function orderCourtroomRows(courthouse, rows) {
    const rowsToRender = [...rows].sort((a, b) => {
        const roomCompare = (a.location_detail || "").localeCompare(b.location_detail || "");
        if (roomCompare !== 0) return roomCompare;
        return (a.part || "").localeCompare(b.part || "");
    });

    const roomOrder = getCourtroomRoomOrder(courthouse);
    if (!roomOrder.length) return rowsToRender;

    const rowsByRoom = new Map();
    rowsToRender.forEach(row => {
        const key = row.location_detail || "";
        if (!rowsByRoom.has(key)) rowsByRoom.set(key, []);
        rowsByRoom.get(key).push(row);
    });

    const defaults = getCourtroomDefaults(courthouse);
    const orderedRows = [];
    roomOrder.forEach(room => {
        const matches = rowsByRoom.get(room) || [];
        if (matches.length) {
            orderedRows.push(...matches);
        } else {
            const defaultRoomMeta = defaults[room] || null;
            orderedRows.push(defaultRoomMeta
                ? { location_detail: room, part: defaultRoomMeta.part, judge_name: defaultRoomMeta.judge_name }
                : { location_detail: room }
            );
        }
        rowsByRoom.delete(room);
    });

    rowsByRoom.forEach(matches => orderedRows.push(...matches));
    return orderedRows;
}

                if (hasRetiredOrderA && hasRetiredOrderB) {

                el.dataset.part = nextPart;

            tr.querySelectorAll('.courtroom-unscheduled-checkbox').forEach(checkbox => {

                const rawValue = (roomPartInput.value || '').trim();

                if (rawValue.includes('/')) {

                updateCourtroomRowIdentifiers(nextRoom, nextPart);

                    courthouse,
                    previousRoom,
                    previousPart,
                    nextRoom,

                });

            });
        }

        tr.querySelectorAll('.courtroom-time-input').forEach(inputEl => {

    return table;
}

let transferMap = {}; // { "Name": { history: [{out, in}], latestOut, latestIn, latestCompletedOut, latestCompletedIn, openTransferIndex } }
let transferredOutChipKeys = new Set();
let transferredInChipMeta = new Map();


function getTransferredChipStorageKey(dateValue) {
  return `transferredOutChipKeys:${(dateValue || '').trim()}`;
}

function loadTransferredChipKeysForDate(dateValue) {
  const date = (dateValue || '').trim();
  transferredOutChipKeys = new Set();
  if (!date) return;
  try {
    const raw = localStorage.getItem(getTransferredChipStorageKey(date));
    const parsed = raw ? JSON.parse(raw) : [];
    if (Array.isArray(parsed)) {
      transferredOutChipKeys = new Set(parsed.filter(Boolean));
    }
  } catch (_) {
    transferredOutChipKeys = new Set();
  }
}

function persistTransferredChipKeysForDate(dateValue) {
  const date = (dateValue || document.getElementById('date')?.value || '').trim();
  if (!date) return;
  try {
    localStorage.setItem(getTransferredChipStorageKey(date), JSON.stringify(Array.from(transferredOutChipKeys)));
  } catch (_) {
    // ignore storage errors
  }
}

function isCurrentlyTransferredOut(name) {
  const t = transferMap[(name || '').trim()];
  return !!(t && t.openTransferIndex);
}

function isChipMarkedTransferredOut(chip) {
  return (chip?.dataset?.transferredOut || '').trim() === 'true';
}

function isChipUnavailableForDualAssignment(chip, explicitName) {
  const name = (explicitName || chip?.dataset?.name || chip?.textContent || '').trim();
  return isChipMarkedTransferredOut(chip) || isCurrentlyTransferredOut(name);
}

function getTransferredChipKey(cell, name) {
  if (!cell) return '';
  return [
    (cell.dataset.date || '').trim(),
    (cell.dataset.courthouse || '').trim(),
    (cell.dataset.type || '').trim(),
    (cell.dataset.room || '').trim(),
    (cell.dataset.part || '').trim(),
    (name || '').trim().toLowerCase()
  ].join('|');
}

function rememberTransferredChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  if (key) {
    transferredOutChipKeys.add(key);
    persistTransferredChipKeysForDate(cell?.dataset?.date || document.getElementById('date')?.value || '');
  }
}

function forgetTransferredChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  if (key) {
    transferredOutChipKeys.delete(key);
    persistTransferredChipKeysForDate(cell?.dataset?.date || document.getElementById('date')?.value || '');
  }
}

function rememberTransferredInChip(cell, name, inTime) {
  const key = getTransferredChipKey(cell, name);
  if (!key) return;
  transferredInChipMeta.set(key, inTime || '');
}

function forgetTransferredInChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  if (!key) return;
  transferredInChipMeta.delete(key);
}

function clearTransferVisualStateForDeputy(name) {
  const deputyName = (name || '').trim();
  if (!deputyName) return;

  document.querySelectorAll('.assignment-chip').forEach(chip => {
    const chipName = (chip.dataset.name || chip.textContent || '').trim();
    if (chipName !== deputyName) return;

    const owningCell = chip.closest('.editable');
    forgetTransferredChip(owningCell, chipName);
    forgetTransferredInChip(owningCell, chipName);
    chip.dataset.transferredOut = 'false';
    chip.dataset.transferOutTime = '';
    chip.dataset.transferInTime = '';
    chip.classList.remove('transferred-out');
  });
}

function getTransferredInTimeForChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  return key ? (transferredInChipMeta.get(key) || '') : '';
}

function fetchTransfersForDate() {
  const date = document.getElementById("date")?.value;
  if (!date) { transferMap = {}; transferredOutChipKeys = new Set(); return Promise.resolve(); }

  return fetch(`/api/transfers?date=${date}`)
    .then(r => r.json())
    .then(rows => {
      transferMap = {};
      (rows || []).forEach(row => {
        const name = (row.full_name || '').trim();
        if (!name) return;
        const history = Array.isArray(row.history)
          ? row.history.map(entry => ({
              from: (entry?.from || '').trim() || null,
              to: (entry?.to || '').trim() || null,
              out: entry?.out || null,
              in: entry?.in || null
            }))
          : [];
        let openTransferIndex = null;
        for (let i = history.length - 1; i >= 0; i--) {
          if (history[i]?.out && !history[i]?.in) {
            openTransferIndex = i + 1;
            break;
          }
        }
        const latestOut = history.length > 0 ? (history[history.length - 1]?.out || null) : null;
        let latestIn = null;
        for (let i = history.length - 1; i >= 0; i--) {
          if (history[i]?.in) {
            latestIn = history[i].in;
            break;
          }
        }
        let latestCompletedOut = null;
        let latestCompletedIn = null;
        for (let i = history.length - 1; i >= 0; i--) {
          const out = history[i]?.out || null;
          const inn = history[i]?.in || null;
          if (out && inn) {
            latestCompletedOut = out;
            latestCompletedIn = inn;
            break;
          }
        }
        transferMap[name] = { history, latestOut, latestIn, latestCompletedOut, latestCompletedIn, openTransferIndex };
      });
    })
    .catch(() => { transferMap = {}; });
}

function applyTransferCaptionToRosterAndGrid() {
    const formatRosterOut = (name) => {
    const t = transferMap[(name || '').trim()];
    if (!t) return "";
    const latestOut = t.latestCompletedOut || t.latestOut || '';
    const latestIn = t.latestCompletedIn || t.latestIn || '';
    if (latestOut && latestIn) return `out: ${latestOut}, in: ${latestIn}`;
    if (latestOut) return `out: ${latestOut}`;
    if (latestIn) return `in: ${latestIn}`;
    return "";
  };

  // add caption under roster names
  document.querySelectorAll('#rosterList .roster-item').forEach(item => {
    const name = (item.dataset.name || '').trim();
    const text = formatRosterOut(name);

    let cap = item.querySelector('.transfer-caption');
    if (!text) { if (cap) cap.remove(); return; }

    if (!cap) {
      cap = document.createElement('div');
      cap.className = 'transfer-caption';
      cap.style.color = '#667085';
      cap.style.fontSize = '11px';
      cap.style.marginTop = '2px';
      item.appendChild(cap);
    }
    cap.textContent = text;
  });

  const getLatestTransferTimesForPost = (name, postName) => {
    const t = transferMap[(name || '').trim()];
    const normalizedPost = (postName || '').trim();
    if (!t || !normalizedPost || !Array.isArray(t.history)) return { out: '', in: '' };
    let latestOut = '';
    let latestIn = '';
    t.history.forEach(entry => {
      if (!entry || typeof entry !== 'object') return;
      if ((entry.from || '').trim() === normalizedPost && entry.out) {
        latestOut = entry.out;
      }
      if ((entry.to || '').trim() === normalizedPost && entry.in) {
        latestIn = entry.in;
      }
    });
    return { out: latestOut, in: latestIn };
  };

  // add caption next to chips in grid
  document.querySelectorAll('.assignment-chip').forEach(chip => {
    const name = (chip.dataset.name || chip.textContent || '').trim();
    const owningCell = chip.closest('.editable');
    const postName = (owningCell?.dataset?.room || '').trim();
    const isTransferredOut = isChipMarkedTransferredOut(chip) || isCurrentlyTransferredOut(name);
    const perPostTimes = getLatestTransferTimesForPost(name, postName);
    const outTime = perPostTimes.out || chip.dataset.transferOutTime || '';
    const inTime = perPostTimes.in
      || chip.dataset.transferInTime
      || getTransferredInTimeForChip(owningCell, name)
      || '';
    const text = (outTime && inTime)
      ? `out: ${outTime}, in: ${inTime}`
      : (outTime ? `out: ${outTime}` : (inTime ? `in: ${inTime}` : ''));

    chip.classList.toggle('transferred-out', isTransferredOut);

    let cap = chip.querySelector('.transfer-caption');
    if (!text) { if (cap) cap.remove(); return; }

    if (!cap) {
      cap = document.createElement('span');
      cap.className = 'transfer-caption';
      cap.style.color = '#667085';
      cap.style.fontSize = '11px';
      cap.style.marginLeft = '6px';
      chip.appendChild(cap);
    }
    cap.textContent = `(${text})`;
  });

  persistTransferredChipKeysForDate(document.getElementById('date')?.value || '');
  refreshRosterAssignedState();
}

function loadCourtroomMeta(date) {
    if (!date) return;
    fetch(`/api/get-courtroom-meta?date=${date}`)
        .then(res => res.json())
        .then(rows => {
            rows.forEach(meta => {
                const selector = `.courtroom-meta-row[data-date="${meta.assignment_date}"][data-courthouse="${meta.courthouse}"][data-room="${meta.location_detail}"][data-part="${meta.part || ''}"]`;
                const row = document.querySelector(selector);
                if (!row) return;

                const pendingKey = [meta.assignment_date, meta.courthouse, meta.location_detail, meta.part || ''].join('|');
                const pendingMeta = pendingCourtroomMeta[pendingKey] || null;

                const startInput = row.querySelector('.courtroom-time-input[data-field="start_time"]');
                const breakInput = row.querySelector('.courtroom-time-input[data-field="break_time"]');
                const restartInput = row.querySelector('.courtroom-time-input[data-field="restart_time"]');
                const adjournedInput = row.querySelector('.courtroom-time-input[data-field="adjourned_time"]');
                const downInput = row.querySelector('.courtroom-down-checkbox');
                const highProfileInput = row.querySelector('.courtroom-high-profile-checkbox');
                const unscheduledInput = row.querySelector('.courtroom-unscheduled-checkbox');

                if (startInput) startInput.value = parseStoredTimeToInputValue((pendingMeta && pendingMeta.start_time) || meta.start_time || '');
                if (breakInput) breakInput.value = parseStoredTimeToInputValue((pendingMeta && pendingMeta.break_time) || meta.break_time || '');
                if (restartInput) restartInput.value = parseStoredTimeToInputValue((pendingMeta && pendingMeta.restart_time) || meta.restart_time || '');
                if (adjournedInput) adjournedInput.value = parseStoredTimeToInputValue((pendingMeta && pendingMeta.adjourned_time) || meta.adjourned_time || '');
                if (downInput) downInput.checked = pendingMeta ? !!pendingMeta.is_down : !!meta.is_down;
                if (highProfileInput) highProfileInput.checked = pendingMeta ? !!pendingMeta.is_high_profile : !!meta.is_high_profile;
                if (unscheduledInput) unscheduledInput.checked = pendingMeta ? !!pendingMeta.is_unscheduled : !!meta.is_unscheduled;
                updateUnscheduledAuditCaption(row, {
                    unscheduled_changed_by: (pendingMeta && pendingMeta.unscheduled_changed_by) || meta.unscheduled_changed_by || '',
                    unscheduled_changed_at: (pendingMeta && pendingMeta.unscheduled_changed_at) || meta.unscheduled_changed_at || ''
                });
            });
        });
}

function buildSimpleViewUrl(pathname) {
    const params = new URLSearchParams();
    const date = document.getElementById("date")?.value || "";
    const courthouse = document.getElementById("courthouse")?.value || "";

    if (date) params.set("date", date);
    if (courthouse) params.set("courthouse", courthouse);

    const query = params.toString();
    return query ? `${pathname}?${query}` : pathname;
}

function openExecutiveSummary() {
    const date = document.getElementById("date")?.value || "";
    const params = new URLSearchParams();
    if (date) params.set("date", date);
    const query = params.toString();
    const url = query ? `/executive-summary?${query}` : '/executive-summary';
    window.open(url, '_blank');
}


function clearSectionAssignments(sectionType, courthouse = "") {
    const date = document.getElementById("date")?.value || "";
    if (!date) {
        alert("Please choose a date before clearing assignments.");
        return;
    }

    const sectionLabel = sectionType === "fixed_post"
        ? `${courthouse} security posts`
        : courthouse
            ? `${courthouse} courtrooms`
            : "courtrooms";

    const shouldClear = confirm(`Clear assignments for ${sectionLabel} only?`);
    if (!shouldClear) {
        return;
    }

    fetch("/api/clear-section-assignments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            assignment_date: date,
            section_type: sectionType,
            courthouse
        })
    })
        .then(async response => {
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(payload.message || "Unable to clear section assignments.");
            }
            return payload;
        })
        .then(() => {
            pendingAssignments = {};
            pendingNotes = {};
            pendingJudges = {};
            pendingCourtroomMeta = {};
            pendingCourtroomLocationMoves = {};
            pendingShiftTimes = {};
            updateSaveStatusBadge();
            search();
            loadRoster();
        })
        .catch(err => {
            alert(err.message || "Unable to clear section assignments.");
        });
}

function showShiftTimeEditorModal({ title, currentStart, currentEnd, optionsHtmlBuilder, endLabel = 'End', onSave }) {
    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.inset = '0';
    overlay.style.background = 'rgba(0,0,0,0.3)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = '10000';

    const modal = document.createElement('div');
    modal.style.background = '#fff';
    modal.style.padding = '12px';
    modal.style.borderRadius = '8px';
    modal.style.minWidth = '260px';
    modal.style.boxShadow = '0 8px 30px rgba(0,0,0,0.25)';

    const heading = document.createElement('div');
    heading.textContent = title || 'Edit Shift';
    heading.style.fontWeight = '600';
    heading.style.marginBottom = '8px';

    const startSelect = document.createElement('select');
    startSelect.style.width = '100%';
    startSelect.style.marginBottom = '8px';
    startSelect.innerHTML = `<option value="">Start</option>${optionsHtmlBuilder(currentStart || '')}`;

    const endSelect = document.createElement('select');
    endSelect.style.width = '100%';
    endSelect.style.marginBottom = '10px';
    endSelect.innerHTML = `<option value="">${endLabel}</option>${optionsHtmlBuilder(currentEnd || '')}`;

    const buttonRow = document.createElement('div');
    buttonRow.style.display = 'flex';
    buttonRow.style.justifyContent = 'flex-end';
    buttonRow.style.gap = '8px';

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.textContent = 'Cancel';
    const saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.textContent = 'Save';

    buttonRow.appendChild(cancelBtn);
    buttonRow.appendChild(saveBtn);

    modal.appendChild(heading);
    modal.appendChild(startSelect);
    modal.appendChild(endSelect);
    modal.appendChild(buttonRow);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    const close = () => {
        if (overlay.parentElement) overlay.parentElement.removeChild(overlay);
    };

    cancelBtn.addEventListener('click', close);
    overlay.addEventListener('click', evt => {
        if (evt.target === overlay) close();
    });

    saveBtn.addEventListener('click', () => {
        onSave(startSelect.value, endSelect.value);
        close();
    });

    startSelect.focus();
}

    document.getElementById("date").addEventListener("change", function() {

    });

    search();
};

               queueOvertimeShiftUpdate({

            title: `${shiftCell.dataset.room || 'Overtime'} Shift`,
            currentStart: shiftCell.dataset.startTime || '',

                if (!start || !end || !display) return;

                shiftCell.dataset.startTime = start;
                shiftCell.dataset.endTime = end;
                shiftCell.dataset.shift = display;

                    memberCell.dataset.shift = display;

                    location_detail: shiftCell.dataset.room,

    cell.appendChild(input);
    input.focus();

    input.addEventListener("blur", function() {

        const payload = {
            assignment_date: cell.dataset.date,
            courthouse: cell.dataset.courthouse,
            assignment_type: cell.dataset.type,
            location_detail: cell.dataset.room,
            part: cell.dataset.part,

        };

        const key = [
            payload.assignment_date,

document.getElementById("saveAssignments").addEventListener("click", function() {

    const changedCourtroomMeta = Array.from(changedRows)
        .map(key => pendingCourtroomMeta[key])
        .filter(payload => payload && payload.assignment_date && payload.courthouse && payload.location_detail);

    const saveStatus = document.getElementById("saveStatus");
    if (saveStatus) {
        saveStatus.className = "counts-inline";
        saveStatus.textContent = "Saving...";
    }

    const createPostTask = (url, payload, failureMessage) => () => {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);

        return fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            signal: controller.signal
        }).then(res => {
            if (!res.ok) throw new Error(failureMessage);
            return res.json();
        }).catch(err => {
            if (err.name === 'AbortError') {
                throw new Error(`${failureMessage} (request timed out)`);
            }
            throw err;
        }).finally(() => {
            clearTimeout(timeoutId);
        });
    };

    const runTasksSequentially = (tasks) =>
        tasks.reduce((promiseChain, task) => promiseChain.then(() => task()), Promise.resolve());

    const runTasksInParallel = (tasks) => Promise.all(tasks.map(task => task()));

    const courtroomLocationTasks = Object.values(pendingCourtroomLocationMoves)
        .map(payload => createPostTask("/api/update-courtroom-location", payload, "Failed to save courtroom room/part"));

    const assignmentTasks = Object.values(pendingAssignments)
        .map(payload => createPostTask("/api/update-deputy", payload, "Failed to save deputy assignment"));

    const notesTasks = Object.values(pendingNotes)
        .map(payload => createPostTask("/api/update-assignment-notes", payload, "Failed to save assignment note"));

    const judgeTasks = Object.values(pendingJudges)
        .map(payload => createPostTask("/api/update-judge-name", payload, "Failed to save judge name"));

    const courtroomMetaTasks = changedCourtroomMeta
        .map(payload => createPostTask("/api/update-courtroom-meta", payload, "Failed to save courtroom meta"));

    const shiftTimeTasks = Object.values(pendingShiftTimes)
        .filter(payload => payload.assignment_date && payload.courthouse && (payload.location_detail || payload.location_group))
        .map(payload => createPostTask("/api/update-shift-time", payload, "Failed to save overtime shift"));

    runTasksSequentially(courtroomLocationTasks)
        .then(() => runTasksInParallel([...assignmentTasks, ...notesTasks, ...judgeTasks, ...courtroomMetaTasks]))
        .then(() => runTasksSequentially(shiftTimeTasks))
        .then(() => {
            pendingAssignments = {};
            pendingNotes = {};
            pendingJudges = {};
            pendingCourtroomMeta = {};
            pendingCourtroomLocationMoves = {};
            pendingShiftTimes = {};
            changedRows.clear();
            if (saveStatus) {
                saveStatus.className = "counts-inline metric-green";
                saveStatus.textContent = "Saved";
            }
            search();
            loadRoster();
        })
        .catch(err => {
            console.error("Save failed:", err);
            if (saveStatus) {
                saveStatus.className = "counts-inline metric-red";
                saveStatus.textContent = "Save failed";
            }
            alert("Save failed. Please try again.");
        });
});
