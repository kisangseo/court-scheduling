<!DOCTYPE html>
<html>
<head>
    <title>Court Assignment Search</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>
<body>

<div class="top-controls">
    <div class="top-nav-controls">
        <button type="button" onclick="window.location.href='/'">Search Page</button>
        <button type="button" onclick="openRoster()">Roster Page</button>
        <button type="button" onclick="window.open('/staffing', '_blank')">Staff Resources Daily Page</button>
        <button type="button" onclick="openExecutiveSummary()">Executive Summary Page</button>

    <div class="assignment-header-box">
        <h2>Court Assignments <span id="overallAssignmentCounts" class="counts-inline"></span> <label class="simple-view-toggle"><input type="checkbox" id="simpleViewToggle"> Simple View</label></h2>
    </div>

    <div class="assignment-action-controls">
        <input type="date" id="date">

        <select id="courthouse">
            <option value="">All Courthouses</option>

            <option value="Cummings">Cummings</option>
            <option value="Juvenile">Juvenile</option>

        </select>

        <button id="importPreviousWeekdayBtn" type="button">Import</button>

</div>

<br><br>

<div id="assignmentRosterLayout">
    <div id="assignmentsPanel">
        <div id="resultsGrid">
            <div id="postsRow" class="section-row"></div>
            <div id="courtroomsRow" class="section-row-single"></div>
            <div id="overtimeRow" class="section-row"></div>
            <div id="juvRow" class="section-row"></div>
            <div id="juvBottomRow" class="section-row"></div>
        </div>
    </div>
    <div id="rosterPanel">
        <h3>Court Security Roster</h3>
        <label>
            <input type="checkbox" id="showFullRoster">
            Show Full Roster
        </label>
        <div id="rosterList"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
let pendingAssignments = {};
let pendingNotes = {};
let pendingJudges = {};
let pendingCourtroomMeta = {};
let pendingShiftTimes = {};
let allDeputies = [];
let rawDeputies = [];
let selectedDeputy = null;
let globalAssignmentTotals = { vacant: 0, filled: 0, open: 0 };
let globalPostedNames = new Set();
let hidePosted = false;

const COURTROOM_ASSIGNMENT_OPTIONS = [
    "Firearm", "DNS", "Open", "Carjacking", "PT46/47", "Robbery", "ATT MUR", "CDS",
    "Child Abuse", "Murder", "Manslaughter", "F/T", "Civil", "Motions", "NON-HEARING MOTIONS", "MIS", "Juvenile",
    "Assault", "FIP", "PWID", "Criminal", "Family", "FDTX"
];

function escapeHtml(value) {
    return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function getCourtroomAssignmentOptionsHtml(selectedValue) {
    const currentValue = (selectedValue || '').trim();
    const values = COURTROOM_ASSIGNMENT_OPTIONS.slice();
    if (currentValue && !values.includes(currentValue)) {
        values.unshift(currentValue);
    }

    return values.map(value => {
        const selectedAttr = value === currentValue ? ' selected' : '';
        return `<option value="${escapeHtml(value)}"${selectedAttr}>${escapeHtml(value)}</option>`;
    }).join('');
}

function queueAssignmentNoteUpdate(payload) {
    const key = [
        payload.assignment_date,
        payload.courthouse,
        payload.assignment_type,
        payload.location_detail,
        payload.part
    ].join("|");

    pendingNotes[key] = payload;
    updateSaveStatusBadge();
}

function buildHidePostedToggle() {
    const label = document.createElement("label");
    label.className = "hide-posted-toggle";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "hide-posted-checkbox";
    checkbox.checked = hidePosted;

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(" Hide Posted"));
    return label;
}

function getPostedCacheKey(date) {
    return `postedNames:${date || ''}`;
}

function getTotalsCacheKey(date) {
    return `assignmentTotals:${date || ''}`;
}

function loadCachedDateState(date) {
    try {
        const postedRaw = localStorage.getItem(getPostedCacheKey(date));
        const totalsRaw = localStorage.getItem(getTotalsCacheKey(date));

        if (postedRaw) {
            globalPostedNames = new Set(JSON.parse(postedRaw));
        }

        if (totalsRaw) {
            const parsedTotals = JSON.parse(totalsRaw);
            globalAssignmentTotals = {
                vacant: parsedTotals.vacant || 0,
                filled: parsedTotals.filled || 0,
                open: parsedTotals.open || 0
            };
        }
    } catch (_) {
        globalPostedNames = new Set();
    }
}

function cacheDateState(date, postedSet, totals) {
    try {
        localStorage.setItem(getPostedCacheKey(date), JSON.stringify(Array.from(postedSet)));
        localStorage.setItem(getTotalsCacheKey(date), JSON.stringify(totals));
    } catch (_) {
        // ignore storage failures
    }
}

function isCourtSecurityDeputy(deputy) {
    const division = (deputy.division || "").trim().toLowerCase();
   

    return division === "court security"

}

function getDeputyRole(deputy) {
    return (deputy.role || deputy.capacity_tag || "").trim().toUpperCase();
}

function getDeputyCapacityTag(deputy) {
    return (deputy.capacity_tag || "").trim();
}

function normalizeRoleValue(role) {
    return (role || "").toUpperCase().replace(/\s+/g, "").replace(/_/g, "-");
}

function getCanonicalRole(role) {
    const rawRole = (role || '').trim();
    const normalizedRole = normalizeRoleValue(rawRole);
    if (normalizedRole === 'DEP' || normalizedRole === 'F' || normalizedRole === 'COURT') return 'DEPUTY';
    if (normalizedRole === 'SPO' || normalizedRole === 'ARMED' || normalizedRole === 'DEP-K9' || normalizedRole === 'DEPK9' || normalizedRole === 'K9') return 'CSO/SPO-A: (FT)';
    if (normalizedRole === 'SPO-UA' || normalizedRole === 'SPOUA' || normalizedRole === 'NOSPO' || normalizedRole === 'NO-SPO' || normalizedRole === 'CSO' || normalizedRole === 'BASIC') return 'CSO: Non-SPO/CR';
    if (normalizedRole === 'CADET') return 'Cadet';
    return rawRole || normalizedRole;
}

function getCourtSecuritySortRank(deputy) {
    const role = getCanonicalRole(getDeputyRole(deputy));
    if (role === 'DEPUTY') return 0;
    if (role === 'CSO/SPO-A: Court Trained (FT)') return 1;
    if (role === 'CSO/SPO-A: Court Trained (contractor)') return 2;
    if (role === 'CSO/SPO-A: (FT)') return 3;
    if (role === 'CSO/SPO-A: (contractor)') return 4;
    if (role === 'CSO/SPO: Court Trained(FT)') return 5;
    if (role === 'CSO/SPO Court Trained (contractor)') return 6;
    if (role === 'CSO: Non-SPO/CR') return 7;
    if (role === 'Cadet') return 8;
    return 6;
}

function createRosterItem(deputy, options = {}) {
    const deputyRow = document.createElement("div");
    deputyRow.className = "roster-item";
    deputyRow.dataset.name = deputy.full_name || "";
    deputyRow.dataset.role = getDeputyRole(deputy);

    const showDivision = options.showDivision === true;
    const division = (deputy.division || "Unassigned Division").trim() || "Unassigned Division";
    const capacityTag = getDeputyCapacityTag(deputy);

    const displayCapacityTag = getCanonicalRole(capacityTag);

    deputyRow.textContent = showDivision
        ? `${deputy.full_name}${displayCapacityTag ? ` (${displayCapacityTag})` : ""} - ${division}`
        : `${deputy.full_name}${displayCapacityTag ? ` (${displayCapacityTag})` : ""}`;

    return deputyRow;
}

function getAssignedNamesFromCell(cell) {
    return Array.from(cell.querySelectorAll('.assignment-chip'))
        .map(chip => (chip.dataset.name || chip.textContent || '').trim())
        .filter(Boolean);
}

function getAssignedChipsFromCell(cell) {
    return Array.from(cell.querySelectorAll('.assignment-chip'));
}

function parseAssignedMemberValue(value) {
    const text = (value || '').trim();
    if (!text) return [];

    if (text.includes('||')) {
        return text.split(/\s*\|\|\s*/).map(name => name.trim()).filter(Boolean);
    }

    if (text.includes('\n')) {
        return text.split(/\n+/).map(name => name.trim()).filter(Boolean);
    }

    return [text];
}

function normalizeDeputyName(value) {
    return (value || '').trim().toLowerCase();
}

function getDeputyRecordByName(name) {
    const target = normalizeDeputyName(name);
    if (!target) return null;

    return rawDeputies.find(dep => normalizeDeputyName(dep.full_name) === target) || null;
}

function formatBorrowedCourthouse(courthouse) {
    const normalized = (courthouse || '').trim().toLowerCase();
    if (normalized === 'juvenile') return 'Juv';
    if (normalized === 'mitchell') return 'Mitchell';
    if (normalized === 'cummings') return 'Cummings';
    return courthouse || '';
}

function formatRoomPartTime(cell) {
    const room = (cell.dataset.room || '').trim();
    const part = (cell.dataset.part || '').trim();
    const shift = (cell.dataset.shift || '').trim();

    if (cell.dataset.type === 'Overtime') {
        return `${room || '-'} / ${shift || 'Time TBD'}`;
    }

    const roomPart = [room, part].filter(Boolean).join('/');
    return `${roomPart || '-'} / Time TBD`;
}

function renderBorrowedDeputiesTable() {
    const tbody = document.getElementById('csoDetailBody');
    if (!tbody) return;

    const borrowedRows = [];

    document.querySelectorAll('.editable').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));
        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                const deputy = getDeputyRecordByName(name);
                if (!deputy || isCourtSecurityDeputy(deputy)) return;

                borrowedRows.push({
                    deputyName: name,
                    division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                    courthouse: formatBorrowedCourthouse(cell.dataset.courthouse),
                    roomPartTime: formatRoomPartTime(cell)
                });
            });
            return;
        }

        const assignedNames = getAssignedNamesFromCell(cell);
        if (assignedNames.length === 0) return;

        assignedNames.forEach(name => {
            if (isCurrentlyTransferredOut(name)) return;
            const deputy = getDeputyRecordByName(name);
            if (!deputy || isCourtSecurityDeputy(deputy)) return;

            borrowedRows.push({
                deputyName: name,
                division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                courthouse: formatBorrowedCourthouse(cell.dataset.courthouse),
                roomPartTime: formatRoomPartTime(cell)
            });
        });
    });

    tbody.innerHTML = '';

    if (borrowedRows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="4">No borrowed deputies assigned.</td>';
        tbody.appendChild(tr);
        return;
    }

    borrowedRows
        .sort((a, b) => a.deputyName.localeCompare(b.deputyName) || a.courthouse.localeCompare(b.courthouse))
        .forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.deputyName}</td>
                <td>${item.division}</td>
                <td>${item.courthouse}</td>
                <td>${item.roomPartTime}</td>
            `;
            tbody.appendChild(tr);
        });
}

function getAssignedNames() {
    const names = new Set();
    document.querySelectorAll('.editable').forEach(cell => {
        getAssignedNamesFromCell(cell).forEach(name => names.add(name));
    });
    return names;
}

function getAssignedNamesAcrossGrid() {
    const names = new Set();

    document.querySelectorAll('.editable').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));

        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                names.add(name);
            });
            return;
        }

        parseAssignedMemberValue(cell.textContent).forEach(name => {
            if (!isCurrentlyTransferredOut(name)) names.add(name);
        });
    });

    return names;
}

function formatCountMetrics(vacant, filled, open, colorFilled = 'metric-green') {
    return `<span class="metric-red">Vacant ${vacant}</span> / <span class="${colorFilled}">Filled ${filled}</span> / <span class="metric-blue">Open ${open}</span>`;
}

function normalizeCourtroomAssignmentLabel(value) {
    return (value || '').trim().toUpperCase();
}

function isOpenCourtLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    return normalized === 'OPEN' || normalized.startsWith('OPEN-');
}

function isInactiveCourtLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    return !normalized || [
        'DNS',
        'F/T',
        'FT',
        'NON-HEARING MOTIONS',
        'NON-HEARING MOTIONS, CIVIL'
    ].includes(normalized);
}

function shouldCountFixedPostSlot(slotMeta = {}) {
    const courthouse = (slotMeta.courthouse || '').trim().toLowerCase();
    const post = (slotMeta.post || '').trim().toLowerCase();
    const part = (slotMeta.part || '').trim().toLowerCase();

    if (courthouse === 'mitchell' && post === 'calvert' && part === '0800-3') {
        return false;
    }

    if (courthouse === 'cummings' && post === 'cummings' && part === '0830-2') {
        return false;
    }

    if (courthouse === 'cummings' && post === 'transportation') {
        return false;
    }

    return true;
}

function getSlotState(assignmentType, assignmentLabel, hasAssignedMember, slotMeta = {}) {
    const type = (assignmentType || '').trim();

    if (type === 'Fixed Post') {
        if (!shouldCountFixedPostSlot(slotMeta)) return 'inactive';
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    if (type === 'Courtroom') {
        const normalized = normalizeCourtroomAssignmentLabel(assignmentLabel);
        if (isInactiveCourtLabel(normalized)) return 'inactive';
        if (isOpenCourtLabel(normalized)) return 'open';
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    return 'inactive';
}

function getPostedNameSetForPostsAndCourtrooms() {
    const names = new Set();

    document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"], .editable[data-type="Transport"], .editable[data-type="Overtime"]').forEach(cell => {
        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));

        if (chips.length > 0) {
            chips.forEach(chip => {
                const name = (chip.dataset.name || chip.textContent || '').trim();
                if (!name || isChipMarkedTransferredOut(chip)) return;
                names.add(name);
            });
            return;
        }

        parseAssignedMemberValue(cell.textContent).forEach(name => {
            if (!isCurrentlyTransferredOut(name)) names.add(name);
        });
    });

    if (names.size > 0 || document.querySelectorAll('.editable').length > 0) {
        return names;
    }

    return new Set(globalPostedNames);
}

function updateSaveStatusBadge() {
    const saveStatus = document.getElementById("saveStatus");
    if (!saveStatus) return;

    const totalChanges =
        Object.keys(pendingAssignments).length +
        Object.keys(pendingNotes).length +
        Object.keys(pendingJudges).length +
        Object.keys(pendingCourtroomMeta).length +
        Object.keys(pendingShiftTimes).length;

    if (totalChanges <= 0) {
        saveStatus.className = "counts-inline";
        saveStatus.textContent = "";
        return;
    }

    saveStatus.className = "counts-inline metric-red";
    saveStatus.textContent = `${totalChanges} change${totalChanges !== 1 ? "s" : ""} not saved`;
}

function formatToAmPmFromTimeValue(value) {
    return normalizeUserTimeValue(value);
}

function normalizeUserTimeValue(value) {
    if (!value) return "";
    const raw = value.trim().toUpperCase();

    const full = raw.match(/^(\d{1,2})[:\-](\d{1,2})\s*(AM|PM)?$/i);
    if (!full) return "";

    let h = parseInt(full[1], 10);
    const m = String(parseInt(full[2], 10)).padStart(2, '0');
    const explicitMeridiem = full[3] ? full[3].toUpperCase() : null;

    if (Number.isNaN(h) || Number.isNaN(parseInt(m, 10)) || h < 1 || h > 12 || parseInt(m, 10) > 59) {
        return "";
    }

    let meridiem = explicitMeridiem;
    if (!meridiem) {
        if (h >= 7 && h <= 11) meridiem = "AM";
        else meridiem = "PM";
    }

    return `${h}:${m} ${meridiem}`;
}

function parseStoredTimeToInputValue(value) {
    return normalizeUserTimeValue(value) || value || "";
}

function formatTimeValueToAmPm(value) {
    const trimmed = (value || '').trim();
    const match = trimmed.match(/^(\d{2}):(\d{2})$/);
    if (!match) return '';

    let hour24 = parseInt(match[1], 10);
    const minute = match[2];
    if (Number.isNaN(hour24) || hour24 > 23) return '';

    const meridiem = hour24 >= 12 ? 'PM' : 'AM';
    let hour12 = hour24 % 12;
    if (hour12 === 0) hour12 = 12;
    return `${hour12}:${minute} ${meridiem}`;
}

function getTimeOptionValues() {
    const values = [];
    for (let hour = 0; hour < 24; hour++) {
        for (let minute = 0; minute < 60; minute += 15) {
            values.push(`${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`);
        }
    }
    return values;
}

function buildTimeOptionsHtml(selectedValue) {
    return getTimeOptionValues().map(value => {
        const selectedAttr = value === selectedValue ? ' selected' : '';
        return `<option value="${value}"${selectedAttr}>${formatTimeValueToAmPm(value)}</option>`;
    }).join('');
}

function parseOvertimeShiftRange(value) {
    const text = (value || '').trim();
    const match = text.match(/^(\d{1,2}:\d{2}\s*[AP]M)\s*-\s*(\d{1,2}:\d{2}\s*[AP]M)$/i);
    if (!match) {
        return { start: '', end: '' };
    }

    const to24Hour = (display) => {
        const m = display.trim().toUpperCase().match(/^(\d{1,2}):(\d{2})\s*([AP]M)$/);
        if (!m) return '';

        let h = parseInt(m[1], 10);
        const min = m[2];
        const meridiem = m[3];
        if (meridiem === 'AM') {
            if (h === 12) h = 0;
        } else if (h !== 12) {
            h += 12;
        }

        return `${String(h).padStart(2, '0')}:${min}`;
    };

    return {
        start: to24Hour(match[1]),
        end: to24Hour(match[2])
    };
}

function buildOvertimeShiftDisplayValue(startValue, endValue) {
    const start = formatTimeValueToAmPm(startValue);
    const end = formatTimeValueToAmPm(endValue);
    if (!start || !end) return '';
    return `${start} - ${end}`;
}

function queueOvertimeShiftUpdate(payload) {
    const key = [
        payload.assignment_date,
        payload.courthouse,
        payload.assignment_type,
        payload.location_detail,
        payload.part
    ].join('|');

    pendingShiftTimes[key] = payload;
    updateSaveStatusBadge();
}

function setPendingCourtroomMetaFromRow(rowEl) {
    const payload = {
        assignment_date: (rowEl.dataset.date || '').trim(),
        courthouse: (rowEl.dataset.courthouse || '').trim(),
        location_detail: (rowEl.dataset.room || '').trim(),
        part: rowEl.dataset.part || "",
        start_time: formatToAmPmFromTimeValue(rowEl.querySelector('.courtroom-time-input[data-field="start_time"]')?.value || ""),
        restart_time: formatToAmPmFromTimeValue(rowEl.querySelector('.courtroom-time-input[data-field="restart_time"]')?.value || ""),
        adjourned_time: formatToAmPmFromTimeValue(rowEl.querySelector('.courtroom-time-input[data-field="adjourned_time"]')?.value || ""),
        is_down: !!rowEl.querySelector('.courtroom-down-checkbox')?.checked,
        is_high_profile: !!rowEl.querySelector('.courtroom-high-profile-checkbox')?.checked
    };

    if (!payload.assignment_date || !payload.courthouse || !payload.location_detail) {
        return;
    }

    const key = [payload.assignment_date, payload.courthouse, payload.location_detail, payload.part].join('|');
    pendingCourtroomMeta[key] = payload;
    updateSaveStatusBadge();
}

function fetchGlobalAssignmentTotals(dateValue) {
    const date = dateValue || document.getElementById('date').value;
    if (!date) {
        globalAssignmentTotals = { vacant: 0, filled: 0, open: 0 };
        updateAssignmentCountBadges();
        return Promise.resolve();
    }

    return fetch(`/api/search?date=${date}`)
        .then(response => response.json())
        .then(rows => {
            const relevantRows = (rows || []).filter(row => row.assignment_type === 'Courtroom' || row.assignment_type === 'Fixed Post');
            let vacant = 0;
            let filled = 0;
            let open = 0;

            relevantRows.forEach(row => {
                const hasAssignedMember = (row.assigned_member || '').trim().length > 0;
                const slotState = getSlotState(row.assignment_type, row.assignment_notes || '', hasAssignedMember, {
                    courthouse: row.courthouse || '',
                    post: row.location_group || '',
                    part: row.part || ''
                });
                if (slotState === 'vacant') vacant += 1;
                else if (slotState === 'filled') filled += 1;
                else if (slotState === 'open') open += 1;
            });

            const posted = new Set();
            (rows || [])
                .filter(row => ['Courtroom', 'Fixed Post', 'Overtime', 'Transport'].includes(row.assignment_type))
                .filter(row => (row.assigned_member || '').trim().length > 0)
                .forEach(row => {
                parseAssignedMemberValue(row.assigned_member).forEach(name => posted.add(name));
                });
            globalPostedNames = posted;

            globalAssignmentTotals = { vacant, filled, open };
            cacheDateState(date, posted, globalAssignmentTotals);
            updateAssignmentCountBadges();
            refreshRosterHeaderCounts();
            refreshRosterAssignedState();
        })
        .catch(() => {
            globalAssignmentTotals = { vacant: 0, filled: 0, open: 0 };
            globalPostedNames = new Set();
            cacheDateState(date, globalPostedNames, globalAssignmentTotals);
            updateAssignmentCountBadges();
            refreshRosterHeaderCounts();
            refreshRosterAssignedState();
        });
}

function updateAssignmentCountBadges() {
    const statsBySection = {};
    let overallVacant = 0;
    let overallFilled = 0;
    let overallOpen = 0;

    document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"], .editable[data-type="Overtime"]').forEach(cell => {
        const courthouse = cell.dataset.courthouse || '';
        const sectionType = cell.dataset.type || '';
        const key = `${courthouse}|${sectionType}`;
        if (!statsBySection[key]) {
            statsBySection[key] = { vacant: 0, filled: 0, open: 0, type: sectionType };
        }

        if (sectionType === 'Overtime') {
            const assignedNames = getAssignedNamesFromCell(cell);
            const parsedTextNames = parseAssignedMemberValue(cell.textContent);
            if (assignedNames.length > 0 || parsedTextNames.length > 0) {
                statsBySection[key].filled += 1;
            }
            return;
        }

        const assignedNames = getAssignedNamesFromCell(cell);
        const parsedTextNames = parseAssignedMemberValue(cell.textContent);
        const hasAssignedMember = assignedNames.length > 0 || parsedTextNames.length > 0;

        let assignmentLabel = '';
        if (sectionType === 'Courtroom') {
            const rowEl = cell.closest('.courtroom-meta-row');
            assignmentLabel = rowEl?.querySelector('.courtroom-assignment-select')?.value || '';
        }

        const slotState = getSlotState(sectionType, assignmentLabel, hasAssignedMember, {
            courthouse: cell.dataset.courthouse || '',
            post: cell.dataset.room || '',
            part: cell.dataset.part || ''
        });
        if (slotState === 'vacant') {
            statsBySection[key].vacant += 1;
            overallVacant += 1;
        } else if (slotState === 'filled') {
            statsBySection[key].filled += 1;
            overallFilled += 1;
        } else if (slotState === 'open') {
            statsBySection[key].open += 1;
            overallOpen += 1;
        }
    });

    const hasLiveAssignmentGrid = document.querySelectorAll('.editable[data-type="Courtroom"], .editable[data-type="Fixed Post"]').length > 0;
    const sourceVacant = hasLiveAssignmentGrid ? overallVacant : (globalAssignmentTotals.vacant || 0);
    const sourceFilled = hasLiveAssignmentGrid ? overallFilled : (globalAssignmentTotals.filled || 0);
    const sourceOpen = hasLiveAssignmentGrid ? overallOpen : (globalAssignmentTotals.open || 0);
    const overallBadge = document.getElementById('overallAssignmentCounts');
    if (overallBadge) {
        overallBadge.innerHTML = formatCountMetrics(sourceVacant, sourceFilled, sourceOpen);
    }

    document.querySelectorAll('[data-badge-key]').forEach(el => {
        const key = el.dataset.badgeKey;
        const stats = statsBySection[key] || { vacant: 0, filled: 0, open: 0, type: '' };

        if (stats.type === 'Overtime') {
            el.innerHTML = `<span class="metric-blue">Filled ${stats.filled}</span>`;
            return;
        }

        el.innerHTML = formatCountMetrics(stats.vacant, stats.filled, stats.open);
    });

    document.querySelectorAll('[data-main-badge]').forEach(el => {
        const courthouse = el.dataset.mainBadge || '';
        const postStats = statsBySection[`${courthouse}|Fixed Post`] || { vacant: 0, filled: 0, open: 0 };
        const courtroomStats = statsBySection[`${courthouse}|Courtroom`] || { vacant: 0, filled: 0, open: 0 };
        const vacant = postStats.vacant + courtroomStats.vacant;
        const filled = postStats.filled + courtroomStats.filled;
        const open = postStats.open + courtroomStats.open;
        el.innerHTML = formatCountMetrics(vacant, filled, open);
    });
}

function getCourtSecurityRosterStats() {
    const courtSecurity = rawDeputies.filter(isCourtSecurityDeputy);
    const outCount = courtSecurity.filter(dep => !isDeputyAvailable(dep)).length;
    const postedNames = getPostedNameSetForPostsAndCourtrooms();
    const postedCount = courtSecurity.filter(dep => postedNames.has((dep.full_name || '').trim())).length;

    const totalAvailablePool = courtSecurity.filter(dep => isDeputyAvailable(dep)).length;
    const availableCount = Math.max(totalAvailablePool - postedCount, 0);

    return { outCount, availableCount, postedCount };
}

function getIneligibleAssignmentMessage(cell) {

    if (category === 'courtroom') {

    }

    if (category === 'security' && requiresK9SecurityRole(cell.dataset.courthouse, cell.dataset.room)) {
        return 'This post only allows K9 capability.';
    }

    return 'Primary door slot: Deputy or CSO/SPO-A capability.';

function getDefaultTransferTimeValue() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const meridiem = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    if (h === 0) h = 12;
    return `${h}:${m} ${meridiem}`;
}

function openTransferTimePicker({ title, defaultTime, onSave }) {
    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.inset = '0';
    overlay.style.background = 'rgba(15, 23, 42, 0.35)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = '10001';

    const panel = document.createElement('div');
    panel.style.background = 'white';
    panel.style.borderRadius = '10px';
    panel.style.padding = '14px';
    panel.style.minWidth = '280px';
    panel.style.boxShadow = '0 10px 30px rgba(16,24,40,.2)';

    const heading = document.createElement('div');
    heading.style.fontWeight = '700';
    heading.style.marginBottom = '8px';
    heading.textContent = title || 'Transfer time';

    const input = document.createElement('input');
    input.type = 'text';
    input.setAttribute('list', 'courtroomTimeOptions');

    actions.style.display = 'flex';
    actions.style.justifyContent = 'flex-end';
    actions.style.gap = '8px';
    actions.style.marginTop = '10px';

    cancelBtn.type = 'button';
    cancelBtn.textContent = 'Cancel';

    const saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.textContent = 'Save';

    const close = () => overlay.remove();

    cancelBtn.addEventListener('click', close);
    saveBtn.addEventListener('click', () => {
        const normalized = normalizeUserTimeValue(input.value) || input.value.trim();
        if (!normalized) return;
        onSave(normalized);
        close();
    });

    overlay.addEventListener('click', (evt) => {

    });

    actions.appendChild(cancelBtn);
    actions.appendChild(saveBtn);
    panel.appendChild(heading);
    panel.appendChild(input);
    panel.appendChild(actions);
    overlay.appendChild(panel);

function applyDeputyToCell(dropCell, assignedName, role) {
    if (!isEligibleForCell(dropCell, role)) {
        showCellWarning(dropCell, getIneligibleAssignmentMessage(dropCell));
        return false;
    }

    const assignmentList = ensureCellStructure(dropCell);
    // Remove placeholder if present
    
    clearExistingAssignmentForName(assignedName, dropCell);

   

    const item = buildAssignmentChip(assignedName, role, dropCell);
    assignmentList.appendChild(item);

    

    setPendingAssignmentFromCell(dropCell);

    const transferState = transferMap[(assignedName || '').trim()];
    const openTransferIndex = transferState?.openTransferIndex || null;
    if (openTransferIndex) {
        openTransferTimePicker({
            title: `Transfer In: ${assignedName}`,
            defaultTime: getDefaultTransferTimeValue(),
            onSave: (transferTime) => {
                fetch('/api/transfer-in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        assignment_date: dropCell.dataset.date,
                        full_name: assignedName,
                        transfer_index: openTransferIndex,
                        transfer_time: transferTime
                    })
                })
                .then(r => r.json())
                .then(payload => {
                    if (payload?.status !== 'success') return;
                    item.dataset.transferInTime = payload.in_time || transferTime;
                    item.dataset.transferOutTime = '';
                    rememberTransferredInChip(dropCell, assignedName, payload.in_time || transferTime);
                    forgetTransferredChip(dropCell, assignedName);
                    item.dataset.transferredOut = 'false';
                    item.classList.remove('transferred-out');
                    return fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
                })
                .catch(() => {});
            }
        });
    }

    refreshRosterAssignedState();
    return true;
}

function parseDateOnly(value) {
    if (!value) return null;
    const d = new Date(`${value}T00:00:00`);
    return Number.isNaN(d.getTime()) ? null : d;
}

function effectiveStatusForSearchDate(deputy) {
    const selectedDate = parseDateOnly(document.getElementById("date").value);

    try {
        const raw = deputy.status_raw;
        const parsed = raw ? JSON.parse(raw) : null;
        const ranges = parsed && Array.isArray(parsed.ranges) ? parsed.ranges : [];
        const weeklyUnavailable = parsed && Array.isArray(parsed.weekly_unavailable) ? parsed.weekly_unavailable : [];
        const active = [];

        if (selectedDate) {
            for (let i = 0; i < ranges.length; i += 1) {
                const entry = ranges[i];
                const start = parseDateOnly(entry.start_date);
                const end = parseDateOnly(entry.end_date);
                if (start && end && selectedDate >= start && selectedDate <= end) {
                    const status = (entry.status || '').toLowerCase();
                    if (status && !active.includes(status)) active.push(status);
                }
            }

            const weekday = selectedDate.toLocaleDateString("en-US", { weekday: "long" });
            for (let i = 0; i < weeklyUnavailable.length; i += 1) {
                const rule = weeklyUnavailable[i] || {};
                const day = (rule.day || '').trim();
                const ruleEnd = parseDateOnly(rule.end_date);
                if (!day || !ruleEnd) continue;
                if (selectedDate <= ruleEnd && (day === 'Any Day' || day === weekday)) {
                    if (!active.includes('unavailable')) active.push('unavailable');
                }
            }

            if (active.length > 0) return active.join(' / ');
        }

        if (parsed && parsed.legacy) {
            return parsed.legacy.toLowerCase();
        }
    } catch (_) {
        // fallback to effective status from API
    }

    return (deputy.current_status || '').trim().toLowerCase();
}

function isDeputyAvailable(deputy) {
    const status = effectiveStatusForSearchDate(deputy);
    if (!status) return true;

    return !status.includes('scheduled leave')
        && !status.includes('unscheduled leave')
        && !status.includes('unscheduled')
        && !status.includes('unavailable')
        && !status.includes('training');
}

function loadRoster() {

            rawDeputies = data || [];
            allDeputies = rawDeputies
                .filter(isDeputyAvailable)
                .sort((a, b) => (a.full_name || "").localeCompare(b.full_name || ""));
            renderRoster();
        });
}

function getCellAssignmentCategory(cell) {
    if (cell.dataset.type === 'Courtroom') return 'courtroom';
    if (cell.dataset.type === 'Fixed Post') return 'security';
    return 'overtime';
}

function isCourtPrimaryCapability(role) {
    const capability = getCanonicalRole(role);
    return capability === 'DEPUTY'
        || capability === 'CSO/SPO-A: Court Trained (FT)'
        || capability === 'CSO/SPO-A: Court Trained (contractor)';
}

function isCourtSecondaryCapability(role) {
    const capability = getCanonicalRole(role);
    return isCourtPrimaryCapability(capability) || capability === 'CSO/SPO: Court Trained(FT)';
}

function isDoorPrimaryCapability(role) {
    const capability = getCanonicalRole(role);
    return capability === 'DEPUTY'
        || capability === 'CSO/SPO-A: Court Trained (FT)'
        || capability === 'CSO/SPO-A: Court Trained (contractor)'
        || capability === 'CSO/SPO-A: (FT)'
        || capability === 'CSO/SPO-A: (contractor)';
}

function isNoGunFixedPost(courthouse, post) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();

    return (normalizedCourthouse === 'mitchell' && (
            normalizedPost === 'fayette h/c console room'
            || normalizedPost === 'lock up west'
        ))
        || (normalizedCourthouse === 'cummings' && (
            normalizedPost === 'fayette st. h/c'
            || normalizedPost === 'console room'
            || normalizedPost === 'lock up east'
        ));
}

function requiresSingleArmedAcrossPost(courthouse, post) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();

    return normalizedCourthouse === 'mitchell'
        && (normalizedPost === 'jury room' || normalizedPost === 'st. paul');
}

function requiresPrimarySecurityRole(courthouse, post, shift) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();
    const normalizedShift = (shift || '').trim().toLowerCase();

    if (normalizedCourthouse === 'cummings' && normalizedPost === 'family court') {
        return true;
    }

    if (normalizedCourthouse === 'cummings' && normalizedPost === 'cummings' && normalizedShift === '8:00 am') {
        return false;
    }

    if (normalizedCourthouse === 'cummings' && normalizedPost === 'cummings' && normalizedShift === '8:30 am') {
        return false;
    }

    return true;
}

function isK9Capability(role) {
    const normalizedRole = normalizeRoleValue(role);
    return normalizedRole === 'K9' || normalizedRole === 'DEP-K9' || normalizedRole === 'DEPK9';
}

function requiresK9SecurityRole(courthouse, post) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    const normalizedPost = (post || '').trim().toLowerCase();

    return normalizedCourthouse === 'mitchell' && normalizedPost === 'rover';
}

function isArmedByName(name) {
    const chipWithRole = document.querySelector(`.assignment-chip[data-name="${CSS.escape((name || '').trim())}"][data-role]`);
    const chipRole = (chipWithRole?.dataset?.role || '').trim().toUpperCase();
    if (chipRole) return isDoorPrimaryCapability(chipRole);

    const deputy = getDeputyRecordByName(name);
    const role = getDeputyRole(deputy || {});
    if (!role) return true;
    return isDoorPrimaryCapability(role);
}

function isArmedAssignmentChip(chip) {
    const role = (chip?.dataset?.role || '').trim().toUpperCase();
    if (role) return isDoorPrimaryCapability(role);

    const name = (chip?.dataset?.name || chip?.textContent || '').trim();
    return isArmedByName(name);
}

function getSingleArmedAcrossPostsForCourthouse(courthouse) {
    const normalizedCourthouse = (courthouse || '').trim().toLowerCase();
    if (normalizedCourthouse === 'mitchell') {
        return ['jury room', 'st. paul'];
    }
    return [];
}

function updateFixedPostArmedWarnings() {
    const slotsByPost = new Map();
    document.querySelectorAll('.editable[data-type="Fixed Post"][data-courthouse="Mitchell"]').forEach(cell => {
        const post = (cell.dataset.room || '').trim();
        const courthouse = (cell.dataset.courthouse || '').trim();
        if (!post || isNoGunFixedPost(courthouse, post)) return;
        if (!slotsByPost.has(post)) slotsByPost.set(post, []);
        slotsByPost.get(post).push(cell);
    });

    slotsByPost.forEach(cells => {
        cells.sort((a, b) => {
            const ai = Number(a.dataset.slotIndex || 0);
            const bi = Number(b.dataset.slotIndex || 0);
            return ai - bi;
        });

        cells.forEach(cell => {
            cell.querySelectorAll('.armed-warning').forEach(el => el.remove());
        });

        let hasArmed = false;
        let lastAssignedIndex = -1;

        cells.forEach((cell, index) => {
            const names = getAssignedNamesFromCell(cell);
            if (names.length > 0) {
                lastAssignedIndex = index;
                if (names.some(isArmedByName)) {
                    hasArmed = true;
                }
            }
        });

        if (!hasArmed && lastAssignedIndex >= 0 && lastAssignedIndex + 1 < cells.length) {
            const warning = document.createElement('div');
            warning.className = 'armed-warning';
            warning.style.color = '#b42318';
            warning.style.fontWeight = '700';
            warning.textContent = 'require 1 armed';
            cells[lastAssignedIndex + 1].appendChild(warning);
        }
    });
}

function getSingleArmedAcrossPostViolations() {
    const groupedCells = new Map();

    document.querySelectorAll('.editable[data-type="Fixed Post"]').forEach(cell => {
        const post = (cell.dataset.room || '').trim();
        const courthouse = (cell.dataset.courthouse || '').trim();
        if (!requiresSingleArmedAcrossPost(courthouse, post)) return;

        const key = courthouse;
        if (!groupedCells.has(key)) {
            groupedCells.set(key, { courthouse, posts: getSingleArmedAcrossPostsForCourthouse(courthouse), cells: [] });
        }
        groupedCells.get(key).cells.push(cell);
    });

    const violations = [];

    groupedCells.forEach(group => {
        const hasAssignments = group.cells.some(cell => getAssignedNamesFromCell(cell).length > 0);
        if (!hasAssignments) return;

        const hasArmedAssigned = group.cells.some(cell =>
            getAssignedChipsFromCell(cell).some(isArmedAssignmentChip)
        );

        if (!hasArmedAssigned) {
            violations.push({ courthouse: group.courthouse, post: group.posts.join(' / ') || 'required posts' });
        }
    });

    return violations;
}

function isEligibleForCell(cell, role) {
    const category = getCellAssignmentCategory(cell);
    const existingAssignments = getAssignedNamesFromCell(cell).length;
    if (category === 'courtroom') {
        if (existingAssignments === 0) return isCourtPrimaryCapability(role);
        return isCourtSecondaryCapability(role);
    }

    if (category === 'security') {
        const post = (cell.dataset.room || '').trim();
        const courthouse = (cell.dataset.courthouse || '').trim();
        const shift = (cell.dataset.shift || '').trim();

        if (requiresK9SecurityRole(courthouse, post)) {
            return isK9Capability(role);
        }

        if (existingAssignments === 0) {
            return isDoorPrimaryCapability(role);
        }

        if ((courthouse || '').trim().toLowerCase() === 'cummings' && post.trim().toLowerCase() === 'family court') {
            return true;
        }

        if ((courthouse || '').trim().toLowerCase() === 'cummings' && post.trim().toLowerCase() === 'cummings' && shift.trim().toLowerCase() === '8:00 am') {
            return true;
        }

        if (isNoGunFixedPost(courthouse, post)) {
            return true;
        }

        const matchingSecurityCells = Array.from(
            document.querySelectorAll('.editable[data-type="Fixed Post"]')
        ).filter(candidate => {
            if ((candidate.dataset.room || '').trim() !== post) return false;
            return (candidate.dataset.shift || '').trim() === shift;
        });

        if (requiresSingleArmedAcrossPost(courthouse, post) && !isDoorPrimaryCapability(role)) {
            const singleArmedPosts = getSingleArmedAcrossPostsForCourthouse(courthouse);
            const acrossPostCells = Array.from(
                document.querySelectorAll('.editable[data-type="Fixed Post"]')
            ).filter(candidate => {
                const candidateCourthouse = (candidate.dataset.courthouse || '').trim().toLowerCase();
                const candidatePost = (candidate.dataset.room || '').trim().toLowerCase();
                return candidateCourthouse === (courthouse || '').trim().toLowerCase()
                    && singleArmedPosts.includes(candidatePost);
            });

            const hasArmedAssigned = acrossPostCells.some(candidate =>
                getAssignedChipsFromCell(candidate).some(isArmedAssignmentChip)
            );

            if (!hasArmedAssigned) {
                return false;
            }

            return true;
        }

        const requirePrimary = requiresPrimarySecurityRole(courthouse, post, shift);

        const hasPrimaryAssigned = matchingSecurityCells.some(candidate =>
            getAssignedNamesFromCell(candidate).some(name => {
                const deputy = getDeputyRecordByName(name);
                const assignedRole = getDeputyRole(deputy || {});
                return isDoorPrimaryCapability(assignedRole);
            })
        );

        if (requirePrimary && !hasPrimaryAssigned && !isDoorPrimaryCapability(role)) {
            return false;
        }

        return true;
    }

    return true;
}

function showCellWarning(cell, message) {
    const existing = cell.querySelector('.cell-warning');
    if (existing) existing.remove();
    const warning = document.createElement('div');
    warning.className = 'cell-warning';
    warning.textContent = message;
    cell.appendChild(warning);
    setTimeout(() => warning.remove(), 2000);
}

function buildAssignmentChip(name, role, owningCell = null) {
  const chip = document.createElement('span');
  chip.className = 'assignment-chip';
  chip.dataset.name = (name || '').trim();
  chip.dataset.role = (role || '').trim();
  chip.dataset.transferredOut = 'false';
  chip.textContent = (name || '').trim();
  chip.dataset.transferOutTime = '';
  chip.dataset.transferInTime = getTransferredInTimeForChip(owningCell, name)
    || transferMap[(name || '').trim()]?.latestIn
    || '';

  if (owningCell && transferredOutChipKeys.has(getTransferredChipKey(owningCell, name))) {
    chip.dataset.transferredOut = 'true';
    chip.classList.add('transferred-out');
    chip.dataset.transferOutTime = transferMap[(name || '').trim()]?.latestOut || '';
  }

  chip.addEventListener('click', function (e) {
    e.stopPropagation();

    // remove any existing popover
    document.querySelectorAll('.assignment-action-popover').forEach(p => p.remove());

    const cell = chip.closest('.editable');
    if (!cell) return;

    const deputyName = (chip.dataset.name || chip.textContent || '').trim();
    const date = cell.dataset.date;

    const pop = document.createElement('div');
    pop.className = 'assignment-action-popover';
    pop.style.position = 'absolute';
    pop.style.zIndex = 9999;
    pop.style.background = 'white';
    pop.style.border = '1px solid #D0D5DD';
    pop.style.borderRadius = '8px';
    pop.style.boxShadow = '0 8px 24px rgba(16,24,40,.12)';
    pop.style.padding = '8px';
    pop.style.display = 'flex';
    pop.style.gap = '8px';

    const btnTransfer = document.createElement('button');
    btnTransfer.type = 'button';
    btnTransfer.textContent = 'Transfer Out';

    const btnRemove = document.createElement('button');
    btnRemove.type = 'button';
    btnRemove.textContent = 'Remove';

    const btnCancel = document.createElement('button');
    btnCancel.type = 'button';
    btnCancel.textContent = 'Cancel';

    pop.appendChild(btnTransfer);
    pop.appendChild(btnRemove);
    pop.appendChild(btnCancel);

    const rect = chip.getBoundingClientRect();
    pop.style.left = (window.scrollX + rect.left) + 'px';
    pop.style.top  = (window.scrollY + rect.bottom + 6) + 'px';
    document.body.appendChild(pop);

    const closePop = () => pop.remove();

    const removeChip = () => {
      forgetTransferredChip(cell, deputyName);
      forgetTransferredInChip(cell, deputyName);
      chip.remove();
      setPendingAssignmentFromCell(cell);
      refreshRosterAssignedState();
      closePop();
    };

    btnCancel.addEventListener('click', (ev) => { ev.stopPropagation(); closePop(); });
    btnRemove.addEventListener('click', (ev) => { ev.stopPropagation(); removeChip(); });

    btnTransfer.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const transferState = transferMap[(deputyName || '').trim()];
      const transferCount = transferState?.history?.length || 0;
      if (transferCount >= 3 && !transferState?.openTransferIndex) {
        closePop();
        return;
      }

      openTransferTimePicker({
        title: `Transfer Out: ${deputyName}`,
        defaultTime: transferState?.latestOut || getDefaultTransferTimeValue(),
        onSave: (transferTime) => {
          fetch('/api/transfer-out', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              assignment_date: date,
              full_name: deputyName,
              transfer_time: transferTime,
              transfer_index: transferState?.openTransferIndex || null
            })
          })
          .then(r => r.json())
          .then(payload => {
            if (payload?.status !== 'success') return;
            rememberTransferredChip(cell, deputyName);
            forgetTransferredInChip(cell, deputyName);
            chip.dataset.transferredOut = 'true';
            chip.dataset.transferOutTime = payload.out_time || transferTime;
            chip.dataset.transferInTime = '';
            chip.classList.add('transferred-out');
            return fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
          })
          .finally(() => closePop());
        }
      });
    });

    setTimeout(() => {
      const onDocClick = (evt) => {
        if (!evt.target.closest('.assignment-action-popover') && !evt.target.closest('.assignment-chip')) {
          document.removeEventListener('click', onDocClick);
          closePop();
        }
      };
      document.addEventListener('click', onDocClick);
    }, 0);
  });

  return chip;
}



function clearExistingAssignmentForName(name, excludeCell) {
    document.querySelectorAll('.editable').forEach(cell => {
        if (cell === excludeCell) return;

        const chips = Array.from(cell.querySelectorAll('.assignment-chip'));
        let removed = false;
        chips.forEach(chip => {
            const chipName = chip.dataset.name?.trim();
            if (chipName === name) {
                if (isChipMarkedTransferredOut(chip)) return;
                forgetTransferredChip(cell, chipName);
                chip.remove();
                removed = true;
            }
        });

        if (removed) {
            setPendingAssignmentFromCell(cell);
        }
    });
}

function setPendingAssignmentFromCell(cell) {
    const assignedName = getAssignedNamesFromCell(cell).join(' || ');
    const payload = {
        assignment_date: cell.dataset.date,
        courthouse: cell.dataset.courthouse,
        assignment_type: cell.dataset.type,
        location_detail: cell.dataset.room,
        part: cell.dataset.part,
        assigned_member: assignedName
    };

    const key = [
        payload.assignment_date,
        payload.courthouse,
        payload.assignment_type,
        payload.location_detail,
        payload.part
    ].join('|');

    pendingAssignments[key] = payload;
    updateSaveStatusBadge();
}


function getDeputyAutocompleteMatches(query) {
    const normalizedQuery = (query || '').trim().toLowerCase();
    if (normalizedQuery.length < 4) return [];

    return allDeputies
        .filter(dep => {
            const fullName = (dep.full_name || '').toLowerCase();
            return fullName.includes(normalizedQuery);
        })
        .sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''))
        .slice(0, 8);
}

function createAssignmentTypeahead(cell) {
    const wrapper = document.createElement('div');
    wrapper.className = 'assignment-typeahead';
    wrapper.style.position = 'relative';
    wrapper.style.marginTop = '6px';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'assignment-typeahead-input';
    input.placeholder = 'Type deputy name';
    input.autocomplete = 'off';
    input.style.width = '100%';

    const dropdown = document.createElement('div');
    dropdown.className = 'assignment-typeahead-dropdown';
    dropdown.style.position = 'absolute';
    dropdown.style.top = '100%';
    dropdown.style.left = '0';
    dropdown.style.right = '0';
    dropdown.style.background = 'white';
    dropdown.style.border = '1px solid #D0D5DD';
    dropdown.style.borderRadius = '6px';
    dropdown.style.boxShadow = '0 8px 16px rgba(16,24,40,.12)';
    dropdown.style.maxHeight = '200px';
    dropdown.style.overflowY = 'auto';
    dropdown.style.zIndex = '30';
    dropdown.style.display = 'none';

    const hideDropdown = () => {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
    };

    const applySelection = (dep) => {
        if (!dep) return;
        const name = (dep.full_name || '').trim();
        const role = getDeputyRole(dep || {});
        if (!name) return;
        applyDeputyToCell(cell, name, role);
        input.value = '';
        hideDropdown();
    };

    const renderMatches = () => {
        const query = input.value || '';
        const matches = getDeputyAutocompleteMatches(query);

        dropdown.innerHTML = '';
        if (matches.length === 0) {
            hideDropdown();
            return;
        }

        matches.forEach(dep => {
            const option = document.createElement('button');
            option.type = 'button';
            option.className = 'assignment-typeahead-option';
            option.style.display = 'block';
            option.style.width = '100%';
            option.style.textAlign = 'left';
            option.style.border = '0';
            option.style.background = 'transparent';
            option.style.padding = '8px 10px';
            option.style.cursor = 'pointer';
            option.textContent = `${dep.full_name || ''} (${getCanonicalRole(getDeputyRole(dep || {})) || ''})`;
            option.addEventListener('mousedown', (evt) => {
                evt.preventDefault();
                applySelection(dep);
            });
            dropdown.appendChild(option);
        });

        dropdown.style.display = 'block';
    };

    input.addEventListener('input', renderMatches);
    input.addEventListener('focus', renderMatches);
    input.addEventListener('keydown', (evt) => {
        if (evt.key !== 'Enter') return;
        const query = input.value || '';
        const matches = getDeputyAutocompleteMatches(query);
        if (matches.length === 0) return;
        evt.preventDefault();
        applySelection(matches[0]);
    });
    input.addEventListener('blur', () => {
        setTimeout(hideDropdown, 120);
    });

    wrapper.appendChild(input);
    wrapper.appendChild(dropdown);
    return wrapper;
}

function ensureCellStructure(cell) {
    let list = cell.querySelector('.assignment-list');
    if (!list) {
        list = document.createElement('div');
        list.className = 'assignment-list';
        cell.appendChild(list);
    }

    let typeahead = cell.querySelector('.assignment-typeahead');
    if (!typeahead) {
        typeahead = createAssignmentTypeahead(cell);
        cell.appendChild(typeahead);
    }

    return list;
}

function orderCourtroomRows(courthouse, rows) {
    const rowsToRender = [...rows].sort((a, b) => {
        const roomCompare = (a.location_detail || "").localeCompare(b.location_detail || "");
        if (roomCompare !== 0) return roomCompare;
        return (a.part || "").localeCompare(b.part || "");
    });

    const roomOrder = getCourtroomRoomOrder(courthouse);
    if (!roomOrder.length) return rowsToRender;

    const rowsByRoom = new Map();
    rowsToRender.forEach(row => {
        const key = row.location_detail || "";
        if (!rowsByRoom.has(key)) rowsByRoom.set(key, []);
        rowsByRoom.get(key).push(row);
    });

    const defaults = getCourtroomDefaults(courthouse);
    const orderedRows = [];
    roomOrder.forEach(room => {
        const matches = rowsByRoom.get(room) || [];
        if (matches.length) {
            orderedRows.push(...matches);
        } else {
            const defaultRoomMeta = defaults[room] || null;
            orderedRows.push(defaultRoomMeta
                ? { location_detail: room, part: defaultRoomMeta.part, judge_name: defaultRoomMeta.judge_name }
                : { location_detail: room }
            );
        }
        rowsByRoom.delete(room);
    });

    rowsByRoom.forEach(matches => orderedRows.push(...matches));
    return orderedRows;
}

let transferMap = {}; // { "Name": { history: [{out, in}], latestOut, latestIn, openTransferIndex } }
let transferredOutChipKeys = new Set();
let transferredInChipMeta = new Map();


function getTransferredChipStorageKey(dateValue) {
  return `transferredOutChipKeys:${(dateValue || '').trim()}`;
}

function loadTransferredChipKeysForDate(dateValue) {
  const date = (dateValue || '').trim();
  transferredOutChipKeys = new Set();
  if (!date) return;
  try {
    const raw = localStorage.getItem(getTransferredChipStorageKey(date));
    const parsed = raw ? JSON.parse(raw) : [];
    if (Array.isArray(parsed)) {
      transferredOutChipKeys = new Set(parsed.filter(Boolean));
    }
  } catch (_) {
    transferredOutChipKeys = new Set();
  }
}

function persistTransferredChipKeysForDate(dateValue) {
  const date = (dateValue || document.getElementById('date')?.value || '').trim();
  if (!date) return;
  try {
    localStorage.setItem(getTransferredChipStorageKey(date), JSON.stringify(Array.from(transferredOutChipKeys)));
  } catch (_) {
    // ignore storage errors
  }
}

function isCurrentlyTransferredOut(name) {
  const t = transferMap[(name || '').trim()];
  return !!(t && t.openTransferIndex);
}

function isChipMarkedTransferredOut(chip) {
  return (chip?.dataset?.transferredOut || '').trim() === 'true';
}

function getTransferredChipKey(cell, name) {
  if (!cell) return '';
  return [
    (cell.dataset.date || '').trim(),
    (cell.dataset.courthouse || '').trim(),
    (cell.dataset.type || '').trim(),
    (cell.dataset.room || '').trim(),
    (cell.dataset.part || '').trim(),
    (name || '').trim().toLowerCase()
  ].join('|');
}

function rememberTransferredChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  if (key) {
    transferredOutChipKeys.add(key);
    persistTransferredChipKeysForDate(cell?.dataset?.date || document.getElementById('date')?.value || '');
  }
}

function forgetTransferredChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  if (key) {
    transferredOutChipKeys.delete(key);
    persistTransferredChipKeysForDate(cell?.dataset?.date || document.getElementById('date')?.value || '');
  }
}

function rememberTransferredInChip(cell, name, inTime) {
  const key = getTransferredChipKey(cell, name);
  if (!key) return;
  transferredInChipMeta.set(key, inTime || '');
}

function forgetTransferredInChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  if (!key) return;
  transferredInChipMeta.delete(key);
}

function getTransferredInTimeForChip(cell, name) {
  const key = getTransferredChipKey(cell, name);
  return key ? (transferredInChipMeta.get(key) || '') : '';
}

function fetchTransfersForDate() {
  const date = document.getElementById("date")?.value;
  if (!date) { transferMap = {}; transferredOutChipKeys = new Set(); return Promise.resolve(); }

  return fetch(`/api/transfers?date=${date}`)
    .then(r => r.json())
    .then(rows => {
      transferMap = {};
      (rows || []).forEach(row => {
        const name = (row.full_name || '').trim();
        if (!name) return;
        const history = Array.isArray(row.history)
          ? row.history.map(entry => ({ out: entry?.out || null, in: entry?.in || null }))
          : [];
        let openTransferIndex = null;
        for (let i = history.length - 1; i >= 0; i--) {
          if (history[i]?.out && !history[i]?.in) {
            openTransferIndex = i + 1;
            break;
          }
        }
        const latestOut = history.length > 0 ? (history[history.length - 1]?.out || null) : null;
        let latestIn = null;
        for (let i = history.length - 1; i >= 0; i--) {
          if (history[i]?.in) {
            latestIn = history[i].in;
            break;
          }
        }
        transferMap[name] = { history, latestOut, latestIn, openTransferIndex };
      });
    })
    .catch(() => { transferMap = {}; });
}

function applyTransferCaptionToRosterAndGrid() {
  const formatRosterOut = (name) => {
    const t = transferMap[(name || '').trim()];
    if (!t || !t.latestOut) return "";
    return `out: ${t.latestOut}`;
  };

  // add caption under roster names
  document.querySelectorAll('#rosterList .roster-item').forEach(item => {
    const name = (item.dataset.name || '').trim();
    const text = formatRosterOut(name);

    let cap = item.querySelector('.transfer-caption');
    if (!text) { if (cap) cap.remove(); return; }

    if (!cap) {
      cap = document.createElement('div');
      cap.className = 'transfer-caption';
      cap.style.color = '#667085';
      cap.style.fontSize = '11px';
      cap.style.marginTop = '2px';
      item.appendChild(cap);
    }
    cap.textContent = text;
  });

  // add caption next to chips in grid
  document.querySelectorAll('.assignment-chip').forEach(chip => {
    const name = (chip.dataset.name || chip.textContent || '').trim();
    const owningCell = chip.closest('.editable');
    const transferState = transferMap[(name || '').trim()] || {};
    const isTransferredOut = isChipMarkedTransferredOut(chip) || isCurrentlyTransferredOut(name);
    const outTime = chip.dataset.transferOutTime || transferState.latestOut || '';
    const inTime = chip.dataset.transferInTime
      || getTransferredInTimeForChip(owningCell, name)
      || transferState.latestIn
      || '';
    const text = isTransferredOut ? (outTime ? `out: ${outTime}` : '') : (inTime ? `in: ${inTime}` : '');

    chip.classList.toggle('transferred-out', isTransferredOut);

    let cap = chip.querySelector('.transfer-caption');
    if (!text) { if (cap) cap.remove(); return; }

    if (!cap) {
      cap = document.createElement('span');
      cap.className = 'transfer-caption';
      cap.style.color = '#667085';
      cap.style.fontSize = '11px';
      cap.style.marginLeft = '6px';
      chip.appendChild(cap);
    }
    cap.textContent = `(${text})`;
  });

  persistTransferredChipKeysForDate(document.getElementById('date')?.value || '');
  refreshRosterAssignedState();
}

                const h = document.createElement("h4");
                h.textContent = "Cummings Overtime";
                overtimeLeft.appendChild(h);
                overtimeLeft.appendChild(cummings.overtime);

            if (includeJuvenile) {
                const h = document.createElement("h4");
                h.textContent = "Juvenile Overtime";
                overtimeLeft.appendChild(h);
                overtimeLeft.appendChild(juvenile.overtime);
            }


            overtimeRow.appendChild(createSectionCell("Overtime", overtimeLeft));

            // Right side: Borrowed Deputies
            overtimeRow.appendChild(createSectionCell("Details", borrowedPanel));

            // =========================
            // Init + repaint
            // =========================
            initAssignmentDropzones();
            fetchTransfersForDate().then(() => applyTransferCaptionToRosterAndGrid());
            refreshRosterAssignedState();
            loadCourtroomMeta(date);
        });
}
function loadCourtroomMeta(date) {
    if (!date) return;
    fetch(`/api/get-courtroom-meta?date=${date}`)
        .then(res => res.json())
        .then(rows => {
            rows.forEach(meta => {
                const selector = `.courtroom-meta-row[data-date="${meta.assignment_date}"][data-courthouse="${meta.courthouse}"][data-room="${meta.location_detail}"][data-part="${meta.part || ''}"]`;
                const row = document.querySelector(selector);
                if (!row) return;

                const pendingKey = [meta.assignment_date, meta.courthouse, meta.location_detail, meta.part || ''].join('|');
                const pendingMeta = pendingCourtroomMeta[pendingKey] || null;

                const startInput = row.querySelector('.courtroom-time-input[data-field="start_time"]');
                const restartInput = row.querySelector('.courtroom-time-input[data-field="restart_time"]');
                const adjournedInput = row.querySelector('.courtroom-time-input[data-field="adjourned_time"]');
                const downInput = row.querySelector('.courtroom-down-checkbox');
                const highProfileInput = row.querySelector('.courtroom-high-profile-checkbox');

                if (startInput) startInput.value = parseStoredTimeToInputValue((pendingMeta && pendingMeta.start_time) || meta.start_time || '');
                if (restartInput) restartInput.value = parseStoredTimeToInputValue((pendingMeta && pendingMeta.restart_time) || meta.restart_time || '');
                if (adjournedInput) adjournedInput.value = parseStoredTimeToInputValue((pendingMeta && pendingMeta.adjourned_time) || meta.adjourned_time || '');
                if (downInput) downInput.checked = pendingMeta ? !!pendingMeta.is_down : !!meta.is_down;
                if (highProfileInput) highProfileInput.checked = pendingMeta ? !!pendingMeta.is_high_profile : !!meta.is_high_profile;
            });
        });
}

function buildSimpleViewUrl(pathname) {
    const params = new URLSearchParams();
    const date = document.getElementById("date")?.value || "";
    const courthouse = document.getElementById("courthouse")?.value || "";

    if (date) params.set("date", date);
    if (courthouse) params.set("courthouse", courthouse);

    const query = params.toString();
    return query ? `${pathname}?${query}` : pathname;
}

function openExecutiveSummary() {
    const date = document.getElementById("date")?.value || "";
    const params = new URLSearchParams();
    if (date) params.set("date", date);
    const query = params.toString();
    const url = query ? `/executive-summary?${query}` : '/executive-summary';
    window.open(url, '_blank');
}


function clearSectionAssignments(sectionType, courthouse = "") {
    const date = document.getElementById("date")?.value || "";
    if (!date) {
        alert("Please choose a date before clearing assignments.");
        return;
    }

    const sectionLabel = sectionType === "fixed_post"
        ? `${courthouse} security posts`
        : courthouse
            ? `${courthouse} courtrooms`
            : "courtrooms";

    const shouldClear = confirm(`Clear assignments for ${sectionLabel} only?`);
    if (!shouldClear) {
        return;
    }

    fetch("/api/clear-section-assignments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            assignment_date: date,
            section_type: sectionType,
            courthouse
        })
    })
        .then(async response => {
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(payload.message || "Unable to clear section assignments.");
            }
            return payload;
        })
        .then(() => {
            pendingAssignments = {};
            pendingNotes = {};
            pendingJudges = {};
            pendingCourtroomMeta = {};
            pendingShiftTimes = {};
            updateSaveStatusBadge();
            search();
            loadRoster();
        })
        .catch(err => {
            alert(err.message || "Unable to clear section assignments.");
        });
}

window.onload = function() {
    const today = (() => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; })();
    const savedDate = localStorage.getItem('searchPageDate');
    document.getElementById("date").value = savedDate || today;
    const simpleViewToggle = document.getElementById("simpleViewToggle");
    if (simpleViewToggle) {
        simpleViewToggle.checked = false;
        simpleViewToggle.addEventListener("change", function() {
            if (this.checked) {
                window.location.href = buildSimpleViewUrl("/simple-search");
            }
        });
    }

    document.getElementById("showFullRoster").addEventListener("change", renderRoster);
    document.addEventListener('change', function(e) {
        if (!e.target.classList.contains('hide-posted-checkbox')) return;
        hidePosted = e.target.checked;
        document.querySelectorAll('.hide-posted-checkbox').forEach(toggle => {
            if (toggle !== e.target) {
                toggle.checked = hidePosted;
            }
        });
        refreshRosterAssignedState();
    });
    document.addEventListener('change', function(e) {
        if (!e.target.classList.contains('courtroom-high-profile-checkbox')) return;
        const row = e.target.closest('.courtroom-meta-row');
        if (row) setPendingCourtroomMetaFromRow(row);
    });
    document.getElementById("courthouse").addEventListener("change", search);
    document.getElementById("importPreviousWeekdayBtn").addEventListener("click", importPreviousWeekdayEntries);
    document.getElementById("clearAssignmentsBtn").addEventListener("click", clearDailyAssignments);
    document.getElementById("date").addEventListener("change", function() {
        localStorage.setItem('searchPageDate', document.getElementById("date").value || '');
        search();
    });

    loadRoster();
    search();
};
document.addEventListener("click", function(e) {

    const shiftCell = e.target.closest('.editable-overtime-shift');
    if (shiftCell) {
        if (shiftCell.querySelector('select')) return;

        const currentStart = shiftCell.dataset.startTime || '';
        const currentEnd = shiftCell.dataset.endTime || '';

        const editor = document.createElement('div');
        editor.style.display = 'flex';
        editor.style.gap = '6px';

        const startSelect = document.createElement('select');
        const endSelect = document.createElement('select');
        startSelect.innerHTML = `<option value="">Start</option>${buildTimeOptionsHtml(currentStart)}`;
        endSelect.innerHTML = `<option value="">End</option>${buildTimeOptionsHtml(currentEnd)}`;

        editor.appendChild(startSelect);
        editor.appendChild(endSelect);

        shiftCell.innerHTML = '';
        shiftCell.appendChild(editor);
        startSelect.focus();

        const commit = () => {
            const start = startSelect.value;
            const end = endSelect.value;
            const display = buildOvertimeShiftDisplayValue(start, end);

            if (start && end && display) {
                shiftCell.dataset.startTime = start;
                shiftCell.dataset.endTime = end;
                shiftCell.dataset.shift = display;
                shiftCell.textContent = display;

                const memberCell = shiftCell.parentElement?.querySelector('.editable[data-type="Overtime"]');
                if (memberCell) {
                    memberCell.dataset.shift = display;
                }

                queueOvertimeShiftUpdate({
                    assignment_date: shiftCell.dataset.date,
                    courthouse: shiftCell.dataset.courthouse,
                    assignment_type: shiftCell.dataset.type,
                    location_detail: shiftCell.dataset.room,
                    part: shiftCell.dataset.part || '',
                    shift_time: display
                });
                return;
            }

            shiftCell.textContent = shiftCell.dataset.shift || '';
        };

        startSelect.addEventListener('change', commit);
        endSelect.addEventListener('change', commit);

        [startSelect, endSelect].forEach(select => {
            select.addEventListener('blur', () => {
                setTimeout(() => {
                    if (!shiftCell.contains(document.activeElement) && shiftCell.querySelector('select')) {
                        commit();
                    }
                }, 0);
            });
        });

        return;
    }

    const cell = e.target.closest(".editable-judge");
    if (!cell) return;

    if (cell.querySelector("input") || cell.querySelector("select")) return;

    const input = document.createElement("input");
    input.type = "text";
    input.value = cell.textContent.trim();

    cell.innerHTML = "";
    cell.appendChild(input);
    input.focus();

    input.addEventListener("blur", function() {

        const payload = {
            assignment_date: cell.dataset.date,
            courthouse: cell.dataset.courthouse,
            assignment_type: cell.dataset.type,
            location_detail: cell.dataset.room,
            part: cell.dataset.part,
            judge_name: input.value
        };

        const key = [
            payload.assignment_date,
            payload.courthouse,
            payload.assignment_type,
            payload.location_detail,
            payload.part
        ].join("|");

        pendingJudges[key] = payload;
        cell.textContent = input.value;

        updateSaveStatusBadge();

    });

});

document.getElementById("saveAssignments").addEventListener("click", function() {

    document.querySelectorAll('.courtroom-meta-row').forEach(rowEl => setPendingCourtroomMetaFromRow(rowEl));

    const armedPostViolations = getSingleArmedAcrossPostViolations();
    if (armedPostViolations.length > 0) {
        const message = armedPostViolations
            .map(v => `${v.courthouse} - ${v.post}`)
            .join(', ');
        alert(`Save blocked: These posts require at least one armed deputy before saving: ${message}.`);
        return;
    }

    const saveStatus = document.getElementById("saveStatus");
    if (saveStatus) {
        saveStatus.className = "counts-inline";
        saveStatus.textContent = "Saving...";
    }

    const assignmentRequests = Object.values(pendingAssignments).map(payload =>
        fetch("/api/update-deputy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save deputy assignment");
            return res.json();
        })
    );

    const notesRequests = Object.values(pendingNotes).map(payload =>
        fetch("/api/update-assignment-notes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save assignment note");
            return res.json();
        })
    );

    const judgeRequests = Object.values(pendingJudges).map(payload =>
        fetch("/api/update-judge-name", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save judge name");
            return res.json();
        })
    );

    const courtroomMetaRequests = Object.values(pendingCourtroomMeta)
        .filter(payload => payload.assignment_date && payload.courthouse && payload.location_detail)
        .map(payload =>
        fetch("/api/update-courtroom-meta", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save courtroom meta");
            return res.json();
        })
    );

    const shiftTimeRequests = Object.values(pendingShiftTimes)
        .filter(payload => payload.assignment_date && payload.courthouse && payload.location_detail)
        .map(payload =>
        fetch("/api/update-shift-time", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(res => {
            if (!res.ok) throw new Error("Failed to save overtime shift");
            return res.json();
        })
    );

    Promise.all([...assignmentRequests, ...notesRequests, ...judgeRequests, ...courtroomMetaRequests, ...shiftTimeRequests])
        .then(() => {
            pendingAssignments = {};
            pendingNotes = {};
            pendingJudges = {};
            pendingCourtroomMeta = {};
            pendingShiftTimes = {};
            if (saveStatus) {
                saveStatus.className = "counts-inline metric-green";
                saveStatus.textContent = "Saved";
            }
            search();
            loadRoster();
        })
        .catch(err => {
            console.error("Save failed:", err);
            if (saveStatus) {
                saveStatus.className = "counts-inline metric-red";
                saveStatus.textContent = "Save failed";
            }
            alert("Save failed. Please try again.");
        });
});
