<!DOCTYPE html>
<html>
<head>
    <title>Staffing Resources Daily</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<h2>Staffing Resources Daily</h2>
<button type="button" onclick="window.location.href='/'">Return to Main</button>
<label for="staffingDate">Date:</label>
<input type="date" id="staffingDate">

<table>
    <thead>
        <tr>
            <th>Assigned to Court Security <span id="count-assigned" style="color: green;"></span></th>
            <th>Certified for Court Room <span id="count-courtroom" style="color: green;"></span></th>
            <th>Certified to Work Door <span id="count-door" style="color: green;"></span></th>
            <th>Available to Work <span id="count-available" style="color: green;"></span></th>
            <th>Unavailable (+ Leave Code) <span id="count-unavailable" style="color: red;"></span></th>
            <th>Supervisor / Roll Call</th>
        </tr>
    </thead>
    <tbody id="staffingBody"></tbody>
</table>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const dateInput = document.getElementById("staffingDate");
    const tbody = document.getElementById("staffingBody");

    const countAssigned = document.getElementById("count-assigned");
    const countCourtroom = document.getElementById("count-courtroom");
    const countDoor = document.getElementById("count-door");
    const countAvailable = document.getElementById("count-available");
    const countUnavailable = document.getElementById("count-unavailable");

    function normalize(text) {
        return (text || "").toString().trim().toLowerCase();
    }

    function isConsoleTag(deputy) {
        return normalize(deputy && deputy.capacity_tag) === "console";
    }

    function isOutStatus(statusText) {
        const status = normalize(statusText);
        if (!status) {
            return false;
        }

        return (
            status.includes("sick") ||
            status.includes("leave") ||
            status.includes("light duty") ||
            status === "ld" ||
            status.includes(" ld") ||
            status.includes("unavailable") ||
            status.includes("out")
        );
    }

    function formatUnavailable(deputy) {
        const status = deputy.current_status || "Out";
        return `${deputy.full_name} (${status})`;
    }

    function sortByName(items) {
        return [...items].sort((a, b) => a.full_name.localeCompare(b.full_name));
    }

    function sortCourtSecurityFirst(items) {
        return [...items].sort((a, b) => {
            const aCourtSecurity = normalize(a.division) === "court security";
            const bCourtSecurity = normalize(b.division) === "court security";

            if (aCourtSecurity !== bCourtSecurity) {
                return aCourtSecurity ? -1 : 1;
            }

            return a.full_name.localeCompare(b.full_name);
        });
    }

    function updateCounts({ assignedCourtSecurity, certifiedCourtRoom, certifiedDoor, available, unavailable }) {
        countAssigned.textContent = `(${assignedCourtSecurity.length})`;
        countCourtroom.textContent = `(${certifiedCourtRoom.length})`;
        countDoor.textContent = `(${certifiedDoor.length})`;
        countAvailable.textContent = `(${available.length})`;
        countUnavailable.textContent = `(${unavailable.length})`;
    }

    function buildDynamicTable(deputies) {
        const courtSecurityDeputies = deputies.filter(
            dep => normalize(dep.division) === "court security" && !isConsoleTag(dep)
        );

        const assignedCourtSecurity = sortByName(courtSecurityDeputies).map(dep => dep.full_name);

        const certifiedCourtRoom = sortCourtSecurityFirst(
            courtSecurityDeputies.filter(dep => {
                const capacityTag = normalize(dep.capacity_tag);
                return ["court", "k9", "f", "dep", "dep-k9", "depk9"].includes(capacityTag);
            })
        ).map(dep => dep.full_name);

        const certifiedDoor = sortCourtSecurityFirst(
            courtSecurityDeputies.filter(dep => {
                const capacityTag = normalize(dep.capacity_tag);
                return ["court", "armed", "basic", "k9", "f", "dep", "spo", "nospo", "cso", "spo-ua", "spoua", "dep-k9", "depk9"].includes(capacityTag);
            })
        ).map(dep => dep.full_name);

        const available = sortByName(
            courtSecurityDeputies.filter(dep => !isOutStatus(dep.current_status))
        ).map(dep => dep.full_name);

        const unavailable = sortByName(
            deputies.filter(dep => isOutStatus(dep.current_status))
        ).map(formatUnavailable);

        updateCounts({
            assignedCourtSecurity,
            certifiedCourtRoom,
            certifiedDoor,
            available,
            unavailable
        });

        const columns = [
            assignedCourtSecurity,
            certifiedCourtRoom,
            certifiedDoor,
            available,
            unavailable,
            []
        ];

        const maxRows = Math.max(...columns.map(col => col.length), 1);
        tbody.innerHTML = "";

        for (let i = 0; i < maxRows; i++) {
            const tr = document.createElement("tr");

            columns.forEach((col) => {
                const td = document.createElement("td");
                td.textContent = col[i] || "";
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        }
    }

    function loadStaffing() {
        fetch(`/api/deputies?date=${dateInput.value}`)
            .then(res => res.json())
            .then(buildDynamicTable);
    }

    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
    loadStaffing();

    dateInput.addEventListener("change", loadStaffing);
});
</script>

</body>
</html>
