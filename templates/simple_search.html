<!DOCTYPE html>
<html>
<head>
    <title>Simple Court Assignment Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div class="top-controls">
    <h2>Court Assignments <span id="overallAssignmentCounts" class="counts-inline"></span> <label class="simple-view-toggle"><input type="checkbox" id="simpleViewToggle" checked> Simple View</label></h2>

    <input type="text" id="name" placeholder="Search by Name">
    <input type="date" id="date">

    <select id="courthouse">
        <option value="">All Courthouses</option>
        <option value="Mitchell">Mitchell</option>
        <option value="Cummings">Cummings</option>
        <option value="Juvenile">Juvenile</option>
    </select>

    <button onclick="searchSimple()">Search</button>
    <button onclick="window.location.href='/'">Main View</button>
</div>

<br><br>

<div id="assignmentRosterLayout">
    <div id="assignmentsPanel">
        <div id="resultsGrid">
            <div id="postsRow" class="section-row"></div>
            <div id="courtroomsRow" class="section-row"></div>
            <div id="overtimeRow" class="section-row"></div>
            <div id="juvTopRow" class="section-row"></div>
            <div id="juvBottomRow" class="section-row"></div>
        </div>
    </div>
    <div id="rosterPanel">
        <h3>Court Security Roster</h3>
        <label>
            <input type="checkbox" id="showFullRoster">
            Show Full Roster
        </label>
        <div id="rosterList"></div>
    </div>
</div>

<script>
const MITCHELL_POSTS = [
    { post: "Calvert", detail: "8:00 AM", part: "0800-1" },
    { post: "Calvert", detail: "8:00 AM", part: "0800-2" },
    { post: "Calvert", detail: "8:00 AM", part: "0800-3" },
    { post: "Lexington", detail: "7:00 AM - 3:00 PM", part: "0700-1500" },
    { post: "Lexington", detail: "3:00 PM - 11:00 PM", part: "1500-2300" },
    { post: "Lexington", detail: "11:00 PM - 7:00 AM", part: "2300-0700" },
    { post: "Fayette H/C Console room", detail: "7:00 AM", part: "0700" },
    { post: "Fayette H/C Console room", detail: "7:15 AM", part: "0715" },
    { post: "Lock Up West", detail: "1 of 2", part: "OPEN-1" },
    { post: "Lock Up West", detail: "2 of 2", part: "OPEN-2" },
    { post: "Jury Room", detail: "7:30 AM", part: "0730" },
    { post: "St. Paul", detail: "7:30 AM", part: "0730" },
    { post: "St. Paul", detail: "8:30 AM", part: "0830" },
    { post: "Rover", detail: "7:00 AM", part: "0700" },
    { post: "Judges", detail: "7:00 AM", part: "0700" }
];

const CUMMINGS_POSTS = [
    { post: "Cummings", detail: "8:00 AM", part: "0800" },
    { post: "Cummings", detail: "8:30 AM", part: "0830-1" },
    { post: "Cummings", detail: "8:30 AM", part: "0830-2" },
    { post: "Fayette St. H/C", detail: "7:15 AM", part: "0715" },
    { post: "Fayette St. H/C", detail: "9:00 AM", part: "0900" },
    { post: "Console Room", detail: "8:30 AM", part: "0830-1" },
    { post: "Console Room", detail: "8:30 AM", part: "0830-2" },
    { post: "Lock Up East", detail: "8:00 AM", part: "0800" },
    { post: "Garage", detail: "6:00 AM", part: "0600" },
    { post: "Garage", detail: "4:00 PM", part: "1600" },
    { post: "Family Court", detail: "8:00 AM", part: "0800" },
    { post: "Transportation", detail: "", part: "" }
];

const MITCHELL_ROOMS = ["600M", "636M","231M","417M","556C","215M","441M","309M","228C","226M","420M","400M","236M","203M","451M","438M"];
const CUMMINGS_ROOMS = ["225C","201C","430C","329C","230C","227C","540C","404C","523C","528C","113C"];
const JUVENILE_ROOMS = ["329C","428M","406M"];
const TRANSPORT_COUNTIES = ['Baltimore County', 'Anne Arundel County', 'Howard County', 'Carroll County'];

let allDeputies = [];
let latestRows = [];

function formatCountMetrics(vacant, filled, open = 0) {
    return `<span class="metric-red">Vacant ${vacant}</span> / <span class="metric-green">Filled ${filled}</span> / <span class="metric-purple">Open ${open}</span>`;
}

function normalizeCourtroomAssignmentLabel(value) {
    return (value || '').trim().toUpperCase();
}

function getSlotState(assignmentType, assignmentLabel, hasAssignedMember) {
    const type = (assignmentType || '').trim();

    if (type === 'Fixed Post') {
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    if (type === 'Courtroom') {
        const normalized = normalizeCourtroomAssignmentLabel(assignmentLabel);
        if (!normalized || normalized === 'DNS') return 'inactive';
        if (normalized === 'OPEN') return 'open';
        return hasAssignedMember ? 'filled' : 'vacant';
    }

    return 'inactive';
}

function buildSimpleViewUrl(pathname) {
    const params = new URLSearchParams();
    const date = document.getElementById("date")?.value || "";
    const courthouse = document.getElementById("courthouse")?.value || "";
    const name = document.getElementById("name")?.value || "";
    if (date) params.set("date", date);
    if (courthouse) params.set("courthouse", courthouse);
    if (name) params.set("name", name);
    const query = params.toString();
    return query ? `${pathname}?${query}` : pathname;
}

function pickPreferredRow(rows) {
    return rows.find(r => (r.assigned_member || '').trim()) || rows[0] || null;
}

function parseAssignedNames(value) {
    const text = (value || '').trim();
    if (!text) return [];
    if (text.includes('||')) return text.split(/\s*\|\|\s*/).filter(Boolean);
    if (text.includes('\n')) return text.split(/\n+/).map(v => v.trim()).filter(Boolean);
    return [text];
}

function getStats(rows) {
    const stats = { vacant: 0, filled: 0, open: 0, total: 0 };
    rows.forEach(row => {
        const slotState = getSlotState(row.assignment_type, row.assignment_notes || '', !!(row.assigned_member || '').trim());
        if (slotState === 'inactive') return;
        stats.total += 1;
        if (slotState === 'vacant') stats.vacant += 1;
        if (slotState === 'filled') stats.filled += 1;
        if (slotState === 'open') stats.open += 1;
    });
    return stats;
}

function renderPostTable(courthouse, rows) {
    const postSlots = courthouse === 'Mitchell' ? MITCHELL_POSTS : CUMMINGS_POSTS;
    const postRows = rows.filter(r => r.assignment_type === 'Fixed Post');

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Post</th><th>Shift</th><th>Deputy</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    const countRows = [];
    postSlots.forEach((slot, index) => {
        const slotMatches = postRows.filter(r =>
            r.location_group === slot.post && (
                (slot.part && r.part === slot.part) ||
                (slot.detail && r.location_detail === slot.detail) ||
                (!slot.part && !slot.detail)
            )
        );
        const fallbackMatches = postRows.filter(r => r.location_group === slot.post && !r.part && !r.location_detail);
        const assigned = pickPreferredRow(slotMatches) || pickPreferredRow(fallbackMatches);
        countRows.push({
            assignment_type: 'Fixed Post',
            assignment_notes: '',
            assigned_member: assigned ? (assigned.assigned_member || '') : ''
        });

        const tr = document.createElement('tr');
        const showPost = index === 0 || postSlots[index - 1].post !== slot.post;
        tr.innerHTML = `<td>${showPost ? slot.post : ''}</td><td>${slot.detail || ''}</td><td>${assigned ? (assigned.assigned_member || '') : ''}</td>`;
        tbody.appendChild(tr);
    });

    return { table, stats: getStats(countRows) };
}

function buildCourtroomAssignmentText(row) {
    const assignmentText = (row?.assignment_notes || '').trim();
    const isHighProfile = !!row?.is_high_profile;
    if (isHighProfile && assignmentText) return `${assignmentText} / High Profile`;
    if (isHighProfile) return 'High Profile';
    return assignmentText;
}

function renderCourtroomTable(courthouse, rows) {
    const rooms = courthouse === 'Mitchell' ? MITCHELL_ROOMS : courthouse === 'Cummings' ? CUMMINGS_ROOMS : JUVENILE_ROOMS;
    const courtRows = rows.filter(r => r.assignment_type === 'Courtroom');

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Judge</th><th>Courtroom</th><th>Assignment</th><th>Deputy</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    const rowsToRender = courthouse === 'Juvenile'
        ? [...courtRows].sort((a, b) => {
            const roomA = (a.location_detail || '').localeCompare(b.location_detail || '');
            if (roomA !== 0) return roomA;
            return (a.part || '').localeCompare(b.part || '');
        })
        : rooms.map(room => courtRows.find(r => r.location_detail === room) || { location_detail: room });

    const countRows = [];
    rowsToRender.forEach(row => {
        const room = row.location_detail || '';
        countRows.push({
            assignment_type: 'Courtroom',
            assignment_notes: row ? (row.assignment_notes || '') : '',
            assigned_member: row ? (row.assigned_member || '') : ''
        });

        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row ? (row.judge_name || '') : ''}</td><td>${room}${row && row.part ? '/' + row.part : ''}</td><td>${buildCourtroomAssignmentText(row)}</td><td>${row ? (row.assigned_member || '') : ''}</td>`;
        tbody.appendChild(tr);
    });

    return { table, stats: getStats(countRows) };
}

function renderOvertimeTable(rows) {
    const overtimeRows = rows.filter(r => r.assignment_type === 'Overtime');
    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Detail</th><th>Deputy</th><th>Notes</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    overtimeRows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.location_detail || ''}</td><td>${row.assigned_member || ''}</td><td>${row.assignment_notes || ''}</td>`;
        tbody.appendChild(tr);
    });

    if (overtimeRows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="3">No overtime details.</td>`;
        tbody.appendChild(tr);
    }

    return { table, stats: getStats(overtimeRows) };
}

function createSectionCell(title, contentEl, countHtml = '') {
    const cell = document.createElement('div');
    cell.className = 'section-cell';
    const h3 = document.createElement('h3');
    h3.innerHTML = countHtml ? `${title} <span class="counts-inline">${countHtml}</span>` : title;
    cell.appendChild(h3);
    if (contentEl) cell.appendChild(contentEl);
    return cell;
}

function createEmptySectionCell() {
    const cell = document.createElement('div');
    cell.className = 'section-cell';
    return cell;
}

function renderTransportPanel(grouped) {
    const panel = document.createElement('div');
    panel.id = 'transportPanel';
    panel.className = 'section-cell';

    const h = document.createElement('h3');
    h.textContent = 'Transport Detail';
    panel.appendChild(h);

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Deputy</th><th>County</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    const transportRows = grouped['Transport'] || [];
    const mapped = transportRows.length > 0
        ? transportRows.filter(r => r.assignment_type === 'Transport').map(r => ({ county: r.location_detail || '', deputy: r.assigned_member || '' }))
        : TRANSPORT_COUNTIES.map(c => ({ county: c, deputy: '' }));

    mapped.forEach(entry => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${entry.deputy || ''}</td><td>${entry.county}</td>`;
        tbody.appendChild(tr);
    });

    panel.appendChild(table);
    return panel;
}

function formatBorrowedCourthouse(courthouse) {
    const normalized = (courthouse || '').trim().toLowerCase();
    if (normalized === 'juvenile') return 'Juv';
    if (normalized === 'mitchell') return 'Mitchell';
    if (normalized === 'cummings') return 'Cummings';
    if (normalized === 'transport') return 'Transport';
    return courthouse || '';
}

function isCourtSecurityDeputy(deputy) {
    const division = (deputy.division || '').trim().toLowerCase();
    const capacityTag = (deputy.capacity_tag || '').trim().toLowerCase();
    return division === 'court security' || division === 'court security division' || capacityTag.includes('court security') || capacityTag.includes('cso');
}

function getDeputyByName(name) {
    const n = (name || '').trim().toLowerCase();
    return allDeputies.find(d => (d.full_name || '').trim().toLowerCase() === n) || null;
}

function renderBorrowedPanel(allRows) {
    const panel = document.createElement('div');
    panel.id = 'borrowedDeputiesPanel';
    panel.className = 'section-cell';

    const h = document.createElement('h3');
    h.textContent = 'Borrowed Deputies';
    panel.appendChild(h);

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Deputy</th><th>Division</th><th>Courthouse</th><th>Location</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    const rows = [];
    allRows.filter(r => ['Courtroom', 'Fixed Post', 'Overtime', 'Transport'].includes(r.assignment_type)).forEach(r => {
        parseAssignedNames(r.assigned_member).forEach(name => {
            const deputy = getDeputyByName(name);
            if (!deputy || isCourtSecurityDeputy(deputy)) return;
            const location = r.assignment_type === 'Courtroom'
                ? `${r.location_detail || '-'}${r.part ? '/' + r.part : ''}`
                : r.assignment_type === 'Overtime'
                    ? `${r.location_detail || '-'} / ${r.shift_time || 'Time TBD'}`
                    : (r.location_group || r.location_detail || '-');

            rows.push({
                deputy: name,
                division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                courthouse: formatBorrowedCourthouse(r.courthouse),
                location
            });
        });
    });

    rows.sort((a, b) => a.deputy.localeCompare(b.deputy));
    if (rows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="4">No borrowed deputies assigned.</td>';
        tbody.appendChild(tr);
    } else {
        rows.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.deputy}</td><td>${item.division}</td><td>${item.courthouse}</td><td>${item.location}</td>`;
            tbody.appendChild(tr);
        });
    }

    panel.appendChild(table);
    return panel;
}

function getPostedNameSetForSimpleView() {
    const names = new Set();
    latestRows
        .filter(r => ['Courtroom', 'Fixed Post', 'Overtime', 'Transport'].includes(r.assignment_type))
        .forEach(r => parseAssignedNames(r.assigned_member).forEach(name => names.add(name.trim())));
    return names;
}

function parseDateOnly(value) {
    if (!value) return null;
    const d = new Date(`${value}T00:00:00`);
    return Number.isNaN(d.getTime()) ? null : d;
}

function effectiveStatusForSearchDate(deputy) {
    const selectedDate = parseDateOnly(document.getElementById('date').value);

    try {
        const raw = deputy.status_raw;
        const parsed = raw ? JSON.parse(raw) : null;
        const ranges = parsed && Array.isArray(parsed.ranges) ? parsed.ranges : [];
        const weeklyUnavailable = parsed && Array.isArray(parsed.weekly_unavailable) ? parsed.weekly_unavailable : [];
        const active = [];

        if (selectedDate) {
            ranges.forEach(entry => {
                const start = parseDateOnly(entry.start_date);
                const end = parseDateOnly(entry.end_date);
                if (start && end && selectedDate >= start && selectedDate <= end) {
                    const status = (entry.status || '').toLowerCase();
                    if (status && !active.includes(status)) active.push(status);
                }
            });

            const weekday = selectedDate.toLocaleDateString('en-US', { weekday: 'long' });
            weeklyUnavailable.forEach(rule => {
                const day = (rule?.day || '').trim();
                const ruleEnd = parseDateOnly(rule?.end_date);
                if (!day || !ruleEnd) return;
                if (selectedDate <= ruleEnd && (day === 'Any Day' || day === weekday)) {
                    if (!active.includes('unavailable')) active.push('unavailable');
                }
            });

            if (active.length > 0) return active.join(' / ');
        }

        if (parsed && parsed.legacy) return parsed.legacy.toLowerCase();
    } catch (_) {}

    return (deputy.current_status || '').trim().toLowerCase();
}

function isDeputyAvailable(deputy) {
    const status = effectiveStatusForSearchDate(deputy);
    if (!status) return true;
    return !status.includes('leave')
        && !status.includes('sick')
        && !status.includes('light duty')
        && !status.includes('unscheduled')
        && !status.includes('unavailable');
}

function renderRoster() {
    const rosterList = document.getElementById('rosterList');
    const showFullRoster = document.getElementById('showFullRoster').checked;
    const postedNames = getPostedNameSetForSimpleView();

    rosterList.innerHTML = '';
    rosterList.classList.toggle('roster-two-column', showFullRoster);

    const courtColumn = document.createElement('div');
    courtColumn.className = 'roster-column';

    const courtHeading = document.createElement('h4');
    courtHeading.className = 'roster-section-title';

    const courtSecurityAll = allDeputies.filter(isCourtSecurityDeputy);
    const outCount = courtSecurityAll.filter(dep => !isDeputyAvailable(dep)).length;
    const postedCount = courtSecurityAll.filter(dep => postedNames.has((dep.full_name || '').trim())).length;
    const availableCount = Math.max(courtSecurityAll.filter(dep => isDeputyAvailable(dep)).length - postedCount, 0);

    courtHeading.innerHTML = `Court Security <span class="counts-inline"><span class="metric-red">Out ${outCount}</span> / <span class="metric-green">Available ${availableCount}</span> / <span class="metric-blue">Posted ${postedCount}</span></span>`;
    courtColumn.appendChild(courtHeading);

    const courtList = document.createElement('div');
    const courtSecurityAvailable = courtSecurityAll.filter(isDeputyAvailable).sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
    courtSecurityAvailable.forEach(dep => {
        const item = document.createElement('div');
        item.className = 'roster-item';
        const name = (dep.full_name || '').trim();
        item.textContent = `${name} (${dep.capacity_tag || ''})`;
        if (postedNames.has(name)) item.classList.add('assigned');
        courtList.appendChild(item);
    });
    courtColumn.appendChild(courtList);
    rosterList.appendChild(courtColumn);

    if (showFullRoster) {
        const fullColumn = document.createElement('div');
        fullColumn.className = 'roster-column';

        const fullHeading = document.createElement('h4');
        fullHeading.className = 'roster-section-title';
        fullHeading.textContent = 'Full Roster';
        fullColumn.appendChild(fullHeading);

        const fullList = document.createElement('div');
        const nonCourt = allDeputies
            .filter(dep => !isCourtSecurityDeputy(dep))
            .sort((a, b) => {
                const da = (a.division || 'Unassigned Division').trim().toLowerCase();
                const db = (b.division || 'Unassigned Division').trim().toLowerCase();
                if (da !== db) return da.localeCompare(db);
                return (a.full_name || '').localeCompare(b.full_name || '');
            });

        let currentDivision = null;
        nonCourt.forEach(dep => {
            const division = (dep.division || 'Unassigned Division').trim() || 'Unassigned Division';
            if (division !== currentDivision) {
                const h = document.createElement('h5');
                h.className = 'roster-section-title';
                const divisionPosted = nonCourt.filter(d => ((d.division || 'Unassigned Division').trim() || 'Unassigned Division') === division && postedNames.has((d.full_name || '').trim())).length;
                h.innerHTML = `${division} <span class="counts-inline metric-blue">Posted ${divisionPosted}</span>`;
                fullList.appendChild(h);
                currentDivision = division;
            }

            const item = document.createElement('div');
            item.className = 'roster-item';
            const name = (dep.full_name || '').trim();
            item.textContent = `${name} (${dep.capacity_tag || ''})`;
            if (postedNames.has(name)) item.classList.add('assigned');
            fullList.appendChild(item);
        });

        fullColumn.appendChild(fullList);
        rosterList.appendChild(fullColumn);
    }
}


function searchSimple() {
    const name = document.getElementById('name').value;
    const date = document.getElementById('date').value;
    const courthouse = document.getElementById('courthouse').value;
    localStorage.setItem('searchPageDate', date || '');

    Promise.all([
        fetch(`/api/search?name=${encodeURIComponent(name)}&date=${date}&courthouse=${courthouse}`, { cache: 'no-store' }).then(res => res.json()),
        fetch(`/api/deputies?date=${date}`, { cache: 'no-store' }).then(res => res.json())
    ]).then(([rows, deputies]) => {
        latestRows = rows || [];
        allDeputies = deputies || [];

        const grouped = {};
        latestRows.forEach(row => {
            if (!grouped[row.courthouse]) grouped[row.courthouse] = [];
            grouped[row.courthouse].push(row);
        });

        const postsRow = document.getElementById('postsRow');
        const courtroomsRow = document.getElementById('courtroomsRow');
        const overtimeRow = document.getElementById('overtimeRow');
        const juvTopRow = document.getElementById('juvTopRow');
        const juvBottomRow = document.getElementById('juvBottomRow');
        postsRow.innerHTML = '';
        courtroomsRow.innerHTML = '';
        overtimeRow.innerHTML = '';
        juvTopRow.innerHTML = '';
        juvBottomRow.innerHTML = '';

        const mitchellPosts = renderPostTable('Mitchell', grouped['Mitchell'] || []);
        const cummingsPosts = renderPostTable('Cummings', grouped['Cummings'] || []);
        const mitchellCourt = renderCourtroomTable('Mitchell', grouped['Mitchell'] || []);
        const cummingsCourt = renderCourtroomTable('Cummings', grouped['Cummings'] || []);
        const mitchellOt = renderOvertimeTable(grouped['Mitchell'] || []);
        const cummingsOt = renderOvertimeTable(grouped['Cummings'] || []);
        const juvCourt = renderCourtroomTable('Juvenile', grouped['Juvenile'] || []);
        const juvOt = renderOvertimeTable(grouped['Juvenile'] || []);

        const mitchellTotal = {
            total: mitchellPosts.stats.total + mitchellCourt.stats.total + mitchellOt.stats.total,
            vacant: mitchellPosts.stats.vacant + mitchellCourt.stats.vacant + mitchellOt.stats.vacant,
            filled: mitchellPosts.stats.filled + mitchellCourt.stats.filled + mitchellOt.stats.filled,
            open: mitchellPosts.stats.open + mitchellCourt.stats.open + mitchellOt.stats.open
        };
        const cummingsTotal = {
            total: cummingsPosts.stats.total + cummingsCourt.stats.total + cummingsOt.stats.total,
            vacant: cummingsPosts.stats.vacant + cummingsCourt.stats.vacant + cummingsOt.stats.vacant,
            filled: cummingsPosts.stats.filled + cummingsCourt.stats.filled + cummingsOt.stats.filled,
            open: cummingsPosts.stats.open + cummingsCourt.stats.open + cummingsOt.stats.open
        };
        const juvenileTotal = {
            total: juvCourt.stats.total + juvOt.stats.total,
            vacant: juvCourt.stats.vacant + juvOt.stats.vacant,
            filled: juvCourt.stats.filled + juvOt.stats.filled,
            open: juvCourt.stats.open + juvOt.stats.open
        };

        const mitchellPostCell = createSectionCell('Mitchell', mitchellPosts.table, formatCountMetrics(mitchellTotal.vacant, mitchellTotal.filled, mitchellTotal.open));
        const mitchellPostHeader = document.createElement('h4');
        mitchellPostHeader.textContent = 'Security Post';
        mitchellPostCell.insertBefore(mitchellPostHeader, mitchellPosts.table);

        const cummingsPostCell = createSectionCell('Cummings', cummingsPosts.table, formatCountMetrics(cummingsTotal.vacant, cummingsTotal.filled, cummingsTotal.open));
        const cummingsPostHeader = document.createElement('h4');
        cummingsPostHeader.textContent = 'Security Post';
        cummingsPostCell.insertBefore(cummingsPostHeader, cummingsPosts.table);

        postsRow.appendChild(mitchellPostCell);
        postsRow.appendChild(cummingsPostCell);

        courtroomsRow.appendChild(createSectionCell('Courtroom', mitchellCourt.table));
        courtroomsRow.appendChild(createSectionCell('Courtroom', cummingsCourt.table));

        overtimeRow.appendChild(createSectionCell('Overtime', mitchellOt.table));
        overtimeRow.appendChild(createSectionCell('Overtime', cummingsOt.table));

        juvTopRow.appendChild(createSectionCell('Juvenile', juvCourt.table, formatCountMetrics(juvenileTotal.vacant, juvenileTotal.filled, juvenileTotal.open)));
        juvTopRow.appendChild(createSectionCell('Transport Detail', renderTransportPanel(grouped).querySelector('table')));

        juvBottomRow.appendChild(createSectionCell('Juvenile Overtime', juvOt.table));
        juvBottomRow.appendChild(createSectionCell('Borrowed Deputies', renderBorrowedPanel(latestRows).querySelector('table')));

        const overallVacant = mitchellTotal.vacant + cummingsTotal.vacant + juvenileTotal.vacant;
        const overallFilled = mitchellTotal.filled + cummingsTotal.filled + juvenileTotal.filled;
        const overallOpen = mitchellTotal.open + cummingsTotal.open + juvenileTotal.open;
        document.getElementById('overallAssignmentCounts').innerHTML = formatCountMetrics(overallVacant, overallFilled, overallOpen);

        renderRoster();
    });
}

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const today = (() => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; })();
    const savedDate = localStorage.getItem('searchPageDate');

    document.getElementById('date').value = urlParams.get('date') || savedDate || today;
    document.getElementById('courthouse').value = urlParams.get('courthouse') || '';
    document.getElementById('name').value = urlParams.get('name') || '';

    document.getElementById('date').addEventListener('change', searchSimple);
    document.getElementById('courthouse').addEventListener('change', searchSimple);
    document.getElementById('showFullRoster').addEventListener('change', renderRoster);
    document.getElementById('simpleViewToggle').addEventListener('change', function() {
        if (!this.checked) window.location.href = buildSimpleViewUrl('/');
    });

    searchSimple();
};
</script>
</body>
</html>
