function normalizeOtPostName(value) {
    return (value || '').toString().trim().toLowerCase().replace(/\s+/g, ' ');
}

function normalizeOtPostToken(value) {
    return (value || '').toString().trim().toLowerCase().replace(/[^a-z0-9]+/g, '');
}

function isMitchellFixedPostOtRow(row) {
    const type = (row?.assignment_type || '').trim();
    const courthouse = (row?.courthouse || '').trim();
    if (type !== 'Fixed Post' || courthouse !== 'Mitchell') return false;

    const normalizedPost = normalizeOtPostName(row?.location_group || '');
    const normalizedPart = (row?.part || '').toString().trim().toLowerCase();
    if ((normalizedPost === 'rover' || normalizedPost === 'rover ot') && normalizedPart === '1630-1900') return true;
    if ((normalizedPost === 'judges' || normalizedPost === 'judges ot') && normalizedPart === '0700') return true;

    const textBlob = [
        row?.location_group || '',
        row?.location_detail || '',
        row?.part || '',
        row?.assignment_notes || ''
    ].join(' ');
    const token = normalizeOtPostToken(textBlob);
    return token.includes('roverot')
        || token.includes('judgesot')
        || (token.includes('rover') && token.includes('ot'))
        || (token.includes('judges') && token.includes('ot'));
}

function parseShiftDurationHours(shiftText) {
    const raw = (shiftText || '').toString().trim();
    if (!raw || !raw.includes('-')) return 0;

    const [startRaw, endRaw] = raw.split('-').map(part => part.trim());
    if (!startRaw || !endRaw) return 0;

    const parseMinutes = (value, fallbackSuffix) => {
        const normalized = value.toUpperCase().replace(/\./g, '').trim();
        const ampmMatch = normalized.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)$/);
        if (ampmMatch) {
            let hour = Number(ampmMatch[1]) % 12;
            const minute = Number(ampmMatch[2] || '0');
            if (ampmMatch[3] === 'PM') hour += 12;
            return (hour * 60) + minute;
        }

        const hhmmMatch = normalized.match(/^(\d{1,2})(\d{2})$/);
        if (hhmmMatch) return (Number(hhmmMatch[1]) * 60) + Number(hhmmMatch[2]);

        const compactMatch = normalized.match(/^(\d{1,2})(?::(\d{2}))?$/);
        if (compactMatch && fallbackSuffix) {
            let hour = Number(compactMatch[1]) % 12;
            const minute = Number(compactMatch[2] || '0');
            if (fallbackSuffix === 'PM') hour += 12;
            return (hour * 60) + minute;
        }

        return null;
    };

    const endSuffix = endRaw.toUpperCase().match(/\b(AM|PM)\b/)?.[1] || null;
    const startSuffix = startRaw.toUpperCase().match(/\b(AM|PM)\b/)?.[1] || null;
    const startMins = parseMinutes(startRaw, startSuffix || endSuffix);
    const endMins = parseMinutes(endRaw, endSuffix || startSuffix);
    if (startMins === null || endMins === null) return 0;

    let diff = endMins - startMins;
    if (diff < 0) diff += 24 * 60;
    return diff / 60;
}

function getTotalOvertimeHours(rows) {
    return (rows || []).reduce((total, row) => {
        const type = (row.assignment_type || '').trim();
        const courthouse = (row.courthouse || '').trim();
        const isMitchellFixedOt = isMitchellFixedPostOtRow(row);
        const isOvertimeTableRow = type === 'Overtime' && ['Mitchell', 'Cummings', 'Juvenile'].includes(courthouse);

        if (!isMitchellFixedOt && !isOvertimeTableRow) return total;
        if (!(row.assigned_member || '').trim()) return total;

        return total + parseShiftDurationHours(row.shift_time || row.location_detail || row.part || '');
    }, 0);
}

function updateTotalOtHoursBadge(rows) {
    const badge = document.getElementById('totalOtHoursBadge');
    if (!badge) return;
    badge.textContent = `OT Hours ${getTotalOvertimeHours(rows).toFixed(2)}`;
}

function getAssignmentDedupeKey(row = {}) {
    const assignmentType = (row.assignment_type || '').trim();
    const courthouse = (row.courthouse || '').trim();
    const locationGroup = (row.location_group || '').trim();
    const locationDetail = (row.location_detail || '').trim();
    const part = (row.part || '').toString().trim().toUpperCase().replace(/^PART\s+/, '');
    const shift = (row.shift_time || '').trim();

    if (assignmentType === 'Courtroom') {
        return `${courthouse}|${assignmentType}|${locationDetail}|${part}`;
    }

    return `${courthouse}|${assignmentType}|${locationGroup}|${locationDetail}|${part}|${shift}`;
}

function scoreAssignmentRow(row = {}) {
    const assigned = (row.assigned_member || '').trim();
    const notes = (row.assignment_notes || '').trim();
    const highProfile = row.is_high_profile ? 1 : 0;
    return (assigned ? 4 : 0) + (notes ? 2 : 0) + highProfile;
}

function dedupeAssignmentRows(rows = []) {
    const byKey = new Map();

    rows.forEach(row => {
        const key = getAssignmentDedupeKey(row);
        const existing = byKey.get(key);
        if (!existing || scoreAssignmentRow(row) > scoreAssignmentRow(existing)) {
            byKey.set(key, row);
        }
    });

    return Array.from(byKey.values());
}

function formatJudgeDisplayName(judgeName) {
    const raw = (judgeName || '').trim();
    if (!raw) return '';

    const commaMatch = raw.match(/^([^,]+),\s*(.+)$/);
    if (commaMatch) {
        const last = commaMatch[1].trim();
        const firstToken = commaMatch[2].trim().split(/\s+/)[0] || '';
        const initial = firstToken.replace(/[^A-Za-z]/g, '').charAt(0);
        return initial ? `${last}, ${initial}.` : last;
    }

    const parts = raw.split(/\s+/);
    if (parts.length >= 2) {
        const firstToken = parts[0];
        const last = parts.slice(1).join(' ');
        const initial = firstToken.replace(/[^A-Za-z]/g, '').charAt(0);
        if (initial && last) {
            return `${last}, ${initial}.`;
        }
    }

    return raw;
}

function getJudgeLastNameSortKey(judgeName) {
    const raw = (judgeName || '').trim();
    if (!raw) return 'zzzzzz';

    const commaMatch = raw.match(/^([^,]+),\s*(.+)$/);
    if (commaMatch) {
        return commaMatch[1].trim().toUpperCase();
    }

    const parts = raw.split(/\s+/).filter(Boolean);
    if (!parts.length) return 'zzzzzz';
    return parts[parts.length - 1].toUpperCase();
}

function formatCountMetrics(vacant, filled, open) {
    return `<span class="metric-red">Vacant ${vacant}</span> / <span class="metric-green">Filled ${filled}</span> / <span class="metric-blue">Open ${open}</span>`;
}

function normalizeCourtroomAssignmentLabel(value) {
    return (value || '').trim().toUpperCase();
}

function isOpenCourtLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    return normalized === 'OPEN' || normalized.startsWith('OPEN-') || normalized === 'WAITING TO RECEIVE CASE';
}

function isOpenAssignedMember(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    return normalized === 'OPEN' || normalized.startsWith('OPEN-') || normalized === 'WAITING TO RECEIVE CASE';
}

function isInactiveCourtLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    return getRequiredDeputiesForCourtroomLabel(normalized) === 0;
}

function getRequiredDeputiesForCourtroomLabel(value) {
    const normalized = normalizeCourtroomAssignmentLabel(value);
    if (!normalized) return 0;

    if ([
        'CLOSED',
        'NO DEPUTY',
        'NO DEPUTIES',
        'CIVIL - NO DEPUTIES',
        'ON LEAVE'
    ].includes(normalized)) {
        return 0;
    }

    if (normalized === 'NEED 2 DEPUTIES') {
        return 2;
    }

    if ([
        'NEED 1 DEPUTY',
        'CIVIL - 1 DEPUTY',
        'JUVENILE',
        'FAMILY',
        'OPEN'
    ].includes(normalized) || normalized.startsWith('OPEN-')) {
        return 1;
    }

    return 1;
}

function getFixedPostRequirementGroup(slotMeta = {}) {
    const courthouse = (slotMeta.courthouse || '').trim().toLowerCase();
    const post = (slotMeta.post || '').trim().toLowerCase();
    const detail = (slotMeta.detail || '').trim().toLowerCase();
    const part = (slotMeta.part || '').trim().toLowerCase();

    if (post === 'transportation') return null;
    if (courthouse === 'mitchell' && post === 'calvert' && part === '0800-3') return null;

    // Jury Room + St. Paul combine into a single armed requirement.
    if (courthouse === 'mitchell' && (post === 'jury room' || post === 'st. paul')) return `${courthouse}|jury-stpaul-combined`;

    // Cummings requires only the 8:00 armed slot; 8:30 slots are optional for this metric.
    if (courthouse === 'cummings' && post === 'cummings') {
        if (part === '0800') return `${courthouse}|cummings-0800`;
        if (part.startsWith('0830')) return null;
    }

    return [courthouse, post, detail, part].join('|');
}

function buildSimpleViewUrl(pathname) {
    const params = new URLSearchParams();
    const date = document.getElementById("date")?.value || "";
    const courthouse = document.getElementById("courthouse")?.value || "";
    const name = document.getElementById("name")?.value || "";
    if (date) params.set("date", date);
    if (courthouse) params.set("courthouse", courthouse);
    if (name) params.set("name", name);
    const query = params.toString();
    return query ? `${pathname}?${query}` : pathname;
}

function pickPreferredRow(rows) {
    return rows.find(r => (r.assigned_member || '').trim()) || rows[0] || null;
}


function isSecurityPostAssignmentType(value) {
    const normalized = (value || '').trim().toLowerCase();
    return normalized === 'fixed post' || normalized === 'security post';
}

function isPlaceholderAssignment(value) {
    const normalized = (value || '').trim().toUpperCase();
    return normalized === 'OPEN' || normalized.startsWith('OPEN-') || ['VACANT', 'UNASSIGNED', 'TBD'].includes(normalized);
}

function parseAssignedNames(value) {
    const text = (value || '').trim();
    if (!text || isPlaceholderAssignment(text)) return [];
    if (text.includes('||')) return text.split(/\s*\|\|\s*/).map(v => v.trim()).filter(v => v && !isPlaceholderAssignment(v));
    if (text.includes('\n')) return text.split(/\n+/).map(v => v.trim()).filter(v => v && !isPlaceholderAssignment(v));
    return [text];
}


function getStats(rows) {
    const stats = { vacant: 0, filled: 0, open: 0, total: 0 };

    rows.forEach(row => {
        const assignmentType = (row.assignment_type || '').trim();
        const assignedCount = parseAssignedNames(row.assigned_member || '').length;

        if (isSecurityPostAssignmentType(assignmentType)) {
            const courthouse = (row.courthouse || '').trim().toLowerCase();
            const post = (row.location_group || '').trim().toLowerCase();
            const part = (row.part || '').trim().toLowerCase();

            if (courthouse === 'mitchell' && post === 'calvert' && part === '0800-3') return;
            if (courthouse === 'cummings' && post === 'cummings' && part === '0830-2') return;
            if (courthouse === 'cummings' && post === 'transportation') return;

            if (assignedCount > 0) stats.filled += 1;
            else stats.vacant += 1;
            stats.total += 1;
            return;
        }

        if (assignmentType === 'Courtroom') {
            const normalized = normalizeCourtroomAssignmentLabel(row.assignment_notes || '');
            if (isInactiveCourtLabel(normalized)) return;

            if (isOpenCourtLabel(normalized)) {
                stats.open += 1;
                stats.total += 1;
                return;
            }

            const requiredDeputies = getRequiredDeputiesForCourtroomLabel(normalized);
            if (requiredDeputies <= 0) return;

            stats.filled += Math.min(assignedCount, requiredDeputies);
            stats.vacant += Math.max(requiredDeputies - assignedCount, 0);
            stats.total += requiredDeputies;
        }
    });

    return stats;
}

function renderPostTable(courthouse, rows) {
    const postSlots = courthouse === 'Mitchell' ? MITCHELL_POSTS : CUMMINGS_POSTS;
    const postRows = rows.filter(r => isSecurityPostAssignmentType(r.assignment_type));

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Post</th><th>Shift</th><th>Deputy</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    const countRows = [];
    postSlots.forEach((slot, index) => {
        const slotMatches = postRows.filter(r =>
            r.location_group === slot.post && (
                (slot.part && r.part === slot.part) ||
                (slot.detail && r.location_detail === slot.detail) ||
                (!slot.part && !slot.detail)
            )
        );
        const fallbackMatches = postRows.filter(r => r.location_group === slot.post && !r.part && !r.location_detail);
        const assigned = pickPreferredRow(slotMatches) || pickPreferredRow(fallbackMatches);
        countRows.push({
            assignment_type: 'Fixed Post',
            assignment_notes: '',
            assigned_member: assigned ? (assigned.assigned_member || '') : '',
            courthouse,
            location_group: slot.post,
            part: slot.part || ''
        });

        const tr = document.createElement('tr');
        const showPost = index === 0 || postSlots[index - 1].post !== slot.post;
        tr.innerHTML = `<td>${showPost ? slot.post : ''}</td><td>${slot.detail || ''}</td><td>${assigned ? (assigned.assigned_member || '') : ''}</td>`;
        tbody.appendChild(tr);
    });

    return { table, stats: getStats(countRows) };
}

function buildCourtroomAssignmentText(row) {
    const assignmentText = (row?.assignment_notes || '').trim();
    const isHighProfile = !!row?.is_high_profile;
    if (isHighProfile && assignmentText) return `${assignmentText} / <span class="high-profile-flag">High Profile</span>`;
    if (isHighProfile) return '<span class="high-profile-flag">High Profile</span>';
    return assignmentText;
}

function renderCourtroomTable(courthouse, rows) {
    const rooms = courthouse === 'Mitchell'
        ? MITCHELL_ROOMS
        : courthouse === 'Cummings'
            ? CUMMINGS_ROOMS
            : FAMILY_ROOMS;
    const normalizePart = (value) => (value || '').toString().trim().toUpperCase().replace(/^PART\s+/, '');
    let courtRows = rows.filter(r => r.assignment_type === 'Courtroom');

    if (courthouse === 'Cummings') {
        courtRows = courtRows.filter(row => {
            const room = (row.location_detail || '').trim().toUpperCase();
            const part = normalizePart(row.part);
            const judge = (row.judge_name || '').trim().toUpperCase();
            if (judge === 'H. TIPTON' && room === '223C' && part === '6') return false;
            if (judge === 'LAZEROW' && room === '113M' && (part === '04' || part === '4')) return false;
            return true;
        });

        let seenBryant230C5 = false;
        courtRows = courtRows.filter(row => {
            const room = (row.location_detail || '').trim().toUpperCase();
            const part = normalizePart(row.part);
            const judge = (row.judge_name || '').trim().toUpperCase();
            if (judge === 'Y. BRYANT' && room === '230C' && part === '5') {
                if (seenBryant230C5) return false;
                seenBryant230C5 = true;
            }
            return true;
        });
    }

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Judge</th><th>Courtroom</th><th>Assignment</th><th>Deputy</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    const rowsToRender = [...courtRows].sort((a, b) => {
        const roomA = (a.location_detail || '').localeCompare(b.location_detail || '');
        if (roomA !== 0) return roomA;
        return (a.part || '').localeCompare(b.part || '');
    });

    if (courthouse === 'Juvenile') {
        const remaining = [...rowsToRender];
        const juvenileOrdered = [];
        JUVENILE_EXPECTED.forEach(expected => {
            const matchIndex = remaining.findIndex(row =>
                (row.location_detail || '').trim().toUpperCase() === expected.room.toUpperCase()
                && normalizePart(row.part) === normalizePart(expected.part)
            );
            const matched = matchIndex >= 0 ? remaining.splice(matchIndex, 1)[0] : null;
            juvenileOrdered.push({
                ...(matched || {}),
                location_detail: matched?.location_detail || expected.room,
                part: matched?.part || expected.part,
                judge_name: matched?.judge_name || expected.judge_name
            });
        });

        remaining
            .sort((a, b) => {
                const roomCompare = (a.location_detail || '').localeCompare(b.location_detail || '');
                if (roomCompare !== 0) return roomCompare;
                return (a.part || '').localeCompare(b.part || '');
            })
            .forEach(row => juvenileOrdered.push(row));

        rowsToRender.length = 0;
        rowsToRender.push(...juvenileOrdered);
    } else {
        const rowsByRoom = new Map();
        rowsToRender.forEach(row => {
            const key = row.location_detail || '';
            if (!rowsByRoom.has(key)) rowsByRoom.set(key, []);
            rowsByRoom.get(key).push(row);
        });

        const orderedRows = [];
        rooms.forEach(room => {
            const matches = rowsByRoom.get(room) || [];
            if (matches.length) {
                orderedRows.push(...matches);
            } else {
                const defaultRoomMeta = courthouse === 'Family'
                    ? FAMILY_ROOM_DEFAULTS[room]
                    : courthouse === 'Cummings'
                        ? CUMMINGS_ROOM_DEFAULTS[room]
                        : null;
                const defaultRow = defaultRoomMeta
                    ? {
                        location_detail: room,
                        part: defaultRoomMeta.part,
                        judge_name: defaultRoomMeta.judge_name
                    }
                    : { location_detail: room };
                orderedRows.push(defaultRow);
            }
            rowsByRoom.delete(room);
        });

        rowsByRoom.forEach(matches => orderedRows.push(...matches));
        rowsToRender.length = 0;
        rowsToRender.push(...orderedRows);
    }

    rowsToRender.sort((a, b) => {
        const roomA = a.location_detail || '';
        const roomB = b.location_detail || '';
        const roomDefaultsA = courthouse === 'Family'
            ? FAMILY_ROOM_DEFAULTS[roomA]
            : courthouse === 'Cummings'
                ? CUMMINGS_ROOM_DEFAULTS[roomA]
                : null;
        const roomDefaultsB = courthouse === 'Family'
            ? FAMILY_ROOM_DEFAULTS[roomB]
            : courthouse === 'Cummings'
                ? CUMMINGS_ROOM_DEFAULTS[roomB]
                : null;
        const judgeA = a && a.judge_name ? a.judge_name : (roomDefaultsA ? roomDefaultsA.judge_name : '');
        const judgeB = b && b.judge_name ? b.judge_name : (roomDefaultsB ? roomDefaultsB.judge_name : '');

        const judgeCompare = getJudgeLastNameSortKey(judgeA).localeCompare(getJudgeLastNameSortKey(judgeB));
        if (judgeCompare !== 0) return judgeCompare;

        const roomCompare = roomA.localeCompare(roomB);
        if (roomCompare !== 0) return roomCompare;
        return (a.part || '').localeCompare(b.part || '');
    });

    const countRows = [];
    rowsToRender.forEach(row => {
        const room = row.location_detail || '';
        const roomDefaults = courthouse === 'Family'
            ? FAMILY_ROOM_DEFAULTS[room]
            : courthouse === 'Cummings'
                ? CUMMINGS_ROOM_DEFAULTS[room]
                : null;
        const effectivePart = row && row.part ? row.part : (roomDefaults ? roomDefaults.part : '');
        const effectiveJudge = row && row.judge_name ? row.judge_name : (roomDefaults ? roomDefaults.judge_name : '');
        const displayJudge = formatJudgeDisplayName(effectiveJudge);

        countRows.push({
            assignment_type: 'Courtroom',
            assignment_notes: row ? (row.assignment_notes || '') : '',
            assigned_member: row ? (row.assigned_member || '') : ''
        });

        const rowForDisplay = { ...(row || {}), part: effectivePart };
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${displayJudge}</td><td>${room}${effectivePart ? '/' + effectivePart : ''}</td><td>${buildCourtroomAssignmentText(rowForDisplay)}</td><td>${row ? (row.assigned_member || '') : ''}</td>`;
        tbody.appendChild(tr);
    });

    return { table, stats: getStats(countRows) };
}

function renderOvertimeTable(rows) {
    const overtimeRows = rows.filter(r => r.assignment_type === 'Overtime');
    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Detail</th><th>Deputy</th><th>Notes</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    overtimeRows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.location_detail || ''}</td><td>${row.assigned_member || ''}</td><td>${row.assignment_notes || ''}</td>`;
        tbody.appendChild(tr);
    });

    if (overtimeRows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="3">No overtime details.</td>`;
        tbody.appendChild(tr);
    }

    return { table, stats: getStats(overtimeRows) };
}

function createSectionCell(title, contentEl, countHtml = '') {
    const cell = document.createElement('div');
    cell.className = 'section-cell';
    const h3 = document.createElement('h3');
    h3.innerHTML = countHtml ? `${title} <span class="counts-inline">${countHtml}</span>` : title;
    cell.appendChild(h3);
    if (contentEl) cell.appendChild(contentEl);
    return cell;
}

function createCourthouseBox(title, countHtml = '') {
    const box = document.createElement('div');
    box.className = 'courthouse-box';

    const h3 = document.createElement('h3');
    h3.innerHTML = countHtml ? `${title} <span class="counts-inline">${countHtml}</span>` : title;
    box.appendChild(h3);

    return box;
}

function createEmptySectionCell() {
    const cell = document.createElement('div');
    cell.className = 'section-cell';
    return cell;
}

function formatBorrowedCourthouse(courthouse) {
    const normalized = (courthouse || '').trim().toLowerCase();
    if (normalized === 'juvenile') return 'Juv';
    if (normalized === 'mitchell') return 'Mitchell';
    if (normalized === 'cummings') return 'Cummings';
    if (normalized === 'transport') return 'Transport';
    return courthouse || '';
}

function isCourtSecurityDeputy(deputy) {
    const division = (deputy.division || '').trim().toLowerCase();
    return division === 'court security';
}

function normalizeRoleValue(role) {
    return (role || '').toUpperCase().replace(/\s+/g, '').replace(/_/g, '-');
}

const courtSecurityRoleOrder = [
    'DEPUTY',
    'SPO-A: Court Trained (FT)',
    'SPO-A: Court Trained (contractor)',
    'SPO-A: (FT)',
    'SPO-A: (contractor)',
    'SPO: Court Trained(FT)',
    'SPO Court Trained (contractor)',
    'K9',
    'CSO',
    'Cadet'
];

const courtSecurityRoleOrderNormalized = courtSecurityRoleOrder.map(normalizeRoleValue);



function getCourtSecuritySortRank(deputy) {
    const role = (deputy.capacity_tag || deputy.role || '').trim();
    const roleIndex = courtSecurityRoleOrderNormalized.indexOf(normalizeRoleValue(role));
    if (roleIndex !== -1) return roleIndex;
    return courtSecurityRoleOrder.length;
}

function getDeputyByName(name) {
    const n = (name || '').trim().toLowerCase();
    return allDeputies.find(d => (d.full_name || '').trim().toLowerCase() === n) || null;
}

function renderBorrowedPanel(allRows) {
    const panel = document.createElement('div');
    panel.id = 'borrowedDeputiesPanel';
    panel.className = 'section-cell';

    const h = document.createElement('h3');
    h.textContent = 'Borrowed Deputies';
    panel.appendChild(h);

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Deputy</th><th>Division</th><th>Courthouse</th><th>Location</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    const rows = [];
    allRows.filter(r => r.assignment_type === 'Courtroom' || isSecurityPostAssignmentType(r.assignment_type) || ['Overtime', 'Transport'].includes(r.assignment_type)).forEach(r => {
        parseAssignedNames(r.assigned_member).forEach(name => {
            const deputy = getDeputyByName(name);
            if (!deputy || isCourtSecurityDeputy(deputy)) return;
            const location = r.assignment_type === 'Courtroom'
                ? `${r.location_detail || '-'}${r.part ? '/' + r.part : ''}`
                : r.assignment_type === 'Overtime'
                    ? `${r.location_detail || '-'} / ${r.shift_time || 'Time TBD'}`
                    : (r.location_group || r.location_detail || '-');

            rows.push({
                deputy: name,
                division: (deputy.division || 'Unassigned Division').trim() || 'Unassigned Division',
                courthouse: formatBorrowedCourthouse(r.courthouse),
                location
            });
        });
    });

    rows.sort((a, b) => a.deputy.localeCompare(b.deputy));
    if (rows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="4">No borrowed deputies assigned.</td>';
        tbody.appendChild(tr);
    } else {
        rows.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.deputy}</td><td>${item.division}</td><td>${item.courthouse}</td><td>${item.location}</td>`;
            tbody.appendChild(tr);
        });
    }

    panel.appendChild(table);
    return panel;
}

function getPostedNameSetForSimpleView() {
    const names = new Set();
    latestRows
        .filter(r => r.assignment_type === 'Courtroom' || isSecurityPostAssignmentType(r.assignment_type) || ['Overtime', 'Transport'].includes(r.assignment_type))
        .forEach(r => parseAssignedNames(r.assigned_member).forEach(name => names.add(name.trim())));
    return names;
}

function parseDateOnly(value) {
    if (!value) return null;
    const d = new Date(`${value}T00:00:00`);
    return Number.isNaN(d.getTime()) ? null : d;
}

function effectiveStatusForSearchDate(deputy) {
    const selectedDate = parseDateOnly(document.getElementById('date').value);

    try {
        const raw = deputy.status_raw;
        const parsed = raw ? JSON.parse(raw) : null;
        const ranges = parsed && Array.isArray(parsed.ranges) ? parsed.ranges : [];
        const weeklyUnavailable = parsed && Array.isArray(parsed.weekly_unavailable) ? parsed.weekly_unavailable : [];
        const active = [];

        if (selectedDate) {
            ranges.forEach(entry => {
                const start = parseDateOnly(entry.start_date);
                const end = parseDateOnly(entry.end_date);
                if (start && end && selectedDate >= start && selectedDate <= end) {
                    const status = (entry.status || '').toLowerCase();
                    if (status && !active.includes(status)) active.push(status);
                }
            });

            const weekday = selectedDate.toLocaleDateString('en-US', { weekday: 'long' });
            weeklyUnavailable.forEach(rule => {
                const day = (rule?.day || '').trim();
                const ruleEnd = parseDateOnly(rule?.end_date);
                if (!day || !ruleEnd) return;
                if (selectedDate <= ruleEnd && (day === 'Any Day' || day === weekday)) {
                    if (!active.includes('unavailable')) active.push('unavailable');
                }
            });

            if (active.length > 0) return active.join(' / ');
        }

        if (parsed && parsed.legacy) return parsed.legacy.toLowerCase();
    } catch (_) {}

    return (deputy.current_status || '').trim().toLowerCase();
}

function isDeputyAvailable(deputy) {
    const status = effectiveStatusForSearchDate(deputy);
    if (!status) return true;
    return !status.includes('scheduled leave')
        && !status.includes('unscheduled leave')
        && !status.includes('unscheduled')
        && !status.includes('unavailable')
        && !status.includes('training');
}

function renderRoster() {
    const rosterList = document.getElementById('rosterList');
    const showFullRoster = document.getElementById('showFullRoster').checked;
    const postedNames = getPostedNameSetForSimpleView();

    rosterList.innerHTML = '';
    rosterList.classList.toggle('roster-two-column', showFullRoster);

    const courtColumn = document.createElement('div');
    courtColumn.className = 'roster-column roster-column-court';

    const courtHeading = document.createElement('h4');
    courtHeading.className = 'roster-section-title roster-section-title-court';

    const courtSecurityAll = allDeputies.filter(isCourtSecurityDeputy);
    const outCount = courtSecurityAll.filter(dep => !isDeputyAvailable(dep)).length;
    const postedCount = courtSecurityAll.filter(dep => postedNames.has((dep.full_name || '').trim())).length;
    const availableCount = Math.max(courtSecurityAll.filter(dep => isDeputyAvailable(dep)).length - postedCount, 0);

    courtHeading.innerHTML = `Court Security <span class="counts-inline"><span class="metric-red">Out ${outCount}</span> / <span class="metric-green">Available ${availableCount}</span> / <span class="metric-blue">Posted ${postedCount}</span></span>`;
    courtColumn.appendChild(courtHeading);

    const courtList = document.createElement('div');
    const courtSecurityAvailable = courtSecurityAll
        .filter(isDeputyAvailable)
        .sort((a, b) => getCourtSecuritySortRank(a) - getCourtSecuritySortRank(b)
            || (a.capacity_tag || a.role || '').localeCompare(b.capacity_tag || b.role || '')
            || (a.full_name || '').localeCompare(b.full_name || ''));
    courtSecurityAvailable.forEach(dep => {
        const item = document.createElement('div');
        item.className = 'roster-item';
        const name = (dep.full_name || '').trim();
        item.textContent = `${name} (${(dep.capacity_tag || dep.role || '').trim()})`;
        if (postedNames.has(name)) item.classList.add('assigned');
        courtList.appendChild(item);
    });
    courtColumn.appendChild(courtList);
    rosterList.appendChild(courtColumn);

    if (showFullRoster) {
        const fullColumn = document.createElement('div');
        fullColumn.className = 'roster-column roster-column-full';

        const fullHeading = document.createElement('h4');
        fullHeading.className = 'roster-section-title roster-section-title-full';
        fullHeading.textContent = 'Full Roster';
        fullColumn.appendChild(fullHeading);

        const fullList = document.createElement('div');
        const nonCourt = allDeputies
            .filter(dep => !isCourtSecurityDeputy(dep))
            .sort((a, b) => {
                const da = (a.division || 'Unassigned Division').trim().toLowerCase();
                const db = (b.division || 'Unassigned Division').trim().toLowerCase();
                if (da !== db) return da.localeCompare(db);
                return (a.full_name || '').localeCompare(b.full_name || '');
            });

        let currentDivision = null;
        nonCourt.forEach(dep => {
            const division = (dep.division || 'Unassigned Division').trim() || 'Unassigned Division';
            if (division !== currentDivision) {
                const h = document.createElement('h5');
                h.className = 'roster-section-title roster-section-title-full';
                const divisionPosted = nonCourt.filter(d => ((d.division || 'Unassigned Division').trim() || 'Unassigned Division') === division && postedNames.has((d.full_name || '').trim())).length;
                h.innerHTML = `${division} <span class="counts-inline metric-blue">Posted ${divisionPosted}</span>`;
                fullList.appendChild(h);
                currentDivision = division;
            }

            const item = document.createElement('div');
            item.className = 'roster-item';
            const name = (dep.full_name || '').trim();
            item.textContent = `${name} (${(dep.capacity_tag || dep.role || '').trim()})`;
            if (postedNames.has(name)) item.classList.add('assigned');
            fullList.appendChild(item);
        });

        fullColumn.appendChild(fullList);
        rosterList.appendChild(fullColumn);
    }
}


function searchSimple() {
    const name = document.getElementById('name').value;
    const date = document.getElementById('date').value;
    const courthouse = document.getElementById('courthouse').value;
    localStorage.setItem('searchPageDate', date || '');

    Promise.all([
        fetch(`/api/search?name=${encodeURIComponent(name)}&date=${date}&courthouse=${courthouse}`, { cache: 'no-store' }).then(res => res.json()),
        fetch(`/api/deputies?date=${date}`, { cache: 'no-store' }).then(res => res.json())
    ]).then(([rows, deputies]) => {
        latestRows = dedupeAssignmentRows(rows || []);
        allDeputies = deputies || [];

        const grouped = {};
        latestRows.forEach(row => {
            if (!grouped[row.courthouse]) grouped[row.courthouse] = [];
            grouped[row.courthouse].push(row);
        });

        const postsRow = document.getElementById('postsRow');
        const courtroomsRow = document.getElementById('courtroomsRow');
        const overtimeRow = document.getElementById('overtimeRow');
        const juvTopRow = document.getElementById('juvTopRow');
        const juvBottomRow = document.getElementById('juvBottomRow');
        postsRow.innerHTML = '';
        courtroomsRow.innerHTML = '';
        overtimeRow.innerHTML = '';
        juvTopRow.innerHTML = '';
        juvBottomRow.innerHTML = '';
        postsRow.style.display = 'grid';
        juvTopRow.style.display = 'grid';
        courtroomsRow.style.display = 'none';
        overtimeRow.style.display = 'none';
        juvBottomRow.style.display = 'none';

        const juvenileRows = grouped['Juvenile'] || [];
        const juvenileCourtRows = juvenileRows.filter(r => r.assignment_type === 'Courtroom');

        const getJuvenileCourtroomBuilding = (row) => {
            const room = (row.location_detail || '').trim().toUpperCase();
            const part = (row.part || '').toString().trim().toUpperCase().replace(/^PART\s+/, '');
            const judge = (row.judge_name || '').trim().toUpperCase();

            // True juvenile courtroom that should remain with Juvenile totals.
            if (room === '329C' && part === 'C-1' && judge === 'BLOMQUIST') return 'Juvenile';

            // Primary routing: room suffix indicates Cummings/Mitchell building.
            if (room.endsWith('C')) return 'Cummings';
            if (room.endsWith('M')) return 'Mitchell';

            // Fallback for legacy rows where the room/building may not be encoded consistently.
            if (part === '16' || judge === 'VITTORIA') return 'Cummings';
            if (['81', '22', '82', '85', '87'].includes(part) || ['STORM', 'R. RAFFERTY', 'M. PHINNETT', 'SILKWORTH', 'RASIN'].includes(judge)) return 'Mitchell';

            return 'Juvenile';
        };

        const juvenileMovedToCummings = juvenileCourtRows.filter(r => getJuvenileCourtroomBuilding(r) === 'Cummings');
        const juvenileMovedToMitchell = juvenileCourtRows.filter(r => getJuvenileCourtroomBuilding(r) === 'Mitchell');
        const juvenileKeptAsJuvenile = juvenileCourtRows.filter(r => getJuvenileCourtroomBuilding(r) === 'Juvenile');

        const mitchellRows = dedupeAssignmentRows([...(grouped['Mitchell'] || []), ...juvenileMovedToMitchell.map(r => ({ ...r, courthouse: 'Mitchell' }))]);
        const cummingsRows = dedupeAssignmentRows([...(grouped['Cummings'] || []), ...juvenileMovedToCummings.map(r => ({ ...r, courthouse: 'Cummings' }))]);
        const juvenileRowsForDisplay = [...juvenileRows.filter(r => r.assignment_type !== 'Courtroom'), ...juvenileKeptAsJuvenile];

        const mitchellPosts = renderPostTable('Mitchell', mitchellRows);
        const cummingsPosts = renderPostTable('Cummings', cummingsRows);
        const mitchellCourt = renderCourtroomTable('Mitchell', mitchellRows);
        const cummingsCourt = renderCourtroomTable('Cummings', cummingsRows);
        const mitchellOt = renderOvertimeTable(mitchellRows);
        const cummingsOt = renderOvertimeTable(cummingsRows);
        const juvCourt = renderCourtroomTable('Juvenile', juvenileRowsForDisplay);
        const juvOt = renderOvertimeTable(juvenileRowsForDisplay);
        const familyCourt = renderCourtroomTable('Family', grouped['Family'] || []);

        const mitchellTotal = {
            total: mitchellPosts.stats.total + mitchellCourt.stats.total,
            vacant: mitchellPosts.stats.vacant + mitchellCourt.stats.vacant,
            filled: mitchellPosts.stats.filled + mitchellCourt.stats.filled,
            open: mitchellPosts.stats.open + mitchellCourt.stats.open
        };
        const cummingsTotal = {
            total: cummingsPosts.stats.total + cummingsCourt.stats.total,
            vacant: cummingsPosts.stats.vacant + cummingsCourt.stats.vacant,
            filled: cummingsPosts.stats.filled + cummingsCourt.stats.filled,
            open: cummingsPosts.stats.open + cummingsCourt.stats.open
        };
        const juvenileTotal = {
            total: juvCourt.stats.total,
            vacant: juvCourt.stats.vacant,
            filled: juvCourt.stats.filled,
            open: juvCourt.stats.open
        };
        const familyTotal = {
            total: familyCourt.stats.total,
            vacant: familyCourt.stats.vacant,
            filled: familyCourt.stats.filled,
            open: familyCourt.stats.open
        };

        const mitchellBox = createCourthouseBox('Mitchell', formatCountMetrics(mitchellTotal.vacant, mitchellTotal.filled, mitchellTotal.open));
        mitchellBox.appendChild(createSectionCell('Security Post', mitchellPosts.table));
        mitchellBox.appendChild(createSectionCell('Courtroom', mitchellCourt.table));
        mitchellBox.appendChild(createSectionCell('Overtime', mitchellOt.table));

        const cummingsBox = createCourthouseBox('Cummings', formatCountMetrics(cummingsTotal.vacant, cummingsTotal.filled, cummingsTotal.open));
        cummingsBox.appendChild(createSectionCell('Security Post', cummingsPosts.table));
        cummingsBox.appendChild(createSectionCell('Courtroom', cummingsCourt.table));
        cummingsBox.appendChild(createSectionCell('Overtime', cummingsOt.table));

        postsRow.appendChild(mitchellBox);
        postsRow.appendChild(cummingsBox);

        const juvenileBox = createCourthouseBox('Juvenile', formatCountMetrics(juvenileTotal.vacant, juvenileTotal.filled, juvenileTotal.open));
        juvenileBox.appendChild(createSectionCell('Courtroom', juvCourt.table));
        juvenileBox.appendChild(createSectionCell('Overtime', juvOt.table));

        const familyBox = createCourthouseBox('Family', formatCountMetrics(familyTotal.vacant, familyTotal.filled, familyTotal.open));
        familyBox.appendChild(createSectionCell('Courtroom', familyCourt.table));

        juvTopRow.appendChild(juvenileBox);
        juvTopRow.appendChild(familyBox);
        juvBottomRow.style.display = 'grid';
        juvBottomRow.appendChild(createSectionCell('Borrowed Deputies', renderBorrowedPanel(latestRows).querySelector('table')));

        const overallVacant = mitchellTotal.vacant + cummingsTotal.vacant + juvenileTotal.vacant + familyTotal.vacant;
        const overallFilled = mitchellTotal.filled + cummingsTotal.filled + juvenileTotal.filled + familyTotal.filled;
        const overallOpen = mitchellTotal.open + cummingsTotal.open + juvenileTotal.open + familyTotal.open;
        document.getElementById('overallAssignmentCounts').innerHTML = formatCountMetrics(overallVacant, overallFilled, overallOpen);
        updateTotalOtHoursBadge(latestRows);

        renderRoster();
    });
}

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const today = (() => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; })();
    const savedDate = localStorage.getItem('searchPageDate');

    document.getElementById('date').value = urlParams.get('date') || savedDate || today;
    document.getElementById('courthouse').value = urlParams.get('courthouse') || '';
    document.getElementById('name').value = urlParams.get('name') || '';

    document.getElementById('date').addEventListener('change', searchSimple);
    document.getElementById('courthouse').addEventListener('change', searchSimple);
    document.getElementById('showFullRoster').addEventListener('change', renderRoster);
    document.getElementById('simpleViewToggle').addEventListener('change', function() {
        if (!this.checked) window.location.href = buildSimpleViewUrl('/');
    });

    searchSimple();
};
